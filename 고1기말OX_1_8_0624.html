<script>
var CONFIG={"title":"고1기말OX_1_8_0624","passThreshold":90,"level":"medium","levelLabel":"중3 수준 · CEFR A2","passages":[{"id":1,"title":"Cartilage Joint Function","body":"Cartilage is extremely important for the healthy functioning of a joint, especially if that joint bears weight, like your knee. Imagine for a moment that you’re looking into the inner workings of your left knee as you walk down the street. When you shift your weight from your left leg to your right, the pressure on your left knee is released. The cartilage in your left knee then “drinks in” synovial fluid, in much the same way that a sponge soaks up liquid when put in water. When you take another step and transfer the weight back onto your left leg, much of the fluid squeezes out of the cartilage. This squeezing of joint fluid into and out of the cartilage helps it respond to the off-and-on pressure of walking without breaking under the pressure.\n\n"},{"id":2,"title":"Cartilage Joint Function","body":"Cartilage is extremely important for the healthy functioning of a joint, especially if that joint bears weight, like your knee. Imagine for a moment that you’re looking into the inner workings of your left knee as you walk down the street. When you shift your weight from your left leg to your right, the pressure on your left knee is released. The cartilage in your left knee then “drinks in” synovial fluid, in much the same way that a sponge soaks up liquid when put in water. When you take another step and transfer the weight back onto your left leg, much of the fluid squeezes out of the cartilage. This squeezing of joint fluid into and out of the cartilage helps it respond to the off-and-on pressure of walking without breaking under the pressure.\n\n"},{"id":3,"title":"Numbers vs. Words","body":"Some researchers view spoken languages as incomplete devices for capturing precise differences. They think numbers represent the most neutral language of description. However, when our language of description is changed to numbers, we do not move toward greater accuracy. Numbers are no more appropriate ‘pictures of the world’ than words, music, or painting. While useful for specific purposes (e.g. census taking, income distribution), they eliminate information of enormous value. For example, the future lives of young students are tied to their scores on national tests. In effect, whether they can continue with their education, where, and at what cost depends importantly on a handful of numbers. These numbers do not account for the quality of schools they have\nattended, whether they have been tutored, have supportive parents, have test anxiety, and so on. Finally, putting aside the many ways in which statistical results can be manipulated, there are ways in which turning people’s lives into numbers is morally insulating. Statistics on crime, homelessness, or the spread of a disease say nothing of people’s suffering. We read the statistics as reports on events at a distance, thus allowing us to escape without being disturbed. Statistics are human beings with the tears wiped off. Quantify with caution. \n"},{"id":4,"title":"Personal Story Persuasion","body":"There is simply no better way to influence or stir an audience — Instantly, powerfully, authentically—than by opening up to them with a personal story or anecdote. To be clear:\nI’m not saying you need to tell them long stories about your family vacations or show them baby pictures from the stage. I’m saying that you can share a key biographical detail, or an emotion that you’re feeling in the moment, or a self-deprecating joke. It is a tried-and-tested way of bonding with an audience of strangers — and of laying the groundwork for you to then persuade them. The harsh reality is that people won’t bond with your arguments in a vacuum, but they will, says speech coach Bas van den Beld, “bond with you” — the person making those arguments. By sharing a revealing story or a personal flaw, you allow audience members a way to identify with you.\n"},{"id":5,"title":"Taste Preference Changes","body":"Despite learned eating behaviors that are formed in early childhood and inborn biological differences, taste preferences can be changed throughout our lives due to neuroplasticity,\nour brain’s amazing adaptability: There is far more flexibility in our food behaviors than most think, even as we age. This is terrific news for adventurous eaters who want to expand their dinner menu — it’s a big, tasty world out there! — but it’s amazing news for those eager to break poor diet habits. Just as kids gradually learn to like nutritious foods, so, too, can adults readjust their taste. Many who switch from processed grain foods like white bread and white rice to whole grain types, for instance, gradually learn to prefer the nutty flavors and chewy textures. Repeated exposure — and a willingness to change — is the key.\n"},{"id":6,"title":"Teenage Conformity Behavior","body":"Conformity in the teenage years has been studied by putting young people in situations where they are asked to make a choice or decision where that appears to go against what everyone else in the group is saying. The fascinating thing about the results of these studies is that conformity is not spread equally across all age groups. Thus, the willingness to go along with others reaches a peak around the age of 14. After that, this tendency decreases, so that by 16 or 17, young people are much more able to disagree with the group and to stand up for their own opinion. This is an important finding. It demonstrates that the influence of the peer group is not the same across all ages. As young people mature, they become more resilient, and more able to defend their opinions as individuals."},{"id":7,"title":"Habit Bundling Benefits","body":"Habits aren’t bad. We need them to survive. Understanding how the brain uses habits, and how you can work with them, is essential for business. One question to ask is, are you really trying to break a habit, or would you do better by attaching to another one (known as temptation bundling)? Wharton professor Katy Milkman led a research project called Holding the Hunger Games Hostage at the Gym, where participants could only have access to their audio devices while at the gym. This uses a tempting habit — listening to that awesome audiobook — and combines it with a habit people would like to build, but may otherwise feel forced to put off, like exercising. The participants whose devices were “held hostage” were 51 percent more likely to visit the gym. And the really amazing thing is what happened after it was over: nearly two-thirds opted to pay to have gym-only access for their devices!"},{"id":8,"title":"Graffman's Musical Journey","body":"Gary Graffman was born in New York City in 1928 and began playing the piano at the age of three. When he was seven, he entered the Curtis Institute of Music, where he\nreceived training that laid the foundation for his career. In 1949, he won the Leventritt Award and then played concerts worldwide. In the late 1970s, Graffman lost control of the fingers on his right hand, but he never gave up playing the piano. Reconsidering the traditional piano performance convention of using both hands, he focused on works for the left hand alone, such as Ravel’s Piano Concerto for the Left Hand. Graffman returned to the Curtis Institute of Music in 1980 as a member of the piano faculty. There he taught many outstanding young musicians, including Lang Lang, and his lifelong commitment to music continues to inspire people today.\n"}],"questions":[{"questionNumber":1,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"연골은 특히 체중을 지탱하는 관절에서 건강한 기능을 위해 매우 중요하다.","answer":"O","passageId":1,"passageTitle":"Cartilage Joint Function","sourceSentence":null},{"questionNumber":2,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"왼쪽 다리에서 오른쪽 다리로 체중을 옮기면, 왼쪽 무릎에 가해지는 압력이 증가한다.","answer":"X","passageId":1,"passageTitle":"Cartilage Joint Function","sourceSentence":null},{"questionNumber":3,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"연골이 활액을 흡수하는 방식은 스펀지가 물 속에서 액체를 빨아들이는 방식과 매우 유사하다.","answer":"O","passageId":1,"passageTitle":"Cartilage Joint Function","sourceSentence":null},{"questionNumber":4,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The cartilage absorbs synovial fluid when weight is placed back onto the left leg.","answer":"X","passageId":1,"passageTitle":"Cartilage Joint Function","sourceSentence":null},{"questionNumber":5,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The repeated squeezing of joint fluid in and out of cartilage allows it to handle the on-and-off pressure of walking without breaking.","answer":"O","passageId":1,"passageTitle":"Cartilage Joint Function","sourceSentence":null},{"questionNumber":6,"type":"grammar","typeLabel":"문법 OX","statement":"This squeezing of joint fluid into and out of the cartilage help it respond to the off-and-on pressure of walking without breaking under the pressure.","answer":"X","passageId":1,"passageTitle":"Cartilage Joint Function","sourceSentence":null},{"questionNumber":7,"type":"context_vocab","typeLabel":"문맥 어휘 OX","expression":"drinks in","contextSentence":"The cartilage in your left knee then \"drinks in\" synovial fluid, in much the same way that a sponge soaks up liquid when put in water.","statement":"표현: drinks in → 액체를 천천히 빨아들이다","answer":"O","passageId":1,"passageTitle":"Cartilage Joint Function","sourceSentence":null},{"questionNumber":8,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"무릎 연골은 체중이 실릴 때 활액(synovial fluid)을 흡수한다.","answer":"X","passageId":2,"passageTitle":"Cartilage Joint Function","sourceSentence":null},{"questionNumber":9,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"왼쪽 다리에서 오른쪽 다리로 체중을 옮기면 왼쪽 무릎의 압력이 풀린다.","answer":"O","passageId":2,"passageTitle":"Cartilage Joint Function","sourceSentence":null},{"questionNumber":10,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Car typeLabel":"부분 내용 (한글)","statement":"학생들의 시험 점수는 그들이 다닌 학교의 수준, 개인 과외 여부, 부모의 지원 등 다양한 요인을 반영하지 못한다.","answer":"O","passageId":3,"passageTitle":"Numbers vs. Words","sourceSentence":null},{"questionNumber":18,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"According to the passage, statistics about crime or homelessness help people deeply understand the suffering of individuals.","answer":"X","passageId":3,"passageTitle":"Numbers vs. Words","sourceSentence":null},{"questionNumber":19,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The passage argues that turning people's lives into numbers can make readers feel emotionally detached from others' pain.","answer":"O","passageId":3,"passageTitle":"Numbers vs. Words","sourceSentence":null},{"questionNumber":20,"type":"grammar","typeLabel":"문법 OX","statement":"Numbers are no more appropriate pictures of the world than words, music, or painting.","answer":"O","passageId":3,"passageTitle":"Numbers vs. Words","sourceSentence":null},{"questionNumber":21,"type":"context_vocab","typeLabel":"문맥 어휘 OX","expression":"morally insulating","contextSentence":"there are ways in which turning people's lives into numbers is morally insulating.","statement":"표현: morally insulating → 다른 사람의 고통으로부터 도덕적으로 차단되게 만드는","answer":"O","passageId":3,"passageTitle":"Numbers vs. Words","sourceSentence":null},{"questionNumber":22,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"글쓴이는 청중에게 영향을 미치는 가장 좋은 방법이 개인적인 이야기를 공유하는 것이라고 말한다.","answer":"O","passageId":4,"passageTitle":"Personal Story Persuasion","sourceSentence":null},{"questionNumber":23,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"글쓴이는 연단에서 가족 여행 이야기나 어린 시절 사진을 보여줄 것을 권장한다.","answer":"X","passageId":4,"passageTitle":"Personal Story Persuasion","sourceSentence":null},{"questionNumber":24,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"According to the passage, people tend to bond with the arguments themselves rather than with the speaker making those argumen )","statement":"As teenagers grow older, they become more capable of standing up for their own opinions.","answer":"O","passageId":6,"passageTitle":"Teenage Conformity Behavior","sourceSentence":null},{"questionNumber":40,"type":"grammar","typeLabel":"문법 OX","statement":"Conformity in the teenage years have been studied by putting young people in situations where they are asked to make a choice.","answer":"X","passageId":6,"passageTitle":"Teenage Conformity Behavior","sourceSentence":null},{"questionNumber":41,"type":"context_vocab","typeLabel":"문맥 어휘 OX","expression":"go along with","contextSentence":"The willingness to go along with others reaches a peak around the age of 14.","statement":"표현: go along with → 다른 사람의 생각이나 행동을 따르다","answer":"O","passageId":6,"passageTitle":"Teenage Conformity Behavior","sourceSentence":null},{"questionNumber":42,"type":"context_vocab","typeLabel":"문맥 어휘 OX","expression":"stand up for","contextSentence":"Young people are much more able to disagree with the group and to stand up for their own opinion.","statement":"표현: stand up for → 자신의 의견을 포기하다","answer":"X","passageId":6,"passageTitle":"Teenage Conformity Behavior","sourceSentence":null},{"questionNumber":43,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"와튼 스쿨의 케이티 밀크먼 교수는 체육관에서만 오디오 기기를 사용할 수 있도록 한 연구를 진행했다.","answer":"O","passageId":7,"passageTitle":"Habit Bundling Benefits","sourceSentence":null},{"questionNumber":44,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"기기를 '인질로 잡힌' 참가자들은 체육관을 방문할 가능성이 약 61퍼센트 더 높았다.","answer":"X","passageId":7,"passageTitle":"Habit Bundling Benefits","sourceSentence":null},{"questionNumber":45,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"연구가 끝난 후, 참가자들의 거의 3분의 2가 체육관 전용 기기 접근에 돈을 내겠다고 선택했다.","answer":"O","passageId":7,"passageTitle":"Habit Bundling Benefits","sourceSentence":null},{"questionNumber":46,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Temptation bundling means replacing a bad habit with a completely :54,"type":"context_vocab","typeLabel":"문맥 어휘 OX","expression":"laid the foundation for","contextSentence":"he entered the Curtis Institute of Music, where he received training that laid the foundation for his career.","statement":"표현: laid the foundation for → ~의 기반을 마련했다","answer":"O","passageId":8,"passageTitle":"Graffman's Musical Journey","sourceSentence":null},{"questionNumber":55,"type":"context_vocab","typeLabel":"문맥 어휘 OX","expression":"never gave up","contextSentence":"Graffman lost control of the fingers on his right hand, but he never gave up playing the piano.","statement":"표현: never gave up → 결국 포기했다","answer":"X","passageId":8,"passageTitle":"Graffman's Musical Journey","sourceSentence":null},{"questionNumber":56,"type":"grammar","typeLabel":"문법 OX","statement":"He focused on works for the left hand alone, such as Ravel's Piano Concerto for the Left Hand.","answer":"O","passageId":8,"passageTitle":"Graffman's Musical Journey","sourceSentence":null}]};
var QS=CONFIG.questions||[];
var TOTAL=QS.length;
var SET_SIZE=10;
var SETS=(function(){var s=[];for(var i=0;i<TOTAL;i+=SET_SIZE)s.push(QS.slice(i,i+SET_SIZE));return s;})();
var answers={};var currentSet=0;
function esc(s){if(s==null)return"";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML}
function setH(t,sub){var h=document.getElementById("hTitle");var p=document.getElementById("hSub");if(h)h.textContent=t;if(p)p.textContent=sub}
function gi(si,pi){return si*SET_SIZE+pi}
function showIndex(){
  setH(CONFIG.title,"OX 문제 테스트");
  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var done=0,correct=0;
    for(var i=0;i<sq.length;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===sq.length);
    var pct=done>0?Math.round(correct/sq.length*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#8b5cf6'>📝 "+done+"/"+sq.length+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"' onclick='enterSet("+si+")'>"
           +"<div><div style='font-weight:700'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400'>("+sq.length+"문제)</span></div></div>"
           +"<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div style='font-size:2.5rem;margin-bottom:8px'>📱</div>"
    +"<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>OX 문제 테스트</h2>"
    +"<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>전체 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과 · 몰라요는 오답 처리</p>"
    +"</div><div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;showQ(0)}
function showQ(pos){
  try{window.scrollTo(0,0)}catch(e){}
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length){showIndex();return;}
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  function btnClass(which){
    if(!answered)return "ox-btn "+which;
    if(answered.picked===which){
      if(which==="dunno")return "ox-btn dunno sel dunno wrong";
      return "ox-btn "+which+" "+(answered.isCorrect?"correct":"wrong");
    }
    return "ox-btn "+which;
  }
  var sourceHTML="";
  // 학생용 HTML — 원본 지문 미표시
  var fbHTML="";
  if(answered){
    var cls=answered.picked==="dunno"?"dunno":(answered.isCorrect?"ok":"ng");
    var msg=answered.picked==="dunno"?"🤔 몰라요 — 해설을 학습하세요":(answered.isCorrect?"✅ 정답!":"❌ 오답");
    fbHTML="<div class='fb "+cls+"'>"+msg+"</div>"
      +"<div class='explain-box'><div class='ex-title'>📖 정답 & 해설</div>"
      +"<div class='ex-body'><span class='ex-answer "+q.answer+"'>"+q.answer+"</span>"+esc(q.explanation)+"</div></div>";
  }
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade'>"
    +"<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"
    +"<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%'></div></div>"
    +"<div class='title-box'><div class='ptitle'>"+esc(q.passageTitle)+"</div>"
    +"<span class='tlabel'>"+esc(q.typeLabel||"")+"</span></div>"
    +"<div class='statement'>"+esc(q.statement)+"</div>"
    +sourceHTML
    +"<div class='ox-grid'>"
    +"<button class='"+btnClass("o")+"' onclick='pick("+pos+",&quot;o&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>⭕</span>O (맞음)</button>"
    +"<button class='"+btnClass("x")+"' onclick='pick("+pos+",&quot;x&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>❌</span>X (틀림)</button>"
    +"<button class='"+btnClass("dunno")+"' onclick='pick("+pos+",&quot;dunno&quot;)' "+(answered?"disabled":"")+">🤔 몰라요 (정답·해설 보기)</button>"
    +"</div>"
    +fbHTML
    +"<div class='nav-bar'>"
    +"<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"
    +"<button class='nav-btn home' onclick='showIndex()'>목록</button>"
    +"<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>"+(pos<qs.length-1?"다음 →":"결과")+"</button>"
    +"</div></div>";
}
function pick(pos,which){
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  var isCorrect=false;
  if(which==="dunno"){isCorrect=false;}
  else{isCorrect=(which==="o"&&q.answer==="O")||(which==="x"&&q.answer==="X");}
  answers[gidx]={picked:which,isCorrect:isCorrect};
  showQ(pos);
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0,dunno=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++;if(a&&a.picked==="dunno")dunno++;}
  var pct=Math.round(correct/total*100);var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div class='score-circle "+(passed?"pass":"fail")+"'>"+pct+"%</div>"
    +"<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"통과!":"미달")+"</p>"
    +"<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 몰라요 "+dunno+"개 · 기준 "+CONFIG.passThreshold+"%</p>"
    +"</div>"
    +"<div style='margin-top:16px'><button class='nav-btn next' style='width:100%;padding:14px' onclick='showIndex()'>목록으로</button></div>";
}
try{history.pushState(null,"",location.href);
window.addEventListener("popstate",function(){history.pushState(null,"",location.href);showIndex();});}catch(e){}
showIndex();
</script>
