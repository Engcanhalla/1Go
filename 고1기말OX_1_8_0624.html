<script>
var CONFIG={"title":"고1기말OX_1_8_0624","passThreshold":90,"level":"high1","levelLabel":"고1 수준 · CEFR B1","passages":[{"id":1,"title":"Knee Cartilage","body":"Cartilage is extremely important for the healthy functioning of a joint, especially if that joint bears weight, like your knee. Imagine for a moment that you're looking into the inner workings of your left knee as you walk down the street. When you shift your weight from your left leg to your right, the pressure on your left knee is released. The cartilage in your left knee then \"drinks in\" synovial fluid, in much the same way that a sponge soaks up liquid when put in water. When you take another step and transfer the weight back onto your left leg, much of the fluid squeezes out of the cartilage. This squeezing of joint fluid into and out of the cartilage helps it respond to the off-and-on pressure of walking without breaking under the pressure."},{"id":2,"title":"Air-Conditioning Wisdom","body":"The rise of air-conditioning accelerated the construction of sealed boxes, where the building's only airflow is through the filtered ducts of the air-conditioning unit. It doesn't have to be this way. Look at any old building in a hot climate, whether it's in Sicily or Marrakesh or Tehran. Architects understood the importance of shade, airflow, light colors. They oriented buildings to capture cool breezes and block the worst heat of the afternoon. They built with thick walls and white roofs and transoms over doors to encourage airflow. Anyone who has ever spent a few minutes in a mud-brick house in Tucson, or walked on the narrow streets of old Seville, knows how well these construction methods work. But all this wisdom about how to deal with heat, accumulated over centuries of practical experience, is all too often ignored. In this sense, air-conditioning is not just a technology of personal comfort; it is also a technology of forgetting."},{"id":3,"title":"Quantifying Caution","body":"Some researchers view spoken languages as incomplete devices for capturing precise differences. They think numbers represent the most neutral language of description. However, when our language of description is changed to numbers, we do not move toward greater accuracy. Numbers are no more appropriate 'pictures of the world' than words, music, or painting. While useful for specific purposes (e.g. census taking, income distribution), they eliminate information of enormous value. For example, the future lives of young students are tied to their scores on national tests. In effect, whether they can continue with their education, where, and at what cost depends importantly on a handful of numbers. These numbers do not account for the quality of schools they have attended, whether they have been tutored, have supportive parents, have test anxiety, and so on. Finally, putting aside the many ways in which statistical results can be manipulated, there are ways in which turning people's lives into numbers is morally insulating. Statistics on crime, homelessness, or the spread of a disease say nothing of people's suffering. We read the statistics as reports on events at a distance, thus allowing us to escape without being disturbed. Statistics are human beings with the tears wiped off. Quantify with caution."},{"id":4,"title":"Personal Storytelling","body":"There is simply no better way to influence or stir an audience — Instantly, powerfully, authentically — than by opening up to them with a personal story or anecdote. To be clear: I'm not saying you need to tell them long stories about your family vacations or show them baby pictures from the stage. I'm saying that you can share a key biographical detail, or an emotion that you're feeling in the moment, or a self-deprecating joke. It is a tried-and-tested way of bonding with an audience of strangers — and of laying the groundwork for you to then persuade them. The harsh reality is that people won't bond with your arguments in a vacuum, but they will, says speech coach Bas van den Beld, \"bond with you\" — the person making those arguments. By sharing a revealing story or a personal flaw, you allow audience members a way to identify with you."},{"id":5,"title":"Taste Flexibility","body":"Despite learned eating behaviors that are formed in early childhood and inborn biological differences, taste preferences can be changed throughout our lives due to neuroplasticity, our brain's amazing adaptability: There is far more flexibility in our food behaviors than most think, even as we age. This is terrific news for adventurous eaters who want to expand their dinner menu — it's a big, tasty world out there! — but it's amazing news for those eager to break poor diet habits. Just as kids gradually learn to like nutritious foods, so, too, can adults readjust their taste. Many who switch from processed grain foods like white bread and white rice to whole grain types, for instance, gradually learn to prefer the nutty flavors and chewy textures. Repeated exposure — and a willingness to change — is the key."},{"id":6,"title":"Teen Conformity","body":"Conformity in the teenage years has been studied by putting young people in situations where they are asked to make a choice or decision where that appears to go against what everyone else in the group is saying. The fascinating thing about the results of these studies is that conformity is not spread equally across all age groups. Thus, the willingness to go along with others reaches a peak around the age of 14. After that, this tendency decreases, so that by 16 or 17, young people are much more able to disagree with the group and to stand up for their own opinion. This is an important finding. It demonstrates that the influence of the peer group is not the same across all ages. As young people mature, they become more resilient, and more able to defend their opinions as individuals."},{"id":7,"title":"Temptation Bundling","body":"Habits aren't bad. We need them to survive. Understanding how the brain uses habits, and how you can work with them, is essential for business. One question to ask is, are you really trying to break a habit, or would you do better by attaching to another one (known as temptation bundling)? Wharton professor Katy Milkman led a research project called Holding the Hunger Games Hostage at the Gym, where participants could only have access to their audio devices while at the gym. This uses a tempting habit — listening to that awesome audiobook — and combines it with a habit people would like to build, but may otherwise feel forced to put off, like exercising. The participants whose devices were \"held hostage\" were 51 percent more likely to visit the gym. And the really amazing thing is what happened after it was over: nearly two-thirds opted to pay to have gym-only access for their devices!"},{"id":8,"title":"Gary Graffman","body":"Gary Graffman was born in New York City in 1928 and began playing the piano at the age of three. When he was seven, he entered the Curtis Institute of Music, where he received training that laid the foundation for his career. In 1949, he won the Leventritt Award and then played concerts worldwide. In the late 1970s, Graffman lost control of the fingers on his right hand, but he never gave up playing the piano. Reconsidering the traditional piano performance convention of using both hands, he focused on works for the left hand alone, such as Ravel's Piano Concerto for the Left Hand. Graffman returned to the Curtis Institute of Music in 1980 as a member of the piano faculty. There he taught many outstanding young musicians, including Lang Lang, and his lifelong commitment to music continues to inspire people today."}],"questions":[{"questionNumber":1,"passageId":1,"passageTitle":"Knee Cartilage","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"연골은 관절의 건강한 기능에 매우 중요하며, 특히 무릎처럼 체중을 지탱하는 관절에서 더욱 중요하다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문의 첫 문장 'Cartilage is extremely important for the healthy functioning of a joint, especially if that joint bears weight, like your knee.'와 statement의 내용이 정확히 일치한다. '관절의 건강한 기능에 매우 중요하며', '특히 무릎처럼 체중을 지탱하는 관절에서 더욱 중요하다'는 표현 모두 지문의 내용을 올바르게 반영하고 있다."},{"questionNumber":2,"passageId":1,"passageTitle":"Knee Cartilage","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"왼쪽 다리에서 오른쪽 다리로 체중을 옮기면 왼쪽 무릎의 연골에서 활액이 빠져나온다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에 따르면, 왼쪽 다리에서 오른쪽 다리로 체중을 옮기면 왼쪽 무릎에 가해지던 압력이 '해제'되며, 이때 연골은 활액을 '흡수(drinks in)'한다고 설명되어 있다. 활액이 연골에서 '빠져나오는(squeezes out)' 것은 반대로 다시 왼쪽 다리로 체중을 옮길 때 발생한다. 따라서 statement는 원인과 결과의 방향이 지문과 정반대로 서술되어 있어 X이다."},{"questionNumber":3,"passageId":1,"passageTitle":"Knee Cartilage","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Cartilage maintains joint health by repeatedly absorbing and releasing fluid in response to changing pressure.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서는 연골이 체중이 실릴 때 활액을 짜내고, 체중이 빠질 때 다시 흡수하는 과정을 스펀지에 비유하며 설명하고 있습니다. 이 반복적인 흡수와 방출 과정이 걸을 때 발생하는 간헐적인 압력을 견디게 해준다고 명시되어 있습니다. Statement는 이 내용을 '변화하는 압력에 반응하여 유체를 반복적으로 흡수하고 방출함으로써 관절 건강을 유지한다'고 정확히 요약하고 있으므로 O입니다."},{"questionNumber":4,"passageId":1,"passageTitle":"Knee Cartilage","type":"en_twist","typeLabel":"원문 변형 (영어)","statement":"Knee cartilage takes in synovial fluid, much like a sponge releases water when placed in liquid.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에서는 무릎 연골이 스펀지가 물을 흡수하듯 활액(synovial fluid)을 '흡수한다(drinks in)'고 설명합니다. 그러나 statement는 스펀지가 액체 속에 놓였을 때 물을 '방출한다(releases)'는 표현을 사용하여 지문과 정반대의 내용을 서술하고 있습니다. 따라서 핵심 동작이 왜곡되었으므로 X입니다."},{"questionNumber":5,"passageId":1,"passageTitle":"Knee Cartilage","type":"en_twist","typeLabel":"원문 변형 (영어)","statement":"The cycling of fluid through cartilage allows it to endure the intermittent stress of walking without sustaining damage.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서는 연골이 활액을 흡수하고 짜내는 과정(cycling of fluid)이 반복적인 보행 압력(intermittent stress of walking)을 견디게 해준다고 설명하고 있습니다. statement의 'cycling of fluid'는 지문의 'squeezing of joint fluid into and out of the cartilage'에, 'endure the intermittent stress of walking without sustaining damage'는 'respond to the off-and-on pressure of walking without breaking under the pressure'에 각각 정확히 대응됩니다. 내용 및 인과 관계 모두 지문과 일치하므로 O입니다."},{"questionNumber":6,"passageId":1,"passageTitle":"Knee Cartilage","type":"thats_why","typeLabel":"That's why 인과","statement":"Cartilage can handle the repeated pressure of walking without damage. That's why synovial fluid flows into and out of the cartilage.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에서 인과 관계는 '시노비얼 유체가 연골 안팎으로 드나드는 것'이 원인이고, '연골이 압력을 견딜 수 있다'는 것이 결과입니다. 그런데 statement는 이 인과 방향을 반대로 서술하여, '연골이 압력을 견딘다'는 것이 원인이고 '유체가 드나든다'는 것이 결과인 것처럼 표현하고 있습니다. 따라서 인과 방향이 지문과 정반대이므로 X입니다."},{"questionNumber":7,"passageId":1,"passageTitle":"Knee Cartilage","type":"ko_cause","typeLabel":"한국어 인과","statement":"걸을 때 체중이 왼발에서 빠지면 무릎 압력이 풀리고, 그래서 연골이 스펀지처럼 활액을 흡수한다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에 따르면 체중을 왼발에서 오른발로 옮기면 왼쪽 무릎의 압력이 풀리고, 그 결과 연골이 스펀지가 액체를 흡수하듯 활액(synovial fluid)을 '마신다'고 설명되어 있습니다. 스테이트먼트는 이 원인(압력 해제)과 결과(활액 흡수)의 인과 관계를 정확히 기술하고 있습니다."},{"questionNumber":8,"passageId":1,"passageTitle":"Knee Cartilage","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"연골이 활액을 흡수하는 과정은 관절에 압력이 가해지는 순간에 일어난다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에 따르면 연골이 활액을 '흡수(drinks in)'하는 것은 왼쪽 무릎의 압력이 해제되는 순간, 즉 체중이 반대쪽 다리로 옮겨졌을 때 일어난다. 반대로 체중이 다시 왼쪽 다리로 실릴 때, 즉 관절에 압력이 가해질 때는 활액이 연골 밖으로 짜내어진다. 따라서 'statement'는 원인과 결과의 방향이 지문과 정반대이므로 X이다."},{"questionNumber":9,"passageId":1,"passageTitle":"Knee Cartilage","type":"this_leads","typeLabel":"This leads 인과","statement":"The weight is lifted off the left knee. This leads to the cartilage absorbing synovial fluid like a sponge.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서 왼쪽 다리에서 오른쪽 다리로 체중을 이동하면 왼쪽 무릎의 압력이 해제되고, 이때 연골이 스펀지가 물을 흡수하는 것처럼 활액(synovial fluid)을 '마신다'고 설명합니다. Statement는 '체중이 왼쪽 무릎에서 들린다 → 연골이 스펀지처럼 활액을 흡수한다'는 인과 관계를 기술하고 있으며, 이는 지문의 내용 및 인과 방향과 완전히 일치합니다."},{"questionNumber":10,"passageId":1,"passageTitle":"Knee Cartilage","type":"insertion","typeLabel":"순서 맞추기","statement":"This squeezing of joint fluid into and out of the cartilage helps it respond to the off-and-on pressure of walking without breaking under the pressure. → When you take another step and transfer the weight back onto your left leg, much of the fluid squeezes out of the cartilage.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"이 문제는 insertion/order 유형으로, 두 문장의 순서가 지문과 일치하는지 확인해야 합니다. 지문에서는 '유체를 짜내고 짜넣는 과정이 압력에 버티도록 돕는다(This squeezing…)'는 문장이 마지막에 등장하며, '체중을 왼쪽 다리로 옮기면 유체가 빠져나간다(When you take another step…)'는 문장이 그 앞에 위치합니다. 따라서 statement처럼 앞 문장 뒤에 뒷 문장이 오는 순서는 지문의 실제 순서와 반대이므로 X입니다."},{"questionNumber":11,"passageId":2,"passageTitle":"Air-Conditioning Wisdom","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"에어컨의 등장으로 건물은 자연 환기를 강화하는 방향으로 발전했다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에 따르면 에어컨의 등장은 오히려 건물을 완전히 밀폐된 구조로 만드는 것을 가속화했으며, 자연 환기를 강화하는 방향과는 정반대의 결과를 낳았다. 자연 환기를 고려한 설계(그늘, 기류, 두꺼운 벽 등)는 에어컨 이전의 건축 지혜였으나, 에어컨의 보급으로 이러한 지혜가 오히려 잊혀지게 되었다고 지문은 서술하고 있다."},{"questionNumber":12,"passageId":2,"passageTitle":"Air-Conditioning Wisdom","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"시칠리아, 마라케시, 테헤란 등 더운 기후의 오래된 건물들은 그늘, 기류, 밝은 색상의 중요성을 반영하여 설계되었다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서 '더운 기후의 오래된 건물들(whether it's in Sicily or Marrakesh or Tehran)'을 예로 들며 건축가들이 그늘(shade), 기류(airflow), 밝은 색상(light colors)의 중요성을 이해했다고 명시하고 있습니다. statement는 이 세 지역과 세 가지 설계 원칙을 정확히 언급하며 지문 내용과 완전히 일치합니다."},{"questionNumber":13,"passageId":2,"passageTitle":"Air-Conditioning Wisdom","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Air-conditioning is purely a technology of personal comfort that has improved modern building design.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문은 에어컨이 '개인적 편안함의 기술'일 뿐만 아니라 '망각의 기술(a technology of forgetting)'이기도 하다고 명시하고 있습니다. 즉, 에어컨이 순전히(purely) 개인 편안함의 기술이라는 표현은 지문의 주장과 상충됩니다. 또한 지문은 에어컨이 현대 건물 설계를 개선했다고 말하지 않으며, 오히려 수세기에 걸쳐 축적된 전통적 건축 지혜를 무시하게 만들었다고 비판합니다."},{"questionNumber":14,"passageId":2,"passageTitle":"Air-Conditioning Wisdom","type":"en_twist","typeLabel":"원문 변형 (영어)","statement":"Air-conditioning serves as more than a means of staying cool; it also causes us to lose centuries of building knowledge.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문은 에어컨이 단순한 개인 편의 기술을 넘어 '망각의 기술(technology of forgetting)'이라고 명시하며, 수세기에 걸쳐 축적된 건축 지혜를 잊게 만든다고 주장한다. Statement는 이 내용을 '에어컨이 수세기의 건축 지식을 잃게 한다'고 표현하여 지문의 핵심 주장과 정확히 일치한다. 의미의 왜곡이나 방향의 오류 없이 지문 내용을 올바르게 반영하고 있으므로 O이다."},{"questionNumber":15,"passageId":2,"passageTitle":"Air-Conditioning Wisdom","type":"en_twist","typeLabel":"원문 변형 (영어)","statement":"Traditional architects constructed buildings with thin walls and white roofs to promote ventilation.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에서 전통 건축가들은 'thick walls(두꺼운 벽)'와 'white roofs(흰 지붕)'를 사용했다고 명시되어 있습니다. statement는 'thin walls(얇은 벽)'라고 서술하여 지문의 내용과 정반대로 왜곡하고 있습니다. 따라서 한 단어의 오류로 인해 전체 진술이 틀린 것으로 판정됩니다."},{"questionNumber":16,"passageId":2,"passageTitle":"Air-Conditioning Wisdom","type":"thats_why","typeLabel":"That's why 인과","statement":"Traditional architects understood the value of shade and natural airflow. That's why they designed buildings with thick walls, white roofs, and transoms over doors.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서 건축가들은 그늘, 기류, 밝은 색상의 중요성을 이해했다고 명시되어 있으며, 두꺼운 벽, 흰 지붕, 문 위의 트랜섬을 활용해 기류를 유도하는 방식으로 건물을 지었다고 서술되어 있다. Statement는 전통 건축가들이 그늘과 자연 기류의 가치를 이해했기 때문에 해당 설계 방식을 채택했다는 인과 관계를 제시하고 있으며, 이는 지문의 내용과 완전히 일치한다."},{"questionNumber":17,"passageId":2,"passageTitle":"Air-Conditioning Wisdom","type":"ko_cause","typeLabel":"한국어 인과","statement":"수 세기에 걸친 더위 대처법이 무시되었기 때문에 에어컨이 발명되었다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문은 인과관계의 방향이 반대이다. 지문에 따르면 에어컨이라는 기술이 먼저 등장하고 보급되면서 수 세기에 걸쳐 축적된 더위 대처 지혜가 망각·무시되었다고 서술한다. 즉 '더위 대처법 무시 → 에어컨 발명'이 아니라 '에어컨 등장 → 더위 대처법 망각'이 지문의 인과 방향이므로 해당 statement는 원인과 결과가 뒤바뀐 잘못된 진술이다."},{"questionNumber":18,"passageId":2,"passageTitle":"Air-Conditioning Wisdom","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"에어컨은 단순히 개인의 안락함을 위한 기술이 아니라, 전통적인 건축 지혜를 잊게 만드는 기술이기도 하다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문의 마지막 문장에서 'air-conditioning is not just a technology of personal comfort; it is also a technology of forgetting'이라고 명시되어 있다. 여기서 'forgetting'은 수백 년간 축적된 전통적 건축 지혜를 잊게 만든다는 의미로, statement의 내용과 완전히 일치한다."},{"questionNumber":19,"passageId":2,"passageTitle":"Air-Conditioning Wisdom","type":"insertion","typeLabel":"순서 맞추기","statement":"Anyone who has ever spent a few minutes in a mud-brick house in Tucson, or walked on the narrow streets of old Seville, knows how well these construction methods work. → But all this wisdom about how to deal with heat, accumulated over centuries of practical experience, is all too often ignored.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서 'Anyone who has ever spent a few minutes in a mud-brick house in Tucson, or walked on the narrow streets of old Seville, knows how well these construction methods work.' 문장 바로 다음에 'But all this wisdom about how to deal with heat, accumulated over centuries of practical experience, is all too often ignored.' 문장이 이어집니다. 두 문장의 순서와 내용이 지문과 완전히 일치하므로 O입니다."},{"questionNumber":20,"passageId":2,"passageTitle":"Air-Conditioning Wisdom","type":"this_leads","typeLabel":"This leads 인과","statement":"People built sealed buildings with only filtered air ducts. This leads to architects understanding the importance of shade and natural airflow.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에 따르면 에어컨의 등장이 밀폐된 건물(sealed boxes) 건축을 가속화했으며, 이는 오히려 그늘·자연 환기 등에 대한 지혜를 '잊게 만드는' 결과를 초래했다. 즉 인과 관계가 반대로 서술되어 있다. 건축가들이 그늘과 자연 환기의 중요성을 이해한 것은 밀폐 건물 이전의 오랜 경험에서 비롯된 것이지, 밀폐 건물 건축의 결과가 아니다."},{"questionNumber":21,"passageId":3,"passageTitle":"Quantifying Caution","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"일부 연구자들은 구어가 정밀한 차이를 포착하기에 불완전한 도구라고 보며, 숫자가 가장 중립적인 기술 언어라고 생각한다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문의 첫 두 문장에서 '일부 연구자들은 구어를 정밀한 차이를 포착하기 위한 불완전한 도구로 본다(Some researchers view spoken languages as incomplete devices for capturing precise differences)'고 하며, '숫자가 가장 중립적인 기술 언어를 나타낸다고 생각한다(They think numbers represent the most neutral language of description)'고 명시되어 있다. statement는 이 두 내용을 정확히 반영하고 있으므로 지문과 완전히 일치한다."},{"questionNumber":22,"passageId":3,"passageTitle":"Quantifying Caution","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"기술 방식을 숫자로 바꾸면 더 높은 정확성을 확보할 수 있다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문은 '기술 언어를 숫자로 바꾼다고 해서 더 높은 정확성으로 나아가는 것은 아니다(we do not move toward greater accuracy)'라고 명시적으로 반박하고 있다. 숫자가 단어, 음악, 그림보다 더 적절한 '세계의 그림'이 아니며, 오히려 막대한 가치를 지닌 정보를 제거한다고 주장한다. 따라서 해당 statement는 지문의 핵심 주장과 정반대의 내용이므로 X이다."},{"questionNumber":23,"passageId":3,"passageTitle":"Quantifying Caution","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Numbers are not necessarily more accurate than other forms of description, and reducing human lives to statistics can be morally harmful.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문은 숫자가 단어, 음악, 그림보다 더 정확한 세계의 묘사가 아니라고 명시하며, 수치가 다른 서술 형식보다 반드시 더 정확하지는 않다는 주장을 뒷받침한다. 또한 지문은 사람들의 삶을 숫자로 환원하는 것이 '도덕적으로 무감각하게 만드는(morally insulating)' 효과가 있다고 지적하며, 범죄·노숙·질병 통계가 사람들의 고통을 전달하지 못한다고 설명한다. 따라서 statement의 두 주장 모두 지문 내용과 정확히 일치한다."},{"questionNumber":24,"passageId":3,"passageTitle":"Quantifying Caution","type":"en_twist","typeLabel":"원문 변형 (영어)","statement":"Numbers provide more accurate representations of the world than words, music, or painting.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문은 숫자가 단어, 음악, 그림보다 더 정확한 세계의 표현이라는 주장을 명시적으로 반박한다. 'Numbers are no more appropriate pictures of the world than words, music, or painting'이라고 직접 언급하며, 숫자로 기술 방식을 바꾼다고 해서 더 높은 정확성으로 나아가는 것이 아님을 강조한다. 따라서 해당 statement는 지문의 내용과 정반대이므로 X이다."},{"questionNumber":25,"passageId":3,"passageTitle":"Quantifying Caution","type":"en_twist","typeLabel":"원문 변형 (영어)","statement":"Although numbers serve certain practical functions like counting populations and tracking wealth distribution, they remove highly valuable information.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문은 숫자가 인구조사(census taking)나 소득 분배(income distribution) 같은 특정 목적에는 유용하다고 인정하면서도, 동시에 엄청난 가치를 지닌 정보를 제거한다(eliminate information of enormous value)고 명시한다. statement의 'counting populations'는 census taking에, 'tracking wealth distribution'은 income distribution에 각각 대응되므로 내용이 정확히 일치한다. 따라서 statement는 지문과 완전히 부합한다."},{"questionNumber":26,"passageId":3,"passageTitle":"Quantifying Caution","type":"ko_cause","typeLabel":"한국어 인과","statement":"범죄나 노숙에 대한 통계가 사람들의 고통을 전하지 못하기 때문에, 사람들은 삶을 숫자로 환산하게 된다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에서의 인과 방향은 반대이다. 지문은 '삶을 숫자로 환산하는 것(turning people's lives into numbers)'이 도덕적으로 무감각하게 만들며, 그 결과로 범죄·노숙 등의 통계가 사람들의 고통을 전달하지 못한다고 설명한다. 즉 원인은 '삶을 숫자로 환산하는 행위'이고 결과가 '고통을 전달하지 못함'인데, statement는 이 인과 관계를 뒤집어 '통계가 고통을 전하지 못하기 때문에 삶을 숫자로 환산한다'고 서술하여 원인과 결과가 역전되어 있다."},{"questionNumber":27,"passageId":3,"passageTitle":"Quantifying Caution","type":"thats_why","typeLabel":"That's why 인과","statement":"We read statistics as reports on events at a distance. That's why we can escape without being emotionally disturbed.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서 'We read the statistics as reports on events at a distance, thus allowing us to escape without being disturbed.'라고 명시되어 있으며, 'thus'는 인과 관계를 나타냅니다. statement는 '사건을 거리감 있는 보고서로 읽는다'는 원인과 '감정적으로 동요 없이 벗어날 수 있다'는 결과의 방향을 지문과 동일하게 표현하고 있습니다. 따라서 인과 관계와 내용 모두 지문과 완전히 일치합니다."},{"questionNumber":28,"passageId":3,"passageTitle":"Quantifying Caution","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"시험 점수는 학생이 다닌 학교의 질, 사교육 여부, 부모의 지지 등을 충분히 반영한다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문은 시험 점수가 학생이 다닌 학교의 질, 사교육 여부, 부모의 지지, 시험 불안 등을 반영하지 못한다고 명시하고 있다. 즉 'These numbers do not account for...'라는 표현을 통해 점수가 이러한 요소들을 고려하지 않는다고 비판하므로, 해당 statement는 지문 내용과 정반대이다."},{"questionNumber":29,"passageId":3,"passageTitle":"Quantifying Caution","type":"insertion","typeLabel":"순서 맞추기","statement":"They think numbers represent the most neutral language of description. → However, when our language of description is changed to numbers, we do not move toward greater accuracy.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서 'They think numbers represent the most neutral language of description.'와 'However, when our language of description is changed to numbers, we do not move toward greater accuracy.'는 실제로 이 순서대로 연속 등장합니다. 두 문장 사이에 다른 문장이 삽입되지 않고 바로 이어지므로 순서와 내용 모두 정확히 일치합니다."},{"questionNumber":30,"passageId":3,"passageTitle":"Quantifying Caution","type":"this_leads","typeLabel":"This leads 인과","statement":"Turning people's lives into numbers is morally insulating. This leads to statistics saying nothing about people's actual suffering.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에서 인과관계의 방향은 반대로 제시되어 있다. 통계가 사람들의 고통에 대해 아무것도 말해주지 않기 때문에(결과), 우리가 통계를 거리의 사건으로 읽으며 disturbed되지 않고 넘어갈 수 있다는 것이 도덕적 무감각(moral insulating)의 내용이다. 즉, '사람의 삶을 숫자로 바꾸는 것'이 도덕적 무감각을 낳고, 그 도덕적 무감각의 특성 중 하나가 통계가 고통을 담지 못한다는 것이지, statement처럼 '도덕적 무감각 → 통계가 고통을 말하지 못함'의 인과 관계는 지문의 논리 구조와 다르다."},{"questionNumber":31,"passageId":4,"passageTitle":"Personal Storytelling","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"청중에게 개인적인 이야기나 일화로 마음을 여는 것이 청중을 감동시키고 영향을 미치는 가장 좋은 방법이다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문은 '개인적인 이야기나 일화로 청중에게 마음을 여는 것이 청중을 즉각적으로, 강력하게, 진정성 있게 감동시키고 영향을 미치는 가장 좋은 방법'이라고 명시하고 있습니다. 'There is simply no better way to influence or stir an audience... than by opening up to them with a personal story or anecdote'라는 문장이 statement의 내용과 정확히 일치합니다. 따라서 이 statement는 지문의 내용을 올바르게 반영하고 있습니다."},{"questionNumber":32,"passageId":4,"passageTitle":"Personal Storytelling","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"청중과 유대감을 형성하려면 가족 여행에 대한 긴 이야기나 어린 시절 사진을 보여주는 것이 효과적이다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에서 필자는 가족 여행에 대한 긴 이야기나 무대에서 아기 사진을 보여주는 것이 필요하다고 말하는 것이 아님을 명확히 밝히고 있다('I'm not saying you need to tell them long stories about your family vacations or show them baby pictures from the stage'). 대신 핵심적인 전기적 세부 사항, 현재 느끼는 감정, 또는 자기 비하적 농담을 공유하는 것을 권장한다. 따라서 해당 statement는 지문 내용과 정반대이므로 X이다."},{"questionNumber":33,"passageId":4,"passageTitle":"Personal Storytelling","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Audiences primarily connect with well-structured logical arguments rather than the speaker's personality.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문은 청중이 논리적 주장 자체가 아닌 그 주장을 펼치는 '사람'과 유대감을 형성한다고 명시하고 있습니다. 스피치 코치 Bas van den Beld의 말을 인용하며 '논거가 아닌 당신 자신'과 청중이 연결된다고 강조하므로, statement의 주장은 지문과 정반대입니다."},{"questionNumber":34,"passageId":4,"passageTitle":"Personal Storytelling","type":"en_twist","typeLabel":"원문 변형 (영어)","statement":"Sharing personal stories is a proven method of connecting with unfamiliar listeners and setting the stage for persuasion.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서는 개인적인 이야기나 일화를 공유하는 것이 '낯선 청중과 유대감을 형성하는 검증된 방법(tried-and-tested way of bonding with an audience of strangers)'이며, 이후 설득의 기반을 마련하는 수단이라고 명시하고 있다. Statement의 'proven method'는 'tried-and-tested way'에, 'unfamiliar listeners'는 'audience of strangers'에, 'setting the stage for persuasion'은 'laying the groundwork for you to then persuade them'에 각각 정확히 대응된다. 따라서 지문 내용과 완전히 일치한다."},{"questionNumber":35,"passageId":4,"passageTitle":"Personal Storytelling","type":"en_twist","typeLabel":"원문 변형 (영어)","statement":"There is simply no better way to influence an audience than by presenting them with well-researched data and evidence.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에서는 청중에게 영향을 미치는 가장 좋은 방법이 '개인적인 이야기나 일화를 공유하는 것'이라고 명시하고 있습니다. Statement는 이를 '잘 조사된 데이터와 증거를 제시하는 것'이라고 완전히 다른 내용으로 왜곡하고 있습니다. 따라서 지문의 핵심 주장과 정반대되는 내용이므로 X입니다."},{"questionNumber":36,"passageId":4,"passageTitle":"Personal Storytelling","type":"thats_why","typeLabel":"That's why 인과","statement":"People won't connect with arguments alone, but they will connect with the person making them. That's why sharing a personal story or flaw helps audience members identify with the speaker.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문은 사람들이 주장 자체와는 유대감을 형성하지 못하지만 그 주장을 하는 '사람'과는 유대감을 형성한다고 명시하며, 이는 스피치 코치 Bas van den Beld의 말을 인용해 뒷받침된다. 또한 개인적인 이야기나 결점을 공유함으로써 청중이 화자와 동일시할 수 있게 된다고 설명하고 있다. Statement는 이 인과 관계를 정확히 반영하고 있으므로 O로 판정한다."},{"questionNumber":37,"passageId":4,"passageTitle":"Personal Storytelling","type":"ko_cause","typeLabel":"한국어 인과","statement":"청중이 발표자와 유대감을 형성하기 때문에, 발표자가 개인적인 이야기를 공유하게 된다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에서는 발표자가 개인적인 이야기를 공유함으로써 청중과 유대감을 형성할 수 있다고 설명한다. 즉, '개인적인 이야기 공유'가 원인이고 '유대감 형성'이 결과이다. 그러나 statement는 인과 방향을 반대로 서술하여 '청중이 유대감을 형성하기 때문에 발표자가 이야기를 공유한다'고 하였으므로 틀렸다."},{"questionNumber":38,"passageId":4,"passageTitle":"Personal Storytelling","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"스피치 코치 Bas van den Beld에 따르면, 사람들은 논리 그 자체가 아니라 그 논리를 펼치는 '사람'에게 유대감을 느낀다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서 스피치 코치 Bas van den Beld는 '사람들은 논리 그 자체(arguments in a vacuum)에는 유대감을 느끼지 않지만, 그 논리를 펼치는 사람(you)에게는 유대감을 느낀다'고 말한다고 명시되어 있습니다. 이는 statement의 내용과 정확히 일치합니다."},{"questionNumber":39,"passageId":4,"passageTitle":"Personal Storytelling","type":"insertion","typeLabel":"순서 맞추기","statement":"It is a tried-and-tested way of bonding with an audience of strangers — and of laying the groundwork for you to then persuade them. → The harsh reality is that people won't bond with your arguments in a vacuum, but they will, says speech coach Bas van den Beld, \"bond with you\" — the person making those arguments.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"해당 statement는 두 문장의 순서가 지문과 완전히 일치하는지를 묻는 insertion 유형입니다. 지문에서 'It is a tried-and-tested way...' 문장 바로 다음에 'The harsh reality is that people won't bond...' 문장이 이어지므로 순서가 정확히 일치합니다. 따라서 판정은 O입니다."},{"questionNumber":40,"passageId":4,"passageTitle":"Personal Storytelling","type":"this_leads","typeLabel":"This leads 인과","statement":"Audience members identify with the speaker. This leads to the speaker sharing a revealing story or personal flaw.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에서의 인과 관계는 '화자가 revealing story나 personal flaw를 공유함으로써 청중이 화자와 동일시(identify)하게 된다'는 방향입니다. 즉, 원인은 '화자의 이야기 공유'이고 결과는 '청중의 동일시'입니다. 그러나 statement는 이 인과 관계를 반대로 서술하여, 청중의 동일시가 원인이 되고 화자의 이야기 공유가 결과가 된다고 잘못 제시하고 있습니다."},{"questionNumber":41,"passageId":5,"passageTitle":"Taste Flexibility","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"어린 시절에 형성된 식습관과 타고난 생물학적 차이에도 불구하고, 신경가소성 덕분에 미각 선호는 평생에 걸쳐 바뀔 수 있다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문의 첫 문장에서 '어린 시절에 형성된 학습된 식습관과 타고난 생물학적 차이에도 불구하고, 신경가소성(neuroplasticity) 덕분에 미각 선호는 평생에 걸쳐 바뀔 수 있다'고 명시되어 있습니다. statement는 이 내용을 정확히 반영하고 있으며, 원인(신경가소성)과 결과(미각 선호의 변화) 방향도 지문과 일치합니다."},{"questionNumber":42,"passageId":5,"passageTitle":"Taste Flexibility","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"나이가 들면 음식 행동의 유연성이 점차 줄어들어 식습관을 바꾸기 어렵다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문은 '나이가 들어도 음식 행동에는 대부분의 사람들이 생각하는 것보다 훨씬 더 많은 유연성이 있다(There is far more flexibility in our food behaviors than most think, even as we age)'고 명시하고 있습니다. 즉, 나이가 들수록 유연성이 줄어든다는 진술은 지문의 내용과 정반대입니다. 성인도 반복적인 노출과 변화하려는 의지를 통해 식습관을 바꿀 수 있다고 지문은 강조합니다."},{"questionNumber":43,"passageId":5,"passageTitle":"Taste Flexibility","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Our taste preferences are changeable at any age, and repeated exposure combined with willingness is essential for adjusting them.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문은 신경가소성 덕분에 나이와 관계없이 미각 선호도를 바꿀 수 있다고 명시하며('even as we age'), 이는 statement의 'changeable at any age'와 일치한다. 또한 지문 마지막 문장에서 'Repeated exposure — and a willingness to change — is the key'라고 하여 반복 노출과 변화 의지가 핵심임을 직접적으로 언급하고 있어 statement의 내용과 완전히 부합한다."},{"questionNumber":44,"passageId":5,"passageTitle":"Taste Flexibility","type":"en_twist","typeLabel":"원문 변형 (영어)","statement":"Unlike children who gradually develop a taste for healthy foods, adults cannot easily readjust their food preferences.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문은 신경가소성(neuroplasticity) 덕분에 성인도 입맛을 재조정할 수 있다고 명확히 밝히고 있습니다. 특히 '어린이가 점차 영양가 있는 음식을 좋아하게 되듯, 성인도 마찬가지로 입맛을 재조정할 수 있다(so, too, can adults readjust their taste)'고 직접 언급하여, 성인이 식품 선호도를 바꾸기 어렵다는 statement의 주장은 지문과 정반대입니다."},{"questionNumber":45,"passageId":5,"passageTitle":"Taste Flexibility","type":"en_twist","typeLabel":"원문 변형 (영어)","statement":"The essential factor for changing taste preferences is trying new foods multiple times along with an openness to change.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문의 마지막 문장 'Repeated exposure — and a willingness to change — is the key.'는 반복적인 노출(trying new foods multiple times)과 변화에 대한 의지(openness to change)가 맛 선호도를 바꾸는 핵심 요소라고 명시하고 있습니다. Statement는 이를 'trying new foods multiple times'와 'openness to change'로 정확히 풀어 표현하고 있으므로 지문 내용과 완전히 일치합니다."},{"questionNumber":46,"passageId":5,"passageTitle":"Taste Flexibility","type":"thats_why","typeLabel":"That's why 인과","statement":"Our brains have neuroplasticity, the ability to adapt throughout life. That's why taste preferences can be changed even in adulthood.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문은 뇌의 놀라운 적응력인 신경가소성(neuroplasticity) 덕분에 평생에 걸쳐 미각 선호도가 변할 수 있다고 명시하고 있습니다. statement는 '신경가소성이 원인이 되어 성인기에도 미각 선호도가 바뀔 수 있다'는 인과 관계를 제시하며, 이는 지문의 내용 및 인과 방향과 정확히 일치합니다. 내용의 왜곡이나 반전 없이 지문의 핵심 논리를 충실히 반영하고 있으므로 O입니다."},{"questionNumber":47,"passageId":5,"passageTitle":"Taste Flexibility","type":"ko_cause","typeLabel":"한국어 인과","statement":"가공 곡물에서 통곡물로 바꾼 사람들이 고소한 맛과 쫄깃한 식감을 선호하게 되었기 때문에, 신경가소성이 발달한다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에서는 신경가소성(neuroplasticity)이 원인이 되어 맛 선호도를 변화시킬 수 있다고 설명하며, 가공 곡물에서 통곡물로 바꾼 사람들이 고소한 맛과 쫄깃한 식감을 선호하게 되는 것은 그 결과의 예시로 제시된다. statement는 인과 관계를 반대로 서술하여, 통곡물 선호가 생겼기 때문에 신경가소성이 발달한다고 주장하고 있으므로 원인과 결과의 방향이 완전히 뒤바뀐 오류이다."},{"questionNumber":48,"passageId":5,"passageTitle":"Taste Flexibility","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"반복적 노출만으로 미각 선호를 바꿀 수 있다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문은 미각 선호를 바꾸는 핵심 요소로 '반복적 노출(Repeated exposure)'과 함께 '변화하려는 의지(a willingness to change)' 두 가지를 명시하고 있다. Statement는 '반복적 노출만으로' 가능하다고 했지만, 지문은 두 조건을 'and'로 연결하여 둘 다 필요하다고 강조한다. 따라서 '만으로'라는 표현이 지문 내용을 왜곡하므로 X이다."},{"questionNumber":49,"passageId":5,"passageTitle":"Taste Flexibility","type":"this_leads","typeLabel":"This leads 인과","statement":"Adults learn to prefer whole grain flavors and textures. This leads to neuroplasticity developing in the brain.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에서 인과 관계의 방향은 반대입니다. 신경가소성(neuroplasticity)이 뇌의 적응력을 가능하게 하기 때문에 성인도 통곡물의 맛과 식감을 선호하도록 바뀔 수 있는 것입니다. 즉, 신경가소성이 원인이고 식습관 변화가 결과이므로, statement처럼 통곡물 선호가 신경가소성을 발생시킨다는 인과 방향은 지문과 반대입니다."},{"questionNumber":50,"passageId":5,"passageTitle":"Taste Flexibility","type":"insertion","typeLabel":"순서 맞추기","statement":"Just as kids gradually learn to like nutritious foods, so, too, can adults readjust their taste. → Many who switch from processed grain foods like white bread and white rice to whole grain types, for instance, gradually learn to prefer the nutty flavors and chewy textures.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서 'Just as kids gradually learn to like nutritious foods, so, too, can adults readjust their taste.'라는 문장 바로 뒤에 'Many who switch from processed grain foods like white bread and white rice to whole grain types, for instance, gradually learn to prefer the nutty flavors and chewy textures.'가 이어지므로 두 문장의 순서는 지문과 정확히 일치합니다. 내용 또한 왜곡 없이 지문을 그대로 반영하고 있습니다."},{"questionNumber":51,"passageId":6,"passageTitle":"Teen Conformity","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"십대의 동조 현상은 청소년들에게 집단 내 다른 사람들의 의견에 반하는 선택을 하도록 요청하는 상황에서 연구되었다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에서는 청소년들이 '집단의 의견에 반하는 것처럼 보이는 선택'을 하도록 요청받는 상황에서 연구가 진행되었다고 설명한다. 즉, 실제로 집단에 반하는 선택을 하도록 요청받은 것이 아니라, 겉보기에 집단과 다른 선택을 하도록 유도하는 상황을 설정한 것이다. statement는 'appears to go against(~에 반하는 것처럼 보이는)'라는 중요한 뉘앙스를 생략하고 단순히 '반하는 선택을 하도록 요청'한 것으로 왜곡하고 있어 X이다."},{"questionNumber":52,"passageId":6,"passageTitle":"Teen Conformity","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"동조성은 모든 연령대에 걸쳐 균등하게 나타난다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에서는 '동조성은 모든 연령대에 걸쳐 균등하게 나타나지 않는다(conformity is not spread equally across all age groups)'고 명시하고 있습니다. 동조 성향은 14세 전후에 정점을 찍고 16~17세가 되면 감소하는 양상을 보이므로, statement의 '균등하게 나타난다'는 표현은 지문 내용과 정반대입니다."},{"questionNumber":53,"passageId":6,"passageTitle":"Teen Conformity","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Teenage conformity peaks at about age 14 and then declines, showing that peer influence varies across different ages.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서 동조 성향은 14세 전후에 정점에 달하고 이후 감소하여 16~17세가 되면 집단에 반대하고 자신의 의견을 고수할 수 있게 된다고 명시되어 있습니다. 또한 지문은 또래 집단의 영향력이 모든 연령에서 동일하지 않다고 결론짓고 있어, statement의 'peer influence varies across different ages'와 정확히 일치합니다. 따라서 statement는 지문 내용과 완전히 부합합니다."},{"questionNumber":54,"passageId":6,"passageTitle":"Teen Conformity","type":"en_twist","typeLabel":"원문 변형 (영어)","statement":"The tendency to conform to others is at its highest around the age of 16.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에 따르면 동조 경향은 14세 전후에 최고조에 달한다고 명시되어 있습니다. 16세 또는 17세는 오히려 동조 경향이 감소하여 집단에 반대하고 자신의 의견을 지킬 수 있게 되는 시기입니다. statement는 최고점 연령을 16세로 잘못 기술하였으므로 X입니다."},{"questionNumber":55,"passageId":6,"passageTitle":"Teen Conformity","type":"en_twist","typeLabel":"원문 변형 (영어)","statement":"With increasing maturity, adolescents grow stronger and better equipped to stand by their own views independently.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문은 청소년이 성숙해질수록 더 회복탄력적(resilient)이 되고 자신의 의견을 개인으로서 더 잘 방어할 수 있게 된다고 명시하고 있습니다. Statement의 'grow stronger and better equipped to stand by their own views independently'는 지문의 'more resilient, and more able to defend their opinions as individuals'와 의미상 완전히 일치합니다. 왜곡이나 반전 없이 지문 내용을 정확히 paraphrase하고 있으므로 O입니다."},{"questionNumber":56,"passageId":6,"passageTitle":"Teen Conformity","type":"thats_why","typeLabel":"That's why 인과","statement":"Young people become more resilient as they mature. That's why conformity reaches its peak around age 14.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에 따르면 '성숙할수록 더 탄력적(resilient)이 된다'는 내용은 맞지만, 이는 동조성이 정점에 달하는 이유가 아니라 오히려 14세 이후 동조성이 감소하는 이유로 제시되어 있습니다. 즉, 인과 관계의 방향이 반대로 뒤집혀 있어 statement는 틀렸습니다."},{"questionNumber":57,"passageId":6,"passageTitle":"Teen Conformity","type":"ko_cause","typeLabel":"한국어 인과","statement":"14세 이후 동조 경향이 감소하므로, 16~17세가 되면 청소년은 집단에 반대하고 자신의 의견을 지킬 수 있게 된다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서 동조 경향은 14세 전후에 정점에 달한 후 감소한다고 명시되어 있으며, 16~17세가 되면 집단에 반대하고 자신의 의견을 지킬 수 있게 된다고 서술되어 있습니다. 따라서 statement의 인과 관계(14세 이후 감소 → 16~17세에 자기 의견 방어 가능)는 지문 내용과 정확히 일치합니다."},{"questionNumber":58,"passageId":6,"passageTitle":"Teen Conformity","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"16세나 17세의 청소년은 여전히 또래 집단의 영향을 강하게 받아 자기 의견을 고수하기 어렵다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에 따르면 또래 집단에 동조하려는 경향은 14세 무렵에 정점에 달한 후 감소하여, 16~17세가 되면 집단에 반대 의견을 내고 자신의 견해를 지키는 능력이 훨씬 향상된다고 명시되어 있습니다. 따라서 16~17세 청소년이 '여전히 또래 집단의 영향을 강하게 받아 자기 의견을 고수하기 어렵다'는 진술은 지문의 내용과 정반대입니다."},{"questionNumber":59,"passageId":6,"passageTitle":"Teen Conformity","type":"insertion","typeLabel":"순서 맞추기","statement":"Thus, the willingness to go along with others reaches a peak around the age of 14. → After that, this tendency decreases, so that by 16 or 17, young people are much more able to disagree with the group and to stand up for their own opinion.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서 'the willingness to go along with others reaches a peak around the age of 14. After that, this tendency decreases, so that by 16 or 17, young people are much more able to disagree with the group and to stand up for their own opinion.'라는 문장이 동일한 순서로 등장합니다. 두 문장의 내용과 순서 모두 지문과 완전히 일치하므로 O입니다."},{"questionNumber":60,"passageId":6,"passageTitle":"Teen Conformity","type":"this_leads","typeLabel":"This leads 인과","statement":"By age 16 or 17, young people defend their own opinions. This leads to conformity reaching a peak at age 14.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에 따르면 동조 성향은 14세 무렵 정점에 달하고, 그 이후인 16~17세에 이르러 개인 의견을 더 잘 고수하게 된다. 즉, '14세에 정점'이 먼저 일어나고 '16~17세에 자기 의견 방어'가 그 결과로 이어지는 것이지, statement처럼 16~17세의 의견 방어가 원인이 되어 14세의 정점을 초래하는 것이 아니다. 인과 관계의 방향이 완전히 역전되어 있으므로 X이다."},{"questionNumber":61,"passageId":7,"passageTitle":"Temptation Bundling","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"습관은 나쁜 것이 아니며 생존에 필요하고, 뇌가 습관을 어떻게 사용하는지 이해하는 것이 비즈니스에 필수적이다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문의 첫 문장 'Habits aren't bad. We need them to survive.'에서 습관은 나쁜 것이 아니며 생존에 필요하다고 명시하고 있습니다. 또한 'Understanding how the brain uses habits... is essential for business.'라는 문장에서 뇌가 습관을 어떻게 사용하는지 이해하는 것이 비즈니스에 필수적이라고 직접적으로 언급하고 있어, statement의 내용은 지문과 완전히 일치합니다."},{"questionNumber":62,"passageId":7,"passageTitle":"Temptation Bundling","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"유혹 묶기(temptation bundling)란 나쁜 습관을 완전히 끊어내는 전략이다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에서 유혹 묶기(temptation bundling)는 나쁜 습관을 끊는 전략이 아니라, 이미 즐기는 유혹적인 습관(예: 오디오북 듣기)과 새롭게 만들고 싶은 습관(예: 운동)을 결합하는 전략으로 설명된다. 즉, 습관을 '끊는' 것이 아니라 기존 습관에 '연결'하는 방식이다. 따라서 '나쁜 습관을 완전히 끊어내는 전략'이라는 설명은 지문의 내용과 정반대로 왜곡되어 있다."},{"questionNumber":63,"passageId":7,"passageTitle":"Temptation Bundling","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Rather than simply breaking a bad habit, combining a tempting activity with a desired behavior can be a more effective strategy.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문은 나쁜 습관을 단순히 끊으려 하기보다 '유혹 묶기(temptation bundling)'를 활용하는 것이 더 효과적일 수 있다고 설명합니다. Katy Milkman의 연구에서 매력적인 활동(오디오북 청취)을 원하는 행동(운동)과 결합했을 때 참가자들의 헬스장 방문율이 51% 증가했다는 결과가 이를 뒷받침합니다. 따라서 statement는 지문의 핵심 주장과 완전히 일치합니다."},{"questionNumber":64,"passageId":7,"passageTitle":"Temptation Bundling","type":"en_twist","typeLabel":"원문 변형 (영어)","statement":"Participants who could only use their audio devices at the gym were 51 percent less likely to visit the gym.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에 따르면 음향 기기를 체육관에서만 사용할 수 있었던 참가자들은 체육관을 방문할 가능성이 51% '더 높았다(more likely)'고 명시되어 있습니다. 그러나 statement는 '51% 덜 방문할 가능성이 있었다(less likely)'고 반대로 서술하고 있어 지문 내용과 정반대입니다. 따라서 핵심 수치의 방향이 왜곡된 오답입니다."},{"questionNumber":65,"passageId":7,"passageTitle":"Temptation Bundling","type":"en_twist","typeLabel":"원문 변형 (영어)","statement":"Instead of attempting to eliminate a habit, it may be more beneficial to link it with another habit, a strategy called temptation bundling.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문은 습관을 완전히 없애려 하기보다 이미 가진 습관에 새로운 습관을 결합하는 '유혹 번들링(temptation bundling)' 전략이 더 효과적일 수 있다고 설명한다. 스테이트먼트는 이 핵심 내용을 정확히 반영하고 있으며, 용어와 개념 모두 지문과 일치한다."},{"questionNumber":66,"passageId":7,"passageTitle":"Temptation Bundling","type":"thats_why","typeLabel":"That's why 인과","statement":"Liste var QS=CONFIG.questions||[];
var TOTAL=QS.length;
var SET_SIZE=10;
var SETS=(function(){var s=[];for(var i=0;i<TOTAL;i+=SET_SIZE)s.push(QS.slice(i,i+SET_SIZE));return s;})();
var answers={};var currentSet=0;
function esc(s){if(s==null)return"";var d=document.createElement("div");d.textContent=String(s);return d.innerHTML}
function setH(t,sub){var h=document.getElementById("hTitle");var p=document.getElementById("hSub");if(h)h.textContent=t;if(p)p.textContent=sub}
function gi(si,pi){return si*SET_SIZE+pi}
function showIndex(){
  setH(CONFIG.title,"OX 문제 테스트");
  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var done=0,correct=0;
    for(var i=0;i<sq.length;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===sq.length);
    var pct=done>0?Math.round(correct/sq.length*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#8b5cf6'>📝 "+done+"/"+sq.length+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"' onclick='enterSet("+si+")'>"
           +"<div><div style='font-weight:700'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400'>("+sq.length+"문제)</span></div></div>"
           +"<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div style='font-size:2.5rem;margin-bottom:8px'>📱</div>"
    +"<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>OX 문제 테스트</h2>"
    +"<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>전체 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과 · 몰라요는 오답 처리</p>"
    +"</div><div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;showQ(0)}
function showQ(pos){
  try{window.scrollTo(0,0)}catch(e){}
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length){showIndex();return;}
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  function btnClass(which){
    if(!answered)return "ox-btn "+which;
    if(answered.picked===which){
      if(which==="dunno")return "ox-btn dunno sel dunno wrong";
      return "ox-btn "+which+" "+(answered.isCorrect?"correct":"wrong");
    }
    return "ox-btn "+which;
  }
  var sourceHTML="";
  // 학생용 HTML — 원본 지문 미표시
  var fbHTML="";
  if(answered){
    var cls=answered.picked==="dunno"?"dunno":(answered.isCorrect?"ok":"ng");
    var msg=answered.picked==="dunno"?"🤔 몰라요 — 해설을 학습하세요":(answered.isCorrect?"✅ 정답!":"❌ 오답");
    fbHTML="<div class='fb "+cls+"'>"+msg+"</div>"
      +"<div class='explain-box'><div class='ex-title'>📖 정답 & 해설</div>"
      +"<div class='ex-body'><span class='ex-answer "+q.answer+"'>"+q.answer+"</span>"+(q.explanation?esc(q.explanation):"해설이 없습니다.")+"</div></div>";
  }
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade'>"
    +"<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"
    +"<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%'></div></div>"
    +"<div class='title-box'><div class='ptitle'>"+esc(q.passageTitle)+"</div>"
    +"<span class='tlabel'>"+esc(q.typeLabel||"")+"</span></div>"
    +"<div class='statement'>"+esc(q.statement)+"</div>"
    +sourceHTML
    +"<div class='ox-grid'>"
    +"<button class='"+btnClass("o")+"' onclick='pick("+pos+",&quot;o&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>⭕</span>O (맞음)</button>"
    +"<button class='"+btnClass("x")+"' onclick='pick("+pos+",&quot;x&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>❌</span>X (틀림)</button>"
    +"<button class='"+btnClass("dunno")+"' onclick='pick("+pos+",&quot;dunno&quot;)' "+(answered?"disabled":"")+">🤔 몰라요 (정답·해설 보기)</button>"
    +"</div>"
    +fbHTML
    +"<div class='nav-bar'>"
    +"<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"
    +"<button class='nav-btn home' onclick='showIndex()'>목록</button>"
    +"<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>"+(pos<qs.length-1?"다음 →":"결과")+"</button>"
    +"</div></div>";
}
function pick(pos,which){
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  var isCorrect=false;
  if(which==="dunno"){isCorrect=false;}
  else{isCorrect=(which==="o"&&q.answer==="O")||(which==="x"&&q.answer==="X");}
  answers[gidx]={picked:which,isCorrect:isCorrect};
  showQ(pos);
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0,dunno=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++;if(a&&a.picked==="dunno")dunno++;}
  var pct=Math.round(correct/total*100);var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div class='score-circle "+(passed?"pass":"fail")+"'>"+pct+"%</div>"
    +"<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"통과!":"미달")+"</p>"
    +"<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 몰라요 "+dunno+"개 · 기준 "+CONFIG.passThreshold+"%</p>"
    +"</div>"
    +"<div style='margin-top:16px'><button class='nav-btn next' style='width:100%;padding:14px' onclick='showIndex()'>목록으로</button></div>";
}
try{history.pushState(null,"",location.href);
window.addEventListener("popstate",function(){history.pushState(null,"",location.href);showIndex();});}catch(e){}
showIndex();
</script>
</body>
</html>
