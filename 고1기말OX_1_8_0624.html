<script>
var CONFIG={"title":"고1기말OX_1_8_0624","passThreshold":90,"level":"medium","levelLabel":"중3 수준 · CEFR A2","passages":[{"id":1,"title":"Cartilage Joint Function","body":"Cartilage is extremely important for the healthy functioning of a joint, especially if that joint bears weight, like your knee. Imagine for a moment that you’re looking into the inner workings of your left knee as you walk down the street. When you shift your weight from your left leg to your right, the pressure on your left knee is released. The cartilage in your left knee then “drinks in” synovial fluid, in much the same way that a sponge soaks up liquid when put in water. When you take another step and transfer the weight back onto your left leg, much of the fluid squeezes out of the cartilage. This squeezing of joint fluid into and out of the cartilage helps it respond to the off-and-on pressure of walking without breaking under the pressure.\n\n"},{"id":2,"title":"Cartilage Joint Function","body":"Cartilage is extremely important for the healthy functioning of a joint, especially if that joint bears weight, like your knee. Imagine for a moment that you’re looking into the inner workings of your left knee as you walk down the street. When you shift your weight from your left leg to your right, the pressure on your left knee is released. The cartilage in your left knee then “drinks in” synovial fluid, in much the same way that a sponge soaks up liquid when put in water. When you take another step and transfer the weight back onto your left leg, much of the fluid squeezes out of the cartilage. This squeezing of joint fluid into and out of the cartilage helps it respond to the off-and-on pressure of walking without breaking under the pressure.\n\n"},{"id":3,"title":"Numbers vs. Words","body":"Some researchers view spoken languages as incomplete devices for capturing precise differences. They think numbers represent the most neutral language of description. However, when our language of description is changed to numbers, we do not move toward greater accuracy. Numbers are no more appropriate ‘pictures of the world’ than words, music, or painting. While useful for specific purposes (e.g. census taking, income distribution), they eliminate information of enormous value. For example, the future lives of young students are tied to their scores on national tests. In effect, whether they can continue with their education, where, and at what cost depends importantly on a handful of numbers. These numbers do not account for the quality of schools they have\nattended, whether they have been tutored, have supportive parents, have test anxiety, and so on. Finally, putting aside the many ways in which statistical results can be manipulated, there are ways in which turning people’s lives into numbers is morally insulating. Statistics on crime, homelessness, or the spread of a disease say nothing of people’s suffering. We read the statistics as reports on events at a distance, thus allowing us to escape without being disturbed. Statistics are human beings with the tears wiped off. Quantify with caution. \n"},{"id":4,"title":"Personal Story Persuasion","body":"There is simply no better way to influence or stir an audience — Instantly, powerfully, authentically—than by opening up to them with a personal story or anecdote. To be clear:\nI’m not saying you need to tell them long stories about your family vacations or show them baby pictures from the stage. I’m saying that you can share a key biographical detail, or an emotion that you’re feeling in the moment, or a self-deprecating joke. It is a tried-and-tested way of bonding with an audience of strangers — and of laying the groundwork for you to then persuade them. The harsh reality is that people won’t bond with your arguments in a vacuum, but they will, says speech coach Bas van den Beld, “bond with you” — the person making those arguments. By sharing a revealing story or a personal flaw, you allow audience members a way to identify with you.\n"},{"id":5,"title":"Taste Preference Changes","body":"Despite learned eating behaviors that are formed in early childhood and inborn biological differences, taste preferences can be changed throughout our lives due to neuroplasticity,\nour brain’s amazing adaptability: There is far more flexibility in our food behaviors than most think, even as we age. This is terrific news for adventurous eaters who want to expand their dinner menu — it’s a big, tasty world out there! — but it’s amazing news for those eager to break poor diet habits. Just as kids gradually learn to like nutritious foods, so, too, can adults readjust their taste. Many who switch from processed grain foods like white bread and white rice to whole grain types, for instance, gradually learn to prefer the nutty flavors and chewy textures. Repeated exposure — and a willingness to change — is the key.\n"},{"id":6,"title":"Teenage Conformity Behavior","body":"Conformity in the teenage years has been studied by putting young people in situations where they are asked to make a choice or decision where that appears to go against what everyone else in the group is saying. The fascinating thing about the results of these studies is that conformity is not spread equally across all age groups. Thus, the willingness to go along with others reaches a peak around the age of 14. After that, this tendency decreases, so that by 16 or 17, young people are much more able to disagree with the group and to stand up for their own opinion. This is an important finding. It demonstrates that the influence of the peer group is not the same across all ages. As young people mature, they become more resilient, and more able to defend their opinions as individuals."},{"id":7,"title":"Habit Bundling Benefits","body":"Habits aren’t bad. We need them to survive. Understanding how the brain uses habits, and how you can work with them, is essential for business. One question to ask is, are you really trying to break a habit, or would you do better by attaching to another one (known as temptation bundling)? Wharton professor Katy Milkman led a research project called Holding the Hunger Games Hostage at the Gym, where participants could only have access to their audio devices while at the gym. This uses a tempting habit — listening to that awesome audiobook — and combines it with a habit people would like to build, but may otherwise feel forced to put off, like exercising. The participants whose devices were “held hostage” were 51 percent more likely to visit the gym. And the really amazing thing is what happened after it was over: nearly two-thirds opted to pay to have gym-only access for their devices!"},{"id":8,"title":"Graffman's Musical Journey","body":"Gary Graffman was born in New York City in 1928 and began playing the piano at the age of three. When he was seven, he entered the Curtis Institute of Music, where he\nreceived training that laid the foundation for his career. In 1949, he won the Leventritt Award and then played concerts worldwide. In the late 1970s, Graffman lost control of the fingers on his right hand, but he never gave up playing the piano. Reconsidering the traditional piano performance convention of using both hands, he focused on works for the left hand alone, such as Ravel’s Piano Concerto for the Left Hand. Graffman returned to the Curtis Institute of Music in 1980 as a member of the piano faculty. There he taught many outstanding young musicians, including Lang Lang, and his lifelong commitment to music continues to inspire people today.\n"}],"questions":[{"questionNumber":1,"passageId":1,"passageTitle":"Cartilage Joint Function","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"연골은 특히 체중을 지탱하는 관절에서 건강한 기능을 위해 매우 중요하다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문의 첫 문장 'Cartilage is extremely important for the healthy functioning of a joint, especially if that joint bears weight, like your knee.'와 statement의 내용이 정확히 일치한다. '연골은 특히 체중을 지탱하는 관절에서 건강한 기능을 위해 매우 중요하다'는 표현은 원문의 의미를 왜곡 없이 옮긴 것이다."},{"questionNumber":2,"passageId":1,"passageTitle":"Cartilage Joint Function","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"왼쪽 다리에서 오른쪽 다리로 체중을 옮기면, 왼쪽 무릎에 가해지는 압력이 증가한다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에 따르면, 왼쪽 다리에서 오른쪽 다리로 체중을 옮기면 왼쪽 무릎에 가해지는 압력이 '해제(released)'된다고 명시되어 있습니다. 즉, 압력이 증가하는 것이 아니라 감소합니다. statement는 압력의 변화 방향을 정반대로 서술하고 있으므로 X입니다."},{"questionNumber":3,"passageId":1,"passageTitle":"Cartilage Joint Function","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"연골이 활액을 흡수하는 방식은 스펀지가 물 속에서 액체를 빨아들이는 방식과 매우 유사하다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서는 연골이 활액(synovial fluid)을 '흡수'하는 방식이 스펀지가 물 속에 놓였을 때 액체를 빨아들이는 방식과 매우 유사하다고 명시하고 있습니다('in much the same way that a sponge soaks up liquid when put in water'). 따라서 해당 statement는 지문의 내용과 완전히 일치합니다."},{"questionNumber":4,"passageId":1,"passageTitle":"Cartilage Joint Function","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The cartilage absorbs synovial fluid when weight is placed back onto the left leg.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에 따르면 연골이 활액(synovial fluid)을 흡수하는 것은 왼쪽 다리의 체중이 '해제될 때(released)'이며, 이는 체중이 오른발로 이동할 때 발생합니다. 반대로 체중이 다시 왼발로 실릴 때는 연골에서 액체가 '짜져 나오는(squeezes out)' 것이 맞습니다. 따라서 statement는 원인과 결과의 방향이 지문과 정반대로 기술되어 있으므로 X입니다."},{"questionNumber":5,"passageId":1,"passageTitle":"Cartilage Joint Function","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The repeated squeezing of joint fluid in and out of cartilage allows it to handle the on-and-off pressure of walking without breaking.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문 마지막 문장에서 '관절액이 연골 안팎으로 짜여 나오는 것(squeezing of joint fluid into and out of the cartilage)이 연골로 하여금 걷는 동안의 간헐적인 압력에 부서지지 않고 반응할 수 있게 해준다'고 명시되어 있습니다. Statement는 이 내용을 'repeated squeezing'이라는 표현으로 정확히 옮기고 있으며, 인과 방향 및 세부 내용 모두 지문과 일치합니다."},{"questionNumber":6,"passageId":1,"passageTitle":"Cartilage Joint Function","type":"grammar","typeLabel":"문법 OX","statement":"This squeezing of joint fluid into and out of the cartilage help it respond to the off-and-on pressure of walking without breaking under the pressure.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"주어인 'This squeezing of joint fluid into and out of the cartilage'는 동명사구로 이루어진 단수 주어이므로, 동사는 'help'가 아니라 'helps'가 되어야 합니다. 원문에서도 'helps'로 쓰여 있으며, 단수 주어에 3인칭 단수 동사형을 사용하지 않은 것이 문법 오류입니다."},{"questionNumber":7,"passageId":1,"passageTitle":"Cartilage Joint Function","type":"context_vocab","typeLabel":"문맥 어휘 OX","statement":"표현: drinks in → 액체를 천천히 빨아들이다","sourceSentence":null,"expression":"drinks in","contextSentence":"The cartilage in your left knee then \"drinks in\" synovial fluid, in much the same way that a sponge soaks up liquid when put in water.","answer":"X","explanation":"'drinks in'은 지문에서 연골이 관절액을 흡수하는 동작을 묘사하며, 스펀지가 물을 빨아들이는 것에 비유되어 있습니다. 이는 단순히 액체를 흡수한다는 의미이며, 한글 의미에 포함된 '천천히'라는 속도 개념은 지문에서 명시되거나 암시되지 않습니다. 따라서 '천천히'라는 핵심 수식어가 추가되어 원래 의미와 차이가 있으므로 X로 판정합니다."},{"questionNumber":8,"passageId":2,"passageTitle":"Cartilage Joint Function","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"무릎 연골은 체중이 실릴 때 활액(synovial fluid)을 흡수한다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에 따르면 연골은 체중이 실릴 때(압력이 가해질 때)가 아니라, 반대로 체중이 빠질 때(압력이 해제될 때) 활액을 흡수(drink in)한다. 체중이 다시 실리면 오히려 활액이 연골 밖으로 짜져 나온다. 따라서 이 statement는 흡수 시점이 지문과 정반대로 서술되어 있으므로 X이다."},{"questionNumber":9,"passageId":2,"passageTitle":"Cartilage Joint Function","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"왼쪽 다리에서 오른쪽 다리로 체중을 옮기면 왼쪽 무릎의 압력이 풀린다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서 'When you shift your weight from your left leg to your right, the pressure on your left knee is released.'라고 명시되어 있습니다. 이는 왼쪽 다리에서 오른쪽 다리로 체중을 옮기면 왼쪽 무릎의 압력이 풀린다는 statement와 완전히 일치합니다."},{"questionNumber":10,"passageId":2,"passageTitle":"Cartilage Joint Function","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Cartilage squeezes out joint fluid when weight is removed from the knee.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에 따르면 연골은 무게가 실릴 때(weight on) 관절액을 짜내고, 무게가 제거될 때(weight off) 관절액을 흡수(drink in)합니다. Statement는 이 관계를 반대로 서술하고 있으므로 틀렸습니다. 즉, 무게가 제거되면 연골은 액체를 흡수하고, 무게가 가해지면 액체를 짜냅니다."},{"questionNumber":11,"passageId":2,"passageTitle":"Cartilage Joint Function","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The movement of synovial fluid in and out of cartilage helps it handle the repeated pressure of walking.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문은 연골이 걷는 동안 압력이 가해졌다 풀렸다 반복될 때 활액(synovial fluid)이 연골 안으로 흡수되었다가 다시 밀려 나오는 과정을 설명하며, 이 움직임이 연골이 지속적인 압력에 부러지지 않고 견딜 수 있도록 돕는다고 명시하고 있습니다. Statement는 이 내용과 정확히 일치하여 활액의 유입·유출이 걷기의 반복적인 압력을 처리하는 데 도움을 준다고 올바르게 서술하고 있습니다."},{"questionNumber":12,"passageId":2,"passageTitle":"Cartilage Joint Function","type":"context_vocab","typeLabel":"문맥 어휘 OX","statement":"표현: drinks in → 액체를 빨아들이듯 흡수하다","sourceSentence":null,"expression":"drinks in","contextSentence":"The cartilage in your left knee then \"drinks in\" synovial fluid, in much the same way that a sponge soaks up liquid when put in water.","answer":"O","explanation":"'drinks in'은 지문에서 연골이 활액(synovial fluid)을 흡수하는 과정을 묘사하는 표현으로, 스펀지가 물을 빨아들이는 것과 같다고 비유하고 있습니다. 이는 '액체를 빨아들이듯 흡수하다'는 한글 의미와 정확히 일치합니다. 따라서 지문의 맥락에서 해당 표현의 의미가 올바르게 제시되었습니다."},{"questionNumber":13,"passageId":2,"passageTitle":"Cartilage Joint Function","type":"context_vocab","typeLabel":"문맥 어휘 OX","statement":"표현: bears weight → 무게를 들어 올리다","sourceSentence":null,"expression":"bears weight","contextSentence":"Cartilage is extremely important for the healthy functioning of a joint, especially if that joint bears weight, like your knee.","answer":"X","explanation":"지문에서 'bears weight'는 'especially if that joint bears weight, like your knee'라는 문맥에서 사용되었으며, 여기서의 의미는 '무게를 지탱하다(감당하다)'입니다. '무게를 들어 올리다'는 lift weight에 해당하는 표현으로, 지문의 맥락과는 다릅니다. 무릎 관절은 체중을 위로 들어 올리는 것이 아니라 아래에서 받쳐 지탱하는 역할을 하므로, 제시된 한글 의미는 틀렸습니다."},{"questionNumber":14,"passageId":2,"passageTitle":"Cartilage Joint Function","type":"grammar","typeLabel":"문법 OX","statement":"This squeezing of joint fluid into and out of the cartilage help it respond to the off-and-on pressure of walking without breaking under the pressure.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"주어 'This squeezing of joint fluid into and out of the cartilage'는 동명사구로 단수 취급되므로, 동사는 'help'가 아닌 'helps'가 되어야 합니다. 원문에서도 'helps'로 쓰여 있어 수일치가 올바르게 적용되어 있습니다. 따라서 이 statement는 동사의 수일치 오류를 포함하고 있습니다."},{"questionNumber":15,"passageId":3,"passageTitle":"Numbers vs. Words","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"일부 연구자들은 말로 된 언어가 정확한 차이를 포착하기에 불완전한 도구라고 생각하며, 숫자가 가장 중립적인 설명 언어라고 본다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문의 첫 두 문장에서 '일부 연구자들은 말로 된 언어를 정확한 차이를 포착하기 위한 불완전한 도구로 본다(Some researchers view spoken languages as incomplete devices for capturing precise differences)'고 명시되어 있으며, '그들은 숫자가 가장 중립적인 설명 언어라고 생각한다(They think numbers represent the most neutral language of description)'고 이어집니다. 해당 statement는 이 두 문장의 내용을 정확히 반영하고 있으므로 O입니다."},{"questionNumber":16,"passageId":3,"passageTitle":"Numbers vs. Words","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"지문에 따르면, 설명의 언어를 숫자로 바꾸면 더 높은 정확성에 가까워진다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문은 '설명의 언어를 숫자로 바꿔도 더 높은 정확성에 가까워지지 않는다(we do not move toward greater accuracy)'고 명시하고 있다. 즉, 해당 statement는 지문의 내용과 정반대되는 주장이다. 숫자는 단어, 음악, 그림보다 더 적절한 '세계의 그림'이 아니라고 저자는 강조한다."},{"questionNumber":17,"passageId":3,"passageTitle":"Numbers vs. Words","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"학생들의 시험 점수는 그들이 다닌 학교의 수준, 개인 과외 여부, 부모의 지원 등 다양한 요인을 반영하지 못한다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서는 시험 점수가 학생들이 다닌 학교의 질, 과외 여부, 지지적인 부모의 존재, 시험 불안 등을 반영하지 못한다고 명시적으로 언급하고 있다. Statement는 이 내용을 '학교의 수준, 개인 과외 여부, 부모의 지원 등 다양한 요인을 반영하지 못한다'고 정확히 요약하고 있으며, 지문의 의미와 완전히 일치한다."},{"questionNumber":18,"passageId":3,"passageTitle":"Numbers vs. Words","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"According to the passage, statistics about crime or homelessness help people deeply understand the suffering of individuals.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에서는 범죄나 노숙에 관한 통계가 사람들의 고통에 대해 아무것도 말해주지 않는다고 명시되어 있습니다. 오히려 통계는 독자로 하여금 사건을 거리를 두고 바라보게 하여 불편함 없이 빠져나갈 수 있게 한다고 설명합니다. 따라서 통계가 개인의 고통을 깊이 이해하는 데 도움을 준다는 statement는 지문 내용과 정반대입니다."},{"questionNumber":19,"passageId":3,"passageTitle":"Numbers vs. Words","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The passage argues that turning people's lives into numbers can make readers feel emotionally detached from others' pain.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문은 통계나 숫자로 사람들의 삶을 표현하면 독자들이 타인의 고통으로부터 거리를 두고 감정적으로 무감각해질 수 있다고 주장한다. 특히 'turning people's lives into numbers is morally insulating'이라는 표현과 'we read the statistics as reports on events at a distance, thus allowing us to escape without being disturbed'라는 문장이 이를 직접적으로 뒷받침한다. Statement의 '감정적으로 거리감을 느끼게 한다(emotionally detached)'는 표현은 지문의 내용과 정확히 일치한다."},{"questionNumber":20,"passageId":3,"passageTitle":"Numbers vs. Words","type":"grammar","typeLabel":"문법 OX","statement":"Numbers are no more appropriate pictures of the world than words, music, or painting.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":""},{"questionNumber":21,"passageId":3,"passageTitle":"Numbers vs. Words","type":"context_vocab","typeLabel":"문맥 어휘 OX","statement":"표현: morally insulating → 다른 사람의 고통으로부터 도덕적으로 차단되게 만드는","sourceSentence":null,"expression":"morally insulating","contextSentence":"there are ways in which turning people's lives into numbers is morally insulating.","answer":"O","explanation":"'morally insulating'은 지문에서 사람들의 삶을 숫자로 전환하는 행위가 도덕적 감수성을 차단하는 효과를 낸다는 맥락에서 사용되었다. 이어지는 문장에서 통계는 고통을 담지 않으며, 우리가 그것을 '먼 곳의 사건에 대한 보고'로 읽음으로써 마음의 동요 없이 벗어날 수 있게 해준다고 설명하고 있다. 따라서 '다른 사람의 고통으로부터 도덕적으로 차단되게 만드는'이라는 한글 의미는 지문 맥락과 정확히 일치한다."},{"questionNumber":22,"passageId":4,"passageTitle":"Personal Story Persuasion","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"글쓴이는 청중에게 영향을 미치는 가장 좋은 방법이 개인적인 이야기를 공유하는 것이라고 말한다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문의 첫 문장에서 글쓴이는 '개인적인 이야기나 일화로 청중에게 마음을 열어 보이는 것'이 청중에게 즉각적이고 강력하며 진정성 있게 영향을 미치거나 감동을 주는 '가장 좋은 방법'이라고 명시하고 있다. 이는 statement의 내용과 완전히 일치한다."},{"questionNumber":23,"passageId":4,"passageTitle":"Personal Story Persuasion","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"글쓴이는 연단에서 가족 여행 이야기나 어린 시절 사진을 보여줄 것을 권장한다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"글쓴이는 오히려 긴 가족 여행 이야기나 연단에서 아기 사진을 보여주는 것이 필요하지 않다고 명시적으로 말하고 있다. 대신 핵심적인 자전적 세부 사항, 현재 느끼는 감정, 또는 자기비하적 농담을 공유할 것을 권장한다. 따라서 statement는 지문 내용과 정반대의 내용을 주장하고 있으므로 X이다."},{"questionNumber":24,"passageId":4,"passageTitle":"Personal Story Persuasion","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"According to the passage, people tend to bond with the arguments themselves rather than with the speaker making those arguments.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에서는 'people won't bond with your arguments in a vacuum, but they will bond with you — the person making those arguments'라고 명시하고 있다. 즉, 사람들은 논거 자체가 아니라 그 논거를 펼치는 화자(사람)와 유대감을 형성한다는 것이 지문의 핵심 내용이다. statement는 이와 정반대의 내용을 주장하므로 X이다."},{"questionNumber":25,"passageId":4,"passageTitle":"Personal Story Persuasion","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Sharing a personal flaw or revealing story helps audience members find a way to identify with the speaker.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문의 마지막 문장에서 'By sharing a revealing story or a personal flaw, you allow audience members a way to identify with you.'라고 명시되어 있습니다. Statement는 이 내용을 그대로 반영하고 있으며, 주어와 목적어의 관계 및 인과 방향도 정확히 일치합니다."},{"questionNumber":26,"passageId":4,"passageTitle":"Personal Story Persuasion","type":"grammar","typeLabel":"문법 OX","statement":"It is a tried-and-tested way of bond with an audience of strangers.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"문장에서 'of bond'는 문법적으로 틀렸습니다. 전치사 'of' 뒤에는 명사 또는 동명사가 와야 하므로, 원문처럼 'of bonding'이 올바른 형태입니다. 즉, 'bond'를 'bonding'으로 수정해야 합니다."},{"questionNumber":27,"passageId":4,"passageTitle":"Personal Story Persuasion","type":"context_vocab","typeLabel":"문맥 어휘 OX","statement":"표현: laying the groundwork → 상대방을 설득하기 위한 기반을 미리 마련하다","sourceSentence":null,"expression":"laying the groundwork","contextSentence":"It is a tried-and-tested way of bonding with an audience of strangers — and of laying the groundwork for you to then persuade them.","answer":"O","explanation":"'laying the groundwork'는 문자 그대로 '기초를 닦다/기반을 마련하다'라는 의미이며, 지문에서는 개인적인 이야기를 통해 청중과 유대감을 형성함으로써 '그들을 설득하기 위한 기반을 마련한다(laying the groundwork for you to then persuade them)'고 명시적으로 쓰였다. 따라서 제시된 한글 의미 '상대방을 설득하기 위한 기반을 미리 마련하다'는 지문의 맥락과 정확히 일치한다."},{"questionNumber":28,"passageId":4,"passageTitle":"Personal Story Persuasion","type":"context_vocab","typeLabel":"문맥 어휘 OX","statement":"표현: in a vacuum → 주변의 도움을 받으며","sourceSentence":null,"expression":"in a vacuum","contextSentence":"The harsh reality is that people won't bond with your arguments in a vacuum.","answer":"X","explanation":"'in a vacuum'은 '진공 상태에서', 즉 '다른 맥락이나 관계없이 고립된 상태로'라는 의미입니다. 지문에서 'people won't bond with your arguments in a vacuum'은 '사람들은 논거 자체만으로는(고립된 채로는) 유대감을 형성하지 않는다'는 뜻입니다. 제시된 한글 의미 '주변의 도움을 받으며'는 이와 반대되는 뉘앙스로, 올바르지 않습니다."},{"questionNumber":29,"passageId":5,"passageTitle":"Taste Preference Changes","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"어릴 때 형성된 식습관과 타고난 생물학적 차이에도 불구하고, 뇌의 적응 능력 덕분에 미각 선호도는 평생에 걸쳐 변할 수 있다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문은 '어릴 때 형성된 학습된 식습관과 타고난 생물학적 차이에도 불구하고(Despite learned eating behaviors that are formed in early childhood and inborn biological differences), 신경가소성 덕분에 미각 선호도는 평생에 걸쳐 변할 수 있다'고 명시하고 있다. statement의 '뇌의 적응 능력'은 지문의 'neuroplasticity(신경가소성), our brain's amazing adaptability'를 정확히 반영한다. 인과 관계 및 세부 내용 모두 지문과 일치한다."},{"questionNumber":30,"passageId":5,"passageTitle":"Taste Preference Changes","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"흰 빵이나 흰 쌀밥 같은 가공 곡물 식품에서 통곡물 식품으로 바꾸면, 사람들은 점차 단맛과 쫄깃한 식감을 선호하게 된다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에서는 통곡물 식품으로 전환한 사람들이 점차 '고소한 맛(nutty flavors)과 쫄깃한 식감(chewy textures)'을 선호하게 된다고 설명하고 있습니다. 그러나 statement는 '단맛(단맛)'을 선호하게 된다고 서술하여 'nutty flavors'를 '단맛'으로 잘못 표현하였습니다. 핵심 단어가 왜곡되었으므로 X입니다."},{"questionNumber":31,"passageId":5,"passageTitle":"Taste Preference Changes","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"아이들이 서서히 영양가 있는 음식을 좋아하게 되는 것처럼, 어른들도 입맛을 다시 조정할 수 있다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에는 'Just as kids gradually learn to like nutritious foods, so, too, can adults readjust their taste.'라는 문장이 명시되어 있습니다. 이는 statement의 내용과 정확히 일치하며, 아이들이 서서히 영양가 있는 음식을 좋아하게 되듯 어른들도 입맛을 재조정할 수 있다는 내용을 그대로 반영합니다."},{"questionNumber":32,"passageId":5,"passageTitle":"Taste Preference Changes","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"According to the passage, repeated exposure to new foods and a willingness to change are essential to shifting taste preferences.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문의 마지막 문장에서 'Repeated exposure — and a willingness to change — is the key.'라고 명시하고 있어, 반복적인 노출과 변화에 대한 의지가 맛 선호도 변화의 핵심 요소임을 직접적으로 언급한다. Statement는 이를 'essential to shifting taste preferences'로 표현하였는데, 이는 지문의 'the key'와 의미상 완전히 일치한다. 따라서 statement는 지문 내용과 완전히 부합하므로 O로 판정한다."},{"questionNumber":33,"passageId":5,"passageTitle":"Taste Preference Changes","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The passage suggests that food preferences become fixed and impossible to change as people grow older.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문은 신경가소성(neuroplasticity) 덕분에 나이가 들어도 음식 취향은 변할 수 있다고 명시하고 있습니다. 특히 '나이가 들어도 우리의 식습관에는 대부분이 생각하는 것보다 훨씬 더 많은 유연성이 있다'고 직접 언급하며, 성인도 취향을 재조정할 수 있다고 강조합니다. 따라서 음식 취향이 고정되어 변할 수 없다는 statement는 지문 내용과 정반대입니다."},{"questionNumber":34,"passageId":5,"passageTitle":"Taste Preference Changes","type":"grammar","typeLabel":"문법 OX","statement":"Just as kids gradually learn to like nutritious foods, so, too, can adults readjust their taste.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"이 문장은 'Just as A, so too can B'라는 비교 구문을 올바르게 사용하고 있습니다. 'so too can adults'는 도치 구문으로 문법적으로 정확하며, 'readjust their taste'의 동사 형태와 수일치도 모두 적절합니다. 시제, 관사, 전치사 등 모든 문법 요소에 오류가 없습니다."},{"questionNumber":35,"passageId":5,"passageTitle":"Taste Preference Changes","type":"context_vocab","typeLabel":"문맥 어휘 OX","statement":"표현: neuroplasticity → 뇌가 경험에 따라 스스로를 재구성하는 능력","sourceSentence":null,"expression":"neuroplasticity","contextSentence":"taste preferences can be changed throughout our lives due to neuroplasticity, our brain's amazing adaptability","answer":"O","explanation":"지문에서 neuroplasticity는 'our brain's amazing adaptability(뇌의 놀라운 적응력)'로 설명되며, 이로 인해 평생에 걸쳐 미각 선호도가 변할 수 있다고 제시된다. 제시된 한글 의미 '뇌가 경험에 따라 스스로를 재구성하는 능력'은 지문의 맥락(반복적 노출과 의지를 통해 미각이 바뀐다는 내용)과 잘 부합한다. 따라서 해당 표현의 맥락적 의미와 일치하므로 O로 판정한다."},{"questionNumber":36,"passageId":6,"passageTitle":"Teenage Conformity Behavior","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"청소년의 동조 성향은 14세 무렵에 정점에 달한다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서 'the willingness to go along with others reaches a peak around the age of 14'라고 명시하고 있으며, 이는 동조 성향이 14세 무렵에 정점에 달한다는 statement와 완전히 일치합니다. 따라서 이 진술은 지문 내용을 정확히 반영하고 있습니다."},{"questionNumber":37,"passageId":6,"passageTitle":"Teenage Conformity Behavior","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"16~17세가 되면, 청소년들은 집단의 의견에 더욱 쉽게 동조하게 된다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에 따르면 동조 성향은 14세 무렵에 정점에 달한 후 감소하며, 16~17세가 되면 집단의 의견에 반대하고 자신의 의견을 지킬 수 있는 능력이 훨씬 더 커진다고 서술되어 있습니다. 따라서 '더욱 쉽게 동조하게 된다'는 진술은 지문의 내용과 정반대입니다."},{"questionNumber":38,"passageId":6,"passageTitle":"Teenage Conformity Behavior","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Studies show that conformity is spread equally across all teenage age groups.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문은 'conformity is not spread equally across all age groups'라고 명시하며, 순응성이 모든 연령대에 균등하게 분포되지 않는다고 밝히고 있습니다. 오히려 순응성은 14세 전후에 정점을 찍고 이후 감소하는 경향을 보입니다. 따라서 'conformity is spread equally across all teenage age groups'라는 statement는 지문의 내용과 정반대이므로 X입니다."},{"questionNumber":39,"passageId":6,"passageTitle":"Teenage Conformity Behavior","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"As teenagers grow older, they become more capable of standing up for their own opinions.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서는 순응하려는 경향이 14세에 정점을 찍은 후 16~17세가 되면 그룹에 반대하고 자신의 의견을 고수할 수 있는 능력이 훨씬 커진다고 명시하고 있습니다. 또한 청소년이 성숙해질수록 더 강인해지고 개인으로서 자신의 의견을 방어할 수 있게 된다고 설명합니다. 따라서 'teenagers grow older → more capable of standing up for their own opinions'는 지문 내용과 완전히 일치합니다."},{"questionNumber":40,"passageId":6,"passageTitle":"Teenage Conformity Behavior","type":"grammar","typeLabel":"문법 OX","statement":"Conformity in the teenage years have been studied by putting young people in situations where they are asked to make a choice.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"주어 'Conformity'는 불가산 단수 명사이므로 동사는 'have been'이 아닌 'has been'이 되어야 합니다. 즉, 수일치(subject-verb agreement) 오류가 존재합니다. 원문에서도 'has been studied'로 올바르게 사용되고 있습니다."},{"questionNumber":41,"passageId":6,"passageTitle":"Teenage Conformity Behavior","type":"context_vocab","typeLabel":"문맥 어휘 OX","statement":"표현: go along with → 다른 사람의 생각이나 행동을 따르다","sourceSentence":null,"expression":"go along with","contextSentence":"The willingness to go along with others reaches a peak around the age of 14.","answer":"O","explanation":"'go along with others'는 지문에서 또래 집단의 의견에 동조하는 행동을 설명하는 맥락에서 사용되었습니다. 이는 '다른 사람의 생각이나 행동을 따르다'는 한글 의미와 정확히 일치합니다. 지문 전체의 흐름상 이 표현은 집단의 의견에 맞춰 자신의 선택을 바꾸는 동조(conformity) 행동을 나타냅니다."},{"questionNumber":42,"passageId":6,"passageTitle":"Teenage Conformity Behavior","type":"context_vocab","typeLabel":"문맥 어휘 OX","statement":"표현: stand up for → 자신의 의견을 포기하다","sourceSentence":null,"expression":"stand up for","contextSentence":"Young people are much more able to disagree with the group and to stand up for their own opinion.","answer":"X","explanation":"'stand up for'는 지문에서 'stand up for their own opinion'이라는 형태로 사용되었으며, 이는 '자신의 의견을 지지하다/옹호하다'라는 의미입니다. 제시된 한글 의미인 '자신의 의견을 포기하다'는 정반대의 뜻으로, 지문의 맥락과 완전히 일치하지 않습니다."},{"questionNumber":43,"passageId":7,"passageTitle":"Habit Bundling Benefits","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"와튼 스쿨의 케이티 밀크먼 교수는 체육관에서만 오디오 기기를 사용할 수 있도록 한 연구를 진행했다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에 따르면 와튼 스쿨(Wharton) 교수인 케이티 밀크먼(Katy Milkman)이 'Holding the Hunger Games Hostage at the Gym'이라는 연구를 진행했으며, 참가자들은 체육관에 있는 동안에만 오디오 기기에 접근할 수 있었다고 명시되어 있습니다. 따라서 해당 statement는 지문 내용과 완전히 일치합니다."},{"questionNumber":44,"passageId":7,"passageTitle":"Habit Bundling Benefits","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"기기를 '인질로 잡힌' 참가자들은 체육관을 방문할 가능성이 약 61퍼센트 더 높았다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에 따르면 기기를 '인질로 잡힌' 참가자들은 체육관을 방문할 가능성이 51퍼센트 더 높았다고 명시되어 있다. Statement에서는 이를 '약 61퍼센트'라고 잘못 서술하고 있으므로 수치가 일치하지 않는다."},{"questionNumber":45,"passageId":7,"passageTitle":"Habit Bundling Benefits","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"연구가 끝난 후, 참가자들의 거의 3분의 2가 체육관 전용 기기 접근에 돈을 내겠다고 선택했다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서 'nearly two-thirds opted to pay to have gym-only access for their devices'라고 명시되어 있으며, 이는 연구 종료 후 참가자들의 거의 3분의 2가 체육관 전용 기기 접근을 위해 비용을 지불하기로 선택했다는 것을 의미합니다. Statement의 내용은 지문과 완전히 일치합니다."},{"questionNumber":46,"passageId":7,"passageTitle":"Habit Bundling Benefits","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Temptation bundling means replacing a bad habit with a completely new one.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에서 temptation bundling은 이미 갖고 있는 유혹적인 습관(예: 오디오북 듣기)을 새로 형성하고 싶은 습관(예: 운동)과 결합하는 방법으로 설명된다. 즉, 나쁜 습관을 완전히 새로운 것으로 '대체'하는 것이 아니라, 기존의 매력적인 습관에 원하는 습관을 '연결'하는 전략이다. 따라서 'replacing a bad habit with a completely new one'이라는 설명은 지문의 내용을 왜곡한 것이다."},{"questionNumber":47,"passageId":7,"passageTitle":"Habit Bundling Benefits","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The brain's use of habits is described as something worth understanding for business purposes.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에서 'Understanding how the brain uses habits, and how you can work with them, is essential for business'라고 명시적으로 언급되어 있습니다. 즉, 뇌가 습관을 활용하는 방식을 이해하는 것이 비즈니스에 필수적(essential)이라고 서술되어 있으므로, 해당 statement는 지문 내용과 완전히 일치합니다."},{"questionNumber":48,"passageId":7,"passageTitle":"Habit Bundling Benefits","type":"grammar","typeLabel":"문법 OX","statement":"Understanding how the brain uses habits, and how you can work with them, are essential for business.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"주어가 'Understanding how the brain uses habits, and how you can work with them'으로, 두 개의 간접의문절을 'and'로 연결한 형태처럼 보이지만, 전체 주어는 동명사구 하나로 취급되어 단수 동사가 필요합니다. 따라서 'are essential'이 아니라 'is essential'이 올바른 형태입니다. 원문에서도 'is essential for business'로 표현되어 있습니다."},{"questionNumber":49,"passageId":7,"passageTitle":"Habit Bundling Benefits","type":"context_vocab","typeLabel":"문맥 어휘 OX","statement":"표현: put off → 하기 싫어서 계속 미루다","sourceSentence":null,"expression":"put off","contextSentence":"...a habit people would like to build, but may otherwise feel forced to put off, like exercising.","answer":"X","explanation":"지문에서 'put off'는 '(하고 싶지만) 미루게 되는' 맥락으로 쓰였습니다. 즉, 운동처럼 하고 싶은 습관이지만 실행을 미루게 되는 상황을 나타내며, '하기 싫어서' 미룬다는 부정적 감정이 전제된 의미와는 차이가 있습니다. 'put off'의 핵심은 '미루다'이지만, 지문의 맥락은 의지는 있으나 실천이 어려워 미뤄지는 상황이므로 '하기 싫어서'라는 한글 의미는 정확하지 않습니다."},{"questionNumber":50,"passageId":8,"passageTitle":"Graffman's Musical Journey","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Gary Graffman은 뉴욕에서 태어났으며, 네 살 때 피아노를 치기 시작했다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에 따르면 Gary Graffman은 뉴욕에서 태어난 것은 맞지만, 피아노를 시작한 나이는 세 살(age of three)이라고 명시되어 있습니다. Statement에서는 '네 살'이라고 기술하여 나이를 잘못 표기하였으므로 X입니다."},{"questionNumber":51,"passageId":8,"passageTitle":"Graffman's Musical Journey","type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Graffman은 1949년에 Leventritt Award를 수상한 후 전 세계에서 연주 활동을 했다.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에 'In 1949, he won the Leventritt Award and then played concerts worldwide.'라고 명시되어 있습니다. Graffman이 1949년에 Leventritt Award를 수상한 후 전 세계에서 연주 활동을 했다는 내용이 지문과 정확히 일치합니다."},{"questionNumber":52,"passageId":8,"passageTitle":"Graffman's Musical Journey","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"After losing control of his right hand fingers, Graffman quit performing and focused on teaching at Curtis Institute.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"X","explanation":"지문에 따르면 Graffman은 오른손 손가락의 제어력을 잃은 후에도 피아노 연주를 포기하지 않고(never gave up playing), 왼손만을 위한 작품들에 집중하며 연주 활동을 이어갔습니다. Statement는 그가 연주를 그만두고 교육에만 전념했다고 주장하지만, 이는 지문의 내용과 정반대입니다. 또한 Curtis Institute 복귀(1980년)는 오른손 문제 이후의 일이지만, 지문은 그가 연주를 포기했다는 어떤 내용도 뒷받침하지 않습니다."},{"questionNumber":53,"passageId":8,"passageTitle":"Graffman's Musical Journey","type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Graffman returned to the Curtis Institute of Music in 1980 and became a member of the piano faculty.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"지문에는 'Graffman returned to the Curtis Institute of Music in 1980 as a member of the piano faculty'라고 명시되어 있습니다. Statement는 이를 '1980년에 커티스 음악원으로 돌아와 피아노 교수진의 일원이 되었다'고 표현하고 있으며, 이는 지문 내용과 완전히 일치합니다."},{"questionNumber":54,"passageId":8,"passageTitle":"Graffman's Musical Journey","type":"context_vocab","typeLabel":"문맥 어휘 OX","statement":"표현: laid the foundation for → ~의 기반을 마련했다","sourceSentence":null,"expression":"laid the foundation for","contextSentence":"he entered the Curtis Institute of Music, where he received training that laid the foundation for his career.","answer":"O","explanation":"'laid the foundation for his career'에서 'lay the foundation for'는 '~의 기반을 마련하다'라는 의미로 쓰였습니다. 지문에서 커티스 음악원에서 받은 훈련이 그의 경력의 토대가 되었다는 맥락과 정확히 일치합니다. 따라서 제시된 한글 의미는 지문의 맥락에서 올바르게 대응됩니다."},{"questionNumber":55,"passageId":8,"passageTitle":"Graffman's Musical Journey","type":"context_vocab","typeLabel":"문맥 어휘 OX","statement":"표현: never gave up → 결국 포기했다","sourceSentence":null,"expression":"never gave up","contextSentence":"Graffman lost control of the fingers on his right hand, but he never gave up playing the piano.","answer":"X","explanation":"'never gave up'는 '결코 포기하지 않았다'는 의미입니다. 지문에서 Graffman은 오른손 손가락의 제어력을 잃었음에도 피아노 연주를 포기하지 않고 왼손 작품에 집중했다고 서술되어 있습니다. 제시된 한글 의미 '결국 포기했다'는 원문과 정반대의 의미이므로 X입니다."},{"questionNumber":56,"passageId":8,"passageTitle":"Graffman's Musical Journey","type":"grammar","typeLabel":"문법 OX","statement":"He focused on works for the left hand alone, such as Ravel's Piano Concerto for the Left Hand.","sourceSentence":null,"expression":null,"contextSentence":null,"answer":"O","explanation":"이 문장은 문법적으로 완전히 올바릅니다. 주어 'He'와 동사 'focused'의 수일치가 맞고, 전치사 'for'와 'on'의 사용도 적절합니다. 'such as'를 이용한 예시 표현도 문법적으로 정확하며, 시제(과거)도 지문의 맥락과 일치합니다."}]};

  var chips=SETS.map(function(sq,si){
    var base=si*SET_SIZE;var done=0,correct=0;
    for(var i=0;i<sq.length;i++){var a=answers[base+i];if(a){done++;if(a.isCorrect)correct++;}}
    var allDone=(done===sq.length);
    var pct=done>0?Math.round(correct/sq.length*100):null;
    var passed=pct!==null&&pct>=CONFIG.passThreshold;
    var scoreHTML=pct===null
      ?"<span style='font-size:.78rem;color:#9ca3af'>미응시</span>"
      :(allDone?"<span style='font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"✅ ":"❌ ")+pct+"%</span>"
             :"<span style='font-weight:700;color:#8b5cf6'>📝 "+done+"/"+sq.length+"</span>");
    return "<div class='set-card"+(allDone?" done":"")+"' onclick='enterSet("+si+")'>"
           +"<div><div style='font-weight:700'>세트 "+(si+1)+" <span style='font-size:.8rem;color:#6b7280;font-weight:400'>("+sq.length+"문제)</span></div></div>"
           +"<div>"+scoreHTML+"</div></div>";
  }).join("");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div style='font-size:2.5rem;margin-bottom:8px'>📱</div>"
    +"<h2 style='font-size:1.2rem;font-weight:700;color:#1f2937;margin-bottom:4px'>OX 문제 테스트</h2>"
    +"<p style='color:#6b7280;font-size:.85rem;margin-bottom:16px'>전체 "+TOTAL+"문제 · "+CONFIG.passThreshold+"% 이상 통과 · 몰라요는 오답 처리</p>"
    +"</div><div class='set-list'>"+chips+"</div>";
}
function enterSet(si){currentSet=si;showQ(0)}
function showQ(pos){
  try{window.scrollTo(0,0)}catch(e){}
  var si=currentSet;var qs=SETS[si];
  if(!qs||pos<0||pos>=qs.length){showIndex();return;}
  var gidx=gi(si,pos);var q=qs[pos];var answered=answers[gidx];
  setH("세트 "+(si+1),"문제 "+(pos+1)+"/"+qs.length);
  var pct=Math.round((pos+1)/qs.length*100);
  function btnClass(which){
    if(!answered)return "ox-btn "+which;
    if(answered.picked===which){
      if(which==="dunno")return "ox-btn dunno sel dunno wrong";
      return "ox-btn "+which+" "+(answered.isCorrect?"correct":"wrong");
    }
    return "ox-btn "+which;
  }
  var sourceHTML="";
  // 학생용 HTML — 원본 지문 미표시
  var fbHTML="";
  if(answered){
    var cls=answered.picked==="dunno"?"dunno":(answered.isCorrect?"ok":"ng");
    var msg=answered.picked==="dunno"?"🤔 몰라요 — 해설을 학습하세요":(answered.isCorrect?"✅ 정답!":"❌ 오답");
    fbHTML="<div class='fb "+cls+"'>"+msg+"</div>"
      +"<div class='explain-box'><div class='ex-title'>📖 정답 & 해설</div>"
      +"<div class='ex-body'><span class='ex-answer "+q.answer+"'>"+q.answer+"</span>"+(q.explanation?esc(q.explanation):"해설이 없습니다.")+"</div></div>";
  }
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade'>"
    +"<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"
    +"<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%'></div></div>"
    +"<div class='title-box'><div class='ptitle'>"+esc(q.passageTitle)+"</div>"
    +"<span class='tlabel'>"+esc(q.typeLabel||"")+"</span></div>"
    +"<div class='statement'>"+esc(q.statement)+"</div>"
    +sourceHTML
    +"<div class='ox-grid'>"
    +"<button class='"+btnClass("o")+"' onclick='pick("+pos+",&quot;o&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>⭕</span>O (맞음)</button>"
    +"<button class='"+btnClass("x")+"' onclick='pick("+pos+",&quot;x&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>❌</span>X (틀림)</button>"
    +"<button class='"+btnClass("dunno")+"' onclick='pick("+pos+",&quot;dunno&quot;)' "+(answered?"disabled":"")+">🤔 몰라요 (정답·해설 보기)</button>"
    +"</div>"
    +fbHTML
    +"<div class='nav-bar'>"
    +"<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"
    +"<button class='nav-btn home' onclick='showIndex()'>목록</button>"
    +"<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>"+(pos<qs.length-1?"다음 →":"결과")+"</button>"
    +"</div></div>";
}
function pick(pos,which){
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  var isCorrect=false;
  if(which==="dunno"){isCorrect=false;}
  else{isCorrect=(which==="o"&&q.answer==="O")||(which==="x"&&q.answer==="X");}
  answers[gidx]={picked:which,isCorrect:isCorrect};
  showQ(pos);
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0,dunno=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++;if(a&&a.picked==="dunno")dunno++;}
  var pct=Math.round(correct/total*100);var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div class='score-circle "+(passed?"pass":"fail")+"'>"+pct+"%</div>"
    +"<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"통과!":"미달")+"</p>"
    +"<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 몰라요 "+dunno+"개 · 기준 "+CONFIG.passThreshold+"%</p>"
    +"</div>"
    +"<div style='margin-top:16px'><button class='nav-btn next' style='width:100%;padding:14px' onclick='showIndex()'>목록으로</button></div>";
}
try{history.pushState(null,"",location.href);
window.addEventListener("popstate",function(){history.pushState(null,"",location.href);showIndex();});}catch(e){}
showIndex();
</script>
