<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#0d9488;--primary-light:#ccfbf1;--primary-dark:#115e59;
  --success:#16a34a;--success-light:#dcfce7;
  --danger:#dc2626;--danger-light:#fee2e2;
  --warning:#f59e0b;--warning-light:#fef3c7;
  --bg:#f0fdfa;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#a7f3d0;
}
body{font-family:'Segoe UI','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);line-height:1.55;min-height:100vh;padding:20px 12px}
.container{max-width:880px;margin:0 auto}
header{text-align:center;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:24px 16px;border-radius:14px;box-shadow:0 4px 12px rgba(13,148,136,.25);margin-bottom:18px}
header h1{font-size:1.45rem;margin-bottom:4px}
header .sub{opacity:.92;font-size:.92rem}

.card{background:var(--card);border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.04);padding:22px;margin-bottom:18px}
.card h2{color:var(--primary);font-size:1.05rem;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.help{font-size:.85rem;color:var(--muted);background:var(--primary-light);padding:10px 12px;border-radius:8px;margin-bottom:14px;line-height:1.6}

.ans-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:680px){.ans-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:420px){.ans-grid{grid-template-columns:1fr}}

.ans-cell{background:#fafafa;border:1.5px solid #e5e7eb;border-radius:10px;padding:8px 10px;display:flex;align-items:center;gap:8px;transition:all .2s}
.ans-cell.answered{background:var(--primary-light);border-color:var(--primary)}
.ans-cell.wrong-result{background:var(--danger-light);border-color:var(--danger)}
.ans-cell.correct-result{background:var(--success-light);border-color:var(--success)}
.ans-cell .num{font-weight:700;font-size:.92rem;color:var(--primary-dark);min-width:34px;text-align:center;background:#fff;padding:5px 0;border-radius:6px;border:1px solid var(--border)}
.ans-cell.wrong-result .num{background:var(--danger);color:#fff;border-color:var(--danger)}
.ans-cell.correct-result .num{background:var(--success);color:#fff;border-color:var(--success)}
.opts{display:flex;gap:4px}
.opt{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:#fff;border:1.5px solid #cbd5e1;cursor:pointer;font-size:.85rem;font-weight:600;color:#64748b;transition:all .15s;user-select:none}
.opt:hover{border-color:var(--primary);color:var(--primary)}
.opt.selected{background:var(--primary);color:#fff;border-color:var(--primary)}

.actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.btn{flex:1;min-width:130px;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 22px;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px)}
.btn-outline{background:#fff;border:2px solid var(--primary);color:var(--primary)}
.btn-outline:hover{background:var(--primary-light)}

.progress-info{display:flex;justify-content:space-between;align-items:center;font-size:.88rem;margin-bottom:8px}
.progress-info .answered-count{font-weight:700;color:var(--primary-dark)}
.progress-bar{height:8px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin-bottom:14px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--success));border-radius:99px;transition:width .3s}

.exam-info{background:var(--primary-light);border-left:4px solid var(--primary);border-radius:0 8px 8px 0;padding:10px 14px;font-size:.92rem;color:var(--primary-dark);margin-bottom:14px}
.exam-info b{color:var(--primary-dark)}
.score-circle-wrap{text-align:center;padding:20px 0}
.score-circle{width:160px;height:160px;border-radius:50%;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;border:6px solid;font-size:2.4rem;font-weight:800;margin-bottom:10px}
.score-circle.perfect{border-color:var(--warning);background:#fffbeb;color:var(--warning);animation:pulse 1s infinite}
.score-circle.great{border-color:var(--success);background:var(--success-light);color:var(--success)}
.score-circle.retry{border-color:var(--danger);background:var(--danger-light);color:var(--danger)}
.score-circle small{font-size:.78rem;font-weight:400;margin-top:2px;opacity:.85}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.score-msg{font-size:1.05rem;margin:8px 0;line-height:1.5}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}
.stat-box{background:#fafafa;border-radius:10px;padding:12px;text-align:center}
.stat-box .label{font-size:.78rem;color:var(--muted);margin-bottom:4px}
.stat-box .value{font-size:1.3rem;font-weight:700;color:var(--primary-dark)}
.stat-box.correct .value{color:var(--success)}
.stat-box.wrong .value{color:var(--danger)}

.wrong-card{background:var(--danger-light);border-left:4px solid var(--danger);border-radius:0 10px 10px 0;padding:14px 16px;margin-bottom:12px}
.wrong-card .wrong-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.wrong-card .wrong-num{background:var(--danger);color:#fff;width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:.88rem}
.wrong-card .wrong-type{font-size:.72rem;background:#fff;color:var(--danger);padding:3px 9px;border-radius:99px;font-weight:600;border:1px solid var(--danger)}
.wrong-card .wrong-pts{font-size:.72rem;color:var(--muted);margin-left:auto;font-weight:600}
.wrong-card .my-pick{margin-top:4px;font-size:.86rem;color:#374151}
.wrong-card .my-pick b{color:var(--danger)}
.wrong-card .right-ans{background:#fff;border-radius:8px;padding:8px 12px;margin-top:8px;font-size:.88rem;border-left:3px solid var(--success)}
.wrong-card .right-ans b{color:var(--success)}
.wrong-card .explanation{background:var(--warning-light);border-radius:8px;padding:8px 12px;margin-top:6px;font-size:.85rem;line-height:1.55;color:#713f12;border-left:3px solid var(--warning)}
.wrong-card .explanation b{color:#92400e}

.hidden{display:none!important}

.all-correct{text-align:center;padding:20px;background:var(--success-light);border-radius:12px;color:var(--success);font-size:1.05rem;font-weight:600}
</style>
</head>

const CIRC=["①","②","③","④","⑤"];
const state={ans:{}};

function renderGrid(){
  const grid=document.getElementById('grid');
  grid.innerHTML=Q.map(q=>`
    <div class="ans-cell" data-num="${q.num}">
      <div class="num">${q.num}</div>
      <div class="opts">
        ${[1,2,3,4,5].map(c=>`<span class="opt" data-c="${c}" onclick="pick(${q.num},${c})">${CIRC[c-1]}</span>`).join('')}
      </div>
    </div>`).join('');
}

function pick(num,c){
  state.ans[num]=c;
  const cell=document.querySelector(`.ans-cell[data-num="${num}"]`);
  cell.classList.add('answered');
  cell.querySelectorAll('.opt').forEach(o=>o.classList.remove('selected'));
  cell.querySelector(`.opt[data-c="${c}"]`).classList.add('selected');
  updateProgress();
}

function updateProgress(){
  const cnt=Object.keys(state.ans).length;
  document.getElementById('cnt').textContent=cnt;
  document.getElementById('bar').style.width=`${Math.round(cnt/33*100)}%`;
}

function grade(){
  const unanswered=Q.filter(q=>!state.ans[q.num]);
  if(unanswered.length>0){
    if(!confirm(`아직 ${unanswered.length}문제를 풀지 않았습니다. 채점하시겠습니까?`)) return;
  }
  let score=0;const wrong=[];
  Q.forEach(q=>{
    const cell=document.querySelector(`.ans-cell[data-num="${q.num}"]`);
    cell.classList.remove('wrong-result','correct-result');
    if(state.ans[q.num]===q.answer){score+=2;cell.classList.add('correct-result');}
    else{wrong.push(q);cell.classList.add('wrong-result');}
  });

  const max=66;
  const pct=Math.round(score/max*100);
  const cc=33-wrong.length;
  const wc=wrong.length;

  document.getElementById('scoreVal').textContent=score;
  document.getElementById('scoreMax').textContent=`/ ${max}점`;
  document.getElementById('cc').textContent=cc;
  document.getElementById('wc').textContent=wc;
  document.getElementById('pct').textContent=pct+'%';

  const circle=document.getElementById('circle');
  const msg=document.getElementById('scoreMsg');
  circle.className='score-circle';
  if(pct>=90){circle.classList.add('perfect');msg.innerHTML=`🎉 <b>EXCELLENT!</b> 정말 잘했어요!`;}
  else if(pct>=70){circle.classList.add('great');msg.innerHTML=`👍 잘했어요! 틀린 ${wc}문제만 더 복습하면 완벽!`;}
  else{circle.classList.add('retry');msg.innerHTML=`📚 ${wc}문제 오답을 꼼꼼히 복습한 후 다시 도전!`;}

  const list=document.getElementById('wrong-list');
  if(wc===0){
    list.innerHTML=`<div class="all-correct">🏆 만점! 모든 객관식 문제 정답입니다.</div>`;
  } else {
    list.innerHTML=`<h2 style="margin-top:18px">✗ 틀린 문제 (${wc}개)</h2>`+
      wrong.map(q=>{
        const my=state.ans[q.num]?`${CIRC[state.ans[q.num]-1]} ${q.choices[state.ans[q.num]-1]}`:'(미응답)';
        const right=`${CIRC[q.answer-1]} ${q.choices[q.answer-1]}`;
        return `<div class="wrong-card">
          <div class="wrong-header">
            <div class="wrong-num">${q.num}</div>
            <span class="wrong-type">${q.type}</span>
            <span class="wrong-pts">2점</span>
          </div>
          <div class="my-pick">내 답: <b>${my}</b></div>
          <div class="right-ans"><b>정답:</b> ${right}</div>
          <div class="explanation"><b>해설:</b> ${q.explanation}</div>
        </div>`;
      }).join('');
  }

  document.getElementById('result').classList.remove('hidden');
  document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
}

function reset(){
  if(!confirm('답안을 모두 초기화하시겠습니까?')) return;
  state.ans={};
  document.getElementById('result').classList.add('hidden');
  document.querySelectorAll('.ans-cell').forEach(c=>{
    c.classList.remove('answered','wrong-result','correct-result');
    c.querySelectorAll('.opt').forEach(o=>o.classList.remove('selected'));
  });
  updateProgress();
  window.scrollTo({top:0,behavior:'smooth'});
}

renderGrid();
</script>
</body>
</html>
