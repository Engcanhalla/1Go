<script>
var CONFIG={"title":"고1기말OX_9_17_0624","passThreshold":90,"level":"high1","levelLabel":"고1 수준 · CEFR B1","passages":[{"id":1,"title":"Urban Walking Paradox","body":"The principal transportation mode in the developing world, even in large cities, is still walking because of constraints on the resources needed to operate extensive transit systems. People cover long distances on foot every day and expend human energy that they can hardly spare. Walking under those conditions is an unavoidable burden that consumes productive capability. In North America and Western Europe, however, the\nattitude and policies are just the opposite: walking is efficient, healthful, and natural. We should do more of it —almost everybody agrees—and some of the current trends should be reversed. Ironically, among the most popular exercise machines in health clubs and in homes are treadmills that simulate walking, which could be otherwise accomplished with a transport purpose on the street.\n"},{"id":2,"title":"Toy Clutter Overwhelm","body":"Just like how other rooms in your home can cause anxiety when filled with too much stuff, the same is true for kids. If the play space houses every single toy that has ever been purchased for them since birth, they may not be able to express their feelings, but they can feel overwhelmed by so much stuff. This reminds us of how women look in their closets packed full of clothes and think, I have nothing to wear. Revision helps everyone see what they have and use what they own. When there’s too much to see, too\nmuch to step over, and too much input, kids have a hard time making a choice. Streamlining a play space is so important. You want your kids to feel inspired and imaginative in the room —not overcome with indecision. \n"},{"id":3,"title":"Illusion of Competence","body":"Students often mistake familiarity with true mastery, creating a dangerous “illusion of competence” where recognizing information feels like genuine knowledge, but they struggle when asked to recall or apply it independently. This cognitive bias, strengthened by passive study methods, leads learners to overestimate their understanding. Teaching\nmaterials (even informally or imaginatively) actively counters this illusion by requiring deep processing, active recall, structured organization, and revealing gaps in knowledge. It\nintroduces powerful methods like teaching imaginary students, peer-teaching in study groups, employing the Feynman Technique, and writing explanations for others. Ultimately, adopting the teacher mindset transforms surface familiarity into real mastery, exposing and filling gaps in knowledge and ensuring solid, reliable understanding.\n"},{"id":4,"title":"Sumerian Number Abstraction","body":"From around 3000 BC, the Sumerian officials would mark their lists of goods on clay tablets. If they wanted to record five fish, they would mark five pictures of a fish. Their first great intellectual leap came from separating the number from the object they were counting. In other words, they would represent five fish with a numeral for the number five alongside a symbol for the fish. If they wanted to describe five of something else, they realized they could keep the same numeral and trade the object symbol for a cow, or a jar of oil, or whatever else they were interested in. The Sumerians had developed the\nidea of an emancipated number, existing in its own right and independent of whatever it is being used to count. It is easy to take the emancipated number for granted as it is so\ndeeply set into modern thought, but to the earliest civilizations it was intellectually new and extremely powerful.\n"},{"id":5,"title":"Simplicity Over Complexity","body":"Initially the catchphrase “less is more” had a simple meaning. First mentioned in Robert Browning’s poem “Andrea del Sarto,” it suggests that everything simple is better and more beautiful than the complex and tangled. Nowadays this phrase is heard often — maybe even too often. But it’s important to recognize that the way of thinking that lies behind these words slowly extinguishes certain habits from our daily life. For example, think about the heavy, massive radio receivers that existed back in the day. Over time, many of their buttons became viewed as “extra” and were removed, and with each reduction these devices eventually developed into the phones in our pockets. The scale of the object became smaller, and the functions of the buttons got lost in the three-dot menus and multilayered folders of our phones."},{"id":6,"title":"Plastics Industry History","body":"We first need to understand the short but hidden history behind the plastics industry and how it became deeply rooted in our daily lives. Before plastic, people lived more sustainably, with far fewer waste problems than we face today. However, after the invention of plastic, its rapid adoption during World War II, and its explosion into consumer goods, plastic was everywhere. The growing industry came to symbolize the convenience and prosperity of the American dream. This dream came with a price. Over time, people began to notice the environmental impact, and the early seeds of today’s environmental movement were planted. However, the plastics industry was quick to counter these concerns, launching campaigns that presented recycling as the solution to all our problems. They pushed the idea that pollution was the fault of consumers, not the\ncorporations flooding the market with plastic. \n"},{"id":7,"title":"Children's Urban Independence","body":"Parenting experts say children need to learn independence and resilience. But cities and suburbs don’t offer safe walk and bike routes to school, malls kick teenagers out on the weekends, and free time disappears under a spreadsheet of activities. All of those “musts” take more of the parents’ time or money to navigate, because the child can’t do it on their own. As Darby Saxbe, a clinical psychologist, recently wrote in the New York Times, “under-parenting requires structural change.” Unlike most political experts, she’s not just talking about economic policies like family leave and government-supported childcare. She’s talking about actual physical structures, and the cultural change required to populate them. We need to “build back our tolerance for children in public spaces,” she writes, “and create safe environments where lightly supervised kids can move around freely.” To help parents raise independent children, cities and suburbs need to create supportive environments, where parents can keep their children under mild supervision, through changes in physical structure and culture."},{"id":8,"title":"Banksy's Environmental Art","body":"Secretive street artist Banksy designed another interesting piece of art, which appears on a concrete block garage in Port Talbot, Wales. It shows a child catching snowflakes with his mouth. When you look around the corner, however, you realize that the child's mouth is open to ash coming from a dumpster fire. Banksy was asked by Gary Owen, a Port Talbot resident, to create art that would highlight Port Talbot's dust problem. Owen believed that the area's children were facing serious health risks by playing in the dust coming from the local steel plant. Children are particularly defenseless against air pollution. Since they have faster breathing rates than adults, they breathe in more pollutants. According to the World Health Organization (WHO), about 93% of the world's children under 15 breathe in toxic air every day. In 2016, the WHO even estimated that about 600,000 children died from exposure to polluted air. Banksy's art has included environmental messages before. For example, his 2010 artwork was created at the remains of a plant in Detroit. It showed a child with a can of red paint and the words, \"I remember when all this was trees.\" I heard that both works of art had been moved to other places."},{"id":9,"title":"Art and Environment","body":"While art can stir up a sense of beauty in us, it can also draw a spirited reaction from the public.  An excellent artistic piece can communicate a message to us and even change our ways of looking at our surroundings. That is why art has played an essential role in addressing social and global issues throughout history. Let us take a look at a few modern artworks that address environmental issues. \nThe first art piece is a photograph by Benjamin Von Wong. His artworks rally people around environmental actions. In the photo on the left, titled Turn Off the Plastic Tap, he tries to highlight the fact that a huge amount of plastic enters the ocean every minute. He says, “You can’t order a product online without having it delivered in plastic packaging. Also, the clothes you are wearing must be, at least in part, made of plastic. Dependence on plastic is built into the supply chain, so the individual consumer finds it harder and harder to opt out. Of course, you can choose not to purchase products containing plastic, but that only goes so far. I think it is important for you to inform your friends and family of the issue because at the end of the day, you know, companies and governments can’t ignore the interest of the consumers. At the same time, we also need to pressure governments and corporations to do the right thing.” The next piece, titled Forget Me Not, is Jenny Kendler’s personal love letter to the sea. She covered an old boom box with various shells, which took her a year to collect. \n"},{"id":10,"title":"Art and Environment","body":"The boom box plays something you may regard as calming ocean sounds. They are actually what she recorded as she had one of her baby teeth dissolve in acid. She wanted us to think of what sea creatures might go through one day if we continue burning fossil fuels carelessly. As the ocean absorbs more and more carbon dioxide, it becomes more and more acidic. Under this condition, the hard shells of many marine species will dissolve. Kendler says, “I wanted to inspire people to raise their own awareness about what they can actually do as individuals, but at the same time, I hoped to encourage collective action and collective responsibility. One thing that art can do really well is to help us imagine how the world might be otherwise. Certainly, we can’t get to a different place if we can’t imagine it.”\n     The piece below, titled Homestead , is a painting by Jon Ching.  Most of his work, including this painting, is a celebration of nature and a quiet appeal to humans to appreciate the world around them. “I believe we’ve separated ourselves from nature and no longer see how we fit in. Instead of helping nature thrive, we are simply consuming it,” says Ching.  One cannot help but smile at his paintings, which are rich in color and tenderness. One of the fun aspects of his work is how he blends the features of one life form with those of another. “I’ve been using my work as a means of commenting on issues and problems I’m heavily interested in. I find it necessary to express a silver lining rather than just reflect on what’s wrong. I want to show that everything is connected and that protecting nature is actually protecting us. My call to action is to remember the magic and wonder of this planet.”\n     Art can strike up conversations about the environment, but more importantly, it can also make a great difference by inspiring us to take action. The following words from Andy Warhol, an American pop artist, ring especially true in this context. “They always say time changes things, but you actually have to change them yourself.”\n\n"}],"questions":[{"questionNumber":1,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"개발도상국에서 걷기가 주된 이동 수단인 이유는 대중교통 시스템을 운영하는 데 필요한 자원이 부족하기 때문이다.","answer":"O","explanation":"지문은 개발도상국에서 걷기가 주된 이동 수단인 이유로 '광범위한 대중교통 시스템을 운영하는 데 필요한 자원의 제약(constraints on the resources needed to operate extensive transit systems)'을 명시하고 있습니다. 이는 statement의 '자원이 부족하기 때문'이라는 인과 관계와 정확히 일치합니다. 따라서 지문 내용과 완전히 부합하므로 O입니다.","passageId":1,"passageTitle":"Urban Walking Paradox","sourceSentence":null},{"questionNumber":2,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The passage contrasts how walking is perceived as an unavoidable hardship in developing nations, while it is considered beneficial and worth encouraging in wealthier regions.","answer":"O","explanation":"지문은 개발도상국에서 걷기가 '피할 수 없는 부담(unavoidable burden)'으로 여겨진다고 서술하며, 반면 북미와 서유럽에서는 걷기가 효율적이고 건강에 좋으며 자연스러운 활동으로 권장된다고 대조하고 있다. Statement는 이 두 시각의 대비를 정확하게 요약하고 있으므로 지문 내용과 완전히 일치한다.","passageId":1,"passageTitle":"Urban Walking Paradox","sourceSentence":null},{"questionNumber":3,"type":"en_twist","typeLabel":"교묘한 paraphrasing (영어)","statement":"In developing countries, people choose to walk long distances daily because it is a convenient and energy-efficient way to travel.","answer":"X","explanation":"지문에서는 개발도상국 사람들이 장거리를 걸어서 이동하는 이유가 '편리하고 에너지 효율적이기 때문'이 아니라, 대중교통 시스템 운영에 필요한 자원이 부족하기 때문에 '어쩔 수 없이(unavoidable burden)' 걷는다고 설명한다. 오히려 지문은 이 걷기가 '여유도 없는 인체 에너지를 소모하는 부담'이라고 묘사하고 있어, statement의 '편리하고 에너지 효율적'이라는 표현은 지문 내용과 정반대이다.","passageId":1,"passageTitle":"Urban Walking Paradox","sourceSentence":null},{"questionNumber":4,"type":"thats_why","typeLabel":"That's why 인과","statement":"In developing countries, walking consumes productive energy that people can scarcely afford. That's why it is described as an unavoidable burden rather than a healthy activity.","answer":"O","explanation":"지문에서 개발도상국 사람들은 매일 장거리를 걸으며 여유가 없는 인간 에너지를 소모한다고 명시되어 있으며, 이러한 조건에서의 보행은 생산적 역량을 소모하는 불가피한 부담으로 묘사된다. Statement는 '생산적 에너지를 거의 감당할 수 없을 만큼 소비한다'는 원인과 '건강 활동이 아닌 불가피한 부담으로 묘사된다'는 결과의 인과 방향을 정확히 반영하고 있다. 지문 내용과 인과 관계 방향 모두 일치하므로 O로 판정한다.","passageId":1,"passageTitle":"Urban Walking Paradox","sourceSentence":null},{"questionNumber":5,"type":"this_leads","typeLabel":"This leads 인과","statement":"In North America and Western Europe, walking is widely viewed as healthy and natural. This leads to the current trend of people using treadmills in gyms to replace outdoor walks for exercise.","answer":"X","explanation":"지문에서 북미와 서유럽에서 걷기가 건강하고 자연스럽다고 여겨진다는 내용은 일치한다. 그러나 지문은 트레드밀 사용이 '걷기를 건강하다고 보는 태도'의 결과라고 말하지 않으며, 오히려 실내 트레드밀이 인기 있다는 사실을 아이러니한 현상으로 제시할 뿐이다. 또한 statement는 트레드밀이 실외 걷기를 '대체(replace)'한다고 표현하지만, 지문은 트레드밀이 거리에서 교통 목적으로도 충분히 달성할 수 있는 걷기를 시뮬레이션한다고 서술하며, 이를 현재 트렌드를 역전시켜야 한다는 맥락에서 비판적으로 언급한다.","passageId":1,"passageTitle":"Urban Walking Paradox","sourceSentence":null},{"questionNumber":6,"type":"ko_cause","typeLabel":"한국어 인과","statement":"헬스클럽의 트레드밀이 인기 있는 이유는 개발도상국에서 이동 수단으로서의 걷기가 비효율적임을 증명하기 때문이다.","answer":"X","explanation":"지문에서 트레드밀이 인기 있는 이유로 제시된 것은 개발도상국의 걷기 비효율성과 무관하다. 지문은 북미와 서유럽에서 걷기가 건강하고 효율적이라고 여겨지면서도 정작 실내 트레드밀로 걷기를 시뮬레이션하는 아이러니를 지적할 뿐이다. 즉, 트레드밀의 인기는 개발도상국의 상황을 '증명'하는 것이 아니라, 선진국 내부의 모순된 태도를 보여주는 사례로 언급된 것이다.","passageId":1,"passageTitle":"Urban Walking Paradox","sourceSentence":null},{"questionNumber":7,"type":"insertion","typeLabel":"문장 삽입 위치 판단","anchorSentence":"In North America and Western Europe, however, the attitude and policies are just the opposite: walking is efficient, healthful, and natural.","targetSentence":"This irony is perhaps most visible in the popularity of treadmills, which mimic the very activity people could perform outdoors for both transportation and exercise.","claimedPosition":"before","statement":"['이 아이러니는 트레드밀의 인기에서 가장 잘 드러난다'는 문장] → ['북미와 서유럽에서 걷기에 대한 태도는 정반대다'라는 문장] 순서로 이어진다.","answer":"X","explanation":"지문에서 실제 순서는 '북미와 서유럽에서 걷기에 대한 태도는 정반대다'라는 내용이 먼저 나오고, 그 이후에 트레드밀의 아이러니에 관한 내용이 등장한다. statement는 이 순서를 반대로 제시하고 있으므로 틀렸다.","passageId":1,"passageTitle":"Urban Walking Paradox","sourceSentence":null},{"questionNumber":8,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"아이들의 놀이 공간에 장난감이 너무 많으면, 아이들은 그 감정을 언어로 표현하지 못할 수 있지만 압도감을 느낄 수 있다.","answer":"O","explanation":"지문에서 'they may not be able to express their feelings, but they can feel overwhelmed by so much stuff'라고 명시되어 있습니다. 이는 아이들이 너무 많은 장난감으로 인해 자신의 감정을 표현하지 못할 수 있지만, 압도감을 느낄 수 있다는 내용과 정확히 일치합니다. 따라서 해당 statement는 지문 내용과 완전히 일치하므로 O입니다.","passageId":2,"passageTitle":"Toy Clutter Overwhelm","sourceSentence":null},{"questionNumber":9,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The central idea of the passage is that reducing the number of items in a child's play area helps children make better choices and feel more creatively engaged.","answer":"O","explanation":"지문은 아이의 놀이 공간에 물건이 너무 많으면 아이가 선택을 어려워하고 압도감을 느낀다고 설명하며, 놀이 공간을 간소화(streamlining)하는 것이 중요하다고 강조한다. Statement는 놀이 공간의 물건 수를 줄이면 아이가 더 나은 선택을 하고 창의적으로 몰입할 수 있다고 말하는데, 이는 지문의 핵심 주장('inspired and imaginative', '너무 많은 것이 있으면 선택이 어렵다')과 정확히 일치한다. 내용의 왜곡이나 과장 없이 지문의 중심 내용을 올바르게 요약하고 있으므로 O가 적절하다.","passageId":2,"passageTitle":"Toy Clutter Overwhelm","sourceSentence":null},{"questionNumber":10,"type":"en_twist","typeLabel":"교묘한 paraphrasing (영어)","statement":"Adults declutter their closets to gain a clearer sense of what clothing they actually own and can use, and children benefit from the same principle applied to their toys.","answer":"O","explanation":"지문에서는 옷장에 옷이 가득 찬 여성들이 '입을 게 없다'고 느끼는 현상을 언급하며, 정리(revision)가 자신이 가진 것을 파악하고 활용하는 데 도움이 된다고 설명한다. 이는 statement에서 말하는 '어른들이 옷장을 정리해 실제로 소유하고 사용할 수 있는 옷을 더 명확히 파악한다'는 내용과 일치한다. 또한 지문은 아이들의 놀이 공간도 같은 원리로 정리가 필요하다고 강조하므로, statement의 전반적인 내용은 지문과 완전히 일치한다.","passageId":2,"passageTitle":"Toy Clutter Overwhelm","sourceSentence":null},{"questionNumber":11,"type":"en_twist","typeLabel":"교묘한 paraphrasing (영어)","statement":"When a play space contains every toy a child has ever received, the child tends to become highly focused and engaged because there are so many options to choose from.","answer":"X","explanation":"지문에 따르면, 놀이 공간에 너무 많은 장난감이 있으면 아이들은 오히려 압도되어(overwhelmed) 선택을 하기 어려워진다고 설명한다. statement는 많은 선택지가 있을 때 아이들이 '집중하고 몰입하게 된다'고 주장하지만, 이는 지문의 내용과 정반대이다. 지문은 명확히 너무 많은 것들이 있으면 아이들이 우유부단함(indecision)에 압도된다고 경고하고 있다.","passageId":2,"passageTitle":"Toy Clutter Overwhelm","sourceSentence":null},{"questionNumber":12,"type":"thats_why","typeLabel":"That's why 인과","statement":"Too many toys make it hard for children to decide what to play with. That's why organizing and streamlining a play space is considered essential for encouraging imagination and decisiveness.","answer":"O","explanation":"지문은 장난감이 너무 많으면 아이들이 선택을 하기 어렵다고 설명하며, 이에 따라 놀이 공간을 간소화(streamlining)하는 것이 중요하다고 강조한다. statement는 '장난감이 너무 많으면 결정이 어렵다 → 그래서 놀이 공간 정리가 필수적'이라는 인과 관계를 제시하는데, 이는 지문의 흐름과 정확히 일치한다. 또한 지문에서 아이들이 방에서 영감을 받고 상상력을 발휘하길 원한다고 언급하므로, 상상력과 결단력을 장려하기 위해 정리가 필요하다는 내용도 지문과 부합한다.","passageId":2,"passageTitle":"Toy Clutter Overwhelm","sourceSentence":null},{"questionNumber":13,"type":"ko_cause","typeLabel":"한국어 인과","statement":"아이들의 놀이 공간이 정리되어 장난감의 수가 줄어들었기 때문에, 아이들은 무엇을 가지고 놀지 결정하지 못하고 우유부단함을 느끼게 된다.","answer":"X","explanation":"지문에 따르면 장난감이 너무 많아 과부하 상태일 때 아이들이 선택을 어려워하고 우유부단함을 느끼게 된다고 설명합니다. 그러나 statement는 원인과 결과를 반대로 서술하여, 장난감 수가 줄어들어 정리된 경우에 우유부단함이 생긴다고 주장하고 있으므로 인과 방향이 완전히 역전되어 있습니다. 지문은 오히려 놀이 공간을 정리(streamlining)하면 아이들이 영감을 받고 창의적이 될 수 있다고 말하고 있습니다.","passageId":2,"passageTitle":"Toy Clutter Overwhelm","sourceSentence":null},{"questionNumber":14,"type":"insertion","typeLabel":"문장 삽입 위치 판단","anchorSentence":"Revision helps everyone see what they have and use what they own.","targetSentence":"This is why periodically removing items from a child's play area can help them rediscover and better appreciate the toys that remain.","claimedPosition":"after","statement":"'Revision helps everyone see what they have and use what they own.' → 'This is why periodically removing items from a child's play area can help them rediscover and better appreciate the toys that remain.'","answer":"O","explanation":"지문에서 'Revision helps everyone see what they have and use what they own'이라는 문장은 물건을 정리(줄이는 것)가 자신이 가진 것을 제대로 보고 활용하게 해준다는 의미를 담고 있다. 제시된 statement는 이를 아이의 놀이 공간에 적용하여, 주기적으로 장난감을 줄이면 남은 장난감을 다시 발견하고 더 잘 감상할 수 있다고 해석하는데, 이는 지문의 핵심 논리(너무 많은 것 → 압도감 → 정리가 도움이 됨)와 방향 및 내용 면에서 일치한다.","passageId":2,"passageTitle":"Toy Clutter Overwhelm","sourceSentence":null},{"questionNumber":15,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"학생들이 정보를 인식할 수 있다는 느낌은 실제로 그 내용을 독립적으로 떠올리거나 적용하는 능력과 동일하지 않다.","answer":"O","explanation":"지문은 학생들이 정보를 인식(recognizing information)하는 것이 진짜 지식처럼 느껴지지만, 실제로는 독립적으로 떠올리거나 적용하는 데 어려움을 겪는다고 명시합니다. 이는 statement의 내용과 정확히 일치합니다. 즉, 인식 능력과 독립적 회상·적용 능력은 동일하지 않다는 것이 지문의 핵심 주장입니다.","passageId":3,"passageTitle":"Illusion of Competence","sourceSentence":null},{"questionNumber":16,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The central argument is that actively engaging with material as if explaining it to someone else can convert surface-level familiarity into deeper, more reliable understanding.","answer":"O","explanation":"지문은 '교사 마인드셋'을 채택하여 마치 누군가에게 설명하듯 능동적으로 학습 재료를 다루는 것이 표면적 친숙함을 진정한 숙달로 전환시킨다고 주장한다. Statement는 이 핵심 논지를 '능동적 참여(actively engaging)'와 '타인에게 설명하는 것처럼(as if explaining it to someone else)'이라는 표현으로 정확히 포착하고 있다. 지문의 내용과 인과 방향 모두 일치하므로 O로 판정한다.","passageId":3,"passageTitle":"Illusion of Competence","sourceSentence":null},{"questionNumber":17,"type":"en_twist","typeLabel":"교묘한 paraphrasing (영어)","statement":"Passive study methods help reduce the illusion of competence by encouraging learners to recognize information more efficiently.","answer":"X","explanation":"지문에서는 수동적 학습 방법(passive study methods)이 '능력의 환상(illusion of competence)'을 강화(strengthened)한다고 명시되어 있습니다. 즉, 수동적 학습은 이 환상을 줄이는 것이 아니라 오히려 악화시키는 원인입니다. 따라서 수동적 학습이 환상을 줄이는 데 도움이 된다는 statement는 지문 내용과 정반대입니다.","passageId":3,"passageTitle":"Illusion of Competence","sourceSentence":null},{"questionNumber":18,"type":"thats_why","typeLabel":"That's why 인과","statement":"Teaching materials requires deep processing and forces learners to reveal gaps in their knowledge. That's why adopting a teacher mindset can transform mere familiarity into genuine mastery.","answer":"O","explanation":"지문은 교재를 가르치는 행위가 깊은 처리(deep processing), 능동적 회상, 지식의 공백 노출을 요구한다고 명시하고 있으며, 이것이 표면적 친숙함을 진정한 숙달로 변환시킨다고 설명한다. Statement의 인과 방향(교재 가르치기 → 깊은 처리 및 지식 공백 노출 → 진정한 숙달)은 지문의 논리 흐름과 정확히 일치한다. 내용의 왜곡이나 반대되는 서술 없이 지문의 핵심 주장을 올바르게 반영하고 있으므로 O로 판정한다.","passageId":3,"passageTitle":"Illusion of Competence","sourceSentence":null},{"questionNumber":19,"type":"this_leads","typeLabel":"This leads 인과","statement":"Students overestimate their own level of understanding. This leads them to rely more heavily on active recall and structured organization when studying.","answer":"X","explanation":"지문에 따르면 학생들이 자신의 이해도를 과대평가하는 것은 '능동적 회상(active recall)'과 '체계적 조직화(structured organization)'를 더 많이 활용하게 만드는 원인이 아닙니다. 오히려 지문은 과대평가가 수동적 학습 방법에 의해 강화되며, 능동적 회상과 체계적 조직화는 '가르치는 행위'를 통해 능력의 환상을 깨뜨리는 해결책으로 제시됩니다. 즉 인과 관계의 방향이 지문과 반대로 서술되어 있으므로 X입니다.","passageId":3,"passageTitle":"Illusion of Competence","sourceSentence":null},{"questionNumber":20,"type":"ko_cause","typeLabel":"한국어 인과","statement":"학습자가 지식의 빈틈을 파악하지 못하는 이유는, 교사의 관점을 채택하지 않고 수동적인 학습 방식에만 의존하기 때문이다.","answer":"O","explanation":"지문에 따르면, 수동적인 학습 방식(passive study methods)은 '역량의 환상(illusion of competence)'을 강화하여 학습자가 자신의 이해도를 과대평가하게 만든다고 설명한다. 또한 교사의 관점(teacher mindset)을 채택하는 것이 지식의 빈틈을 드러내고 채우는 방법으로 제시되므로, 이를 채택하지 않으면 빈틈을 파악하기 어렵다는 인과 관계가 성립한다. 따라서 statement의 원인과 결과 방향이 지문 내용과 완전히 일치한다.","passageId":3,"passageTitle":"Illusion of Competence","sourceSentence":null},{"questionNumber":21,"type":"insertion","typeLabel":"문장 삽입 위치 판단","anchorSentence":"This cognitive bias, strengthened by passive study methods, leads learners to overestimate their understanding.","targetSentence":"In contrast, methods that require active production of knowledge—such as explaining a concept aloud—can expose this hidden gap between recognition and true recall.","claimedPosition":"after","statement":"'This cognitive bias ... overestimate their understanding.' → '능동적 지식 생성을 요구하는 방법들이 인식과 진정한 회상 사이의 숨겨진 격차를 드러낼 수 있다'는 문장","answer":"X","explanation":"해당 문장은 'This cognitive bias ... overestimate their understanding.' 구간이 아닌, 그 다음 문장('Teaching materials ... revealing gaps in knowledge.')에 해당하는 내용입니다. 지문에서 'This cognitive bias' 부분은 인지 편향이 수동적 학습 방법으로 강화되어 학습자가 이해도를 과대평가하게 만든다는 내용을 다루고 있으며, '능동적 지식 생성 방법이 격차를 드러낸다'는 내용은 이후 문장에서 언급됩니다. 따라서 삽입 위치가 지문의 실제 순서와 일치하지 않으므로 X입니다.","passageId":3,"passageTitle":"Illusion of Competence","sourceSentence":null},{"questionNumber":22,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"수메르인들은 처음에 숫자와 물건을 분리하지 않고, 물고기 다섯 마리를 표현할 때 물고기 그림을 다섯 번 그렸다.","answer":"O","explanation":"지문에 따르면 수메르인들은 처음에 물고기 다섯 마리를 표현할 때 물고기 그림을 다섯 번 그리는 방식을 사용했습니다. 이후 그들의 '첫 번째 지적 도약'은 숫자와 물건을 분리하는 것이었다고 명시되어 있으므로, 초기에는 숫자와 물건이 분리되지 않았다는 statement의 내용은 지문과 완전히 일치합니다.","passageId":4,"passageTitle":"Sumerian Number Abstraction","sourceSentence":null},{"questionNumber":23,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"수메르인들의 첫 번째 지적 도약은 셈의 대상이 무엇이든 같은 숫자 기호를 유지하면서 대상 기호만 교체할 수 있다는 것을 깨달은 것이다.","answer":"X","explanation":"지문에 따르면 수메르인들의 '첫 번째 지적 도약'은 숫자와 셈의 대상을 분리한 것, 즉 숫자를 독립적인 개념으로 인식한 것이다. Statement에서 설명하는 '같은 숫자 기호를 유지하면서 대상 기호만 교체할 수 있다는 깨달음'은 그 도약의 결과로 나타난 활용 방식이지, 첫 번째 지적 도약 자체가 아니다. 따라서 statement는 첫 번째 지적 도약의 내용을 잘못 기술하고 있으므로 X이다.","passageId":4,"passageTitle":"Sumerian Number Abstraction","sourceSentence":null},{"questionNumber":24,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The Sumerians' intellectual achievement was recognizing that a number could exist independently from the specific thing being counted, making it universally applicable.","answer":"O","explanation":"지문은 수메르인의 위대한 지적 도약이 숫자를 세는 대상으로부터 분리하여 독립적으로 존재하는 '해방된 수(emancipated number)'의 개념을 발전시킨 것이라고 설명한다. Statement는 이를 정확히 반영하여, 수가 특정 사물과 무관하게 독립적으로 존재할 수 있음을 인식한 것이 수메르인의 지적 성취라고 기술하고 있다. 또한 이로 인해 수가 보편적으로 적용 가능해졌다는 점도 지문의 내용(같은 숫자를 물고기, 소, 기름 항아리 등 다른 대상에도 사용할 수 있게 됨)과 일치한다.","passageId":4,"passageTitle":"Sumerian Number Abstraction","sourceSentence":null},{"questionNumber":25,"type":"en_twist","typeLabel":"원문 교묘한 paraphrasing (영어)","statement":"Because abstract numbers are so deeply embedded in modern thinking, ancient civilizations also found the concept of a number independent of objects to be natural and straightforward.","answer":"X","explanation":"지문은 '해방된 수(emancipated number)' 개념이 현대 사고에 깊이 뿌리내리고 있어 당연하게 여기기 쉽다고 말하지만, 고대 문명에게는 이 개념이 지적으로 새롭고 매우 강력한 것이었다고 명시하고 있습니다. 즉, 현대인이 당연하게 여기는 것과 달리 고대인들에게는 전혀 자연스럽거나 단순한 개념이 아니었습니다. statement는 현대의 상황을 근거로 고대 문명도 같은 인식을 가졌다고 주장하므로 지문 내용과 정반대입니다.","passageId":4,"passageTitle":"Sumerian Number Abstraction","sourceSentence":null},{"questionNumber":26,"type":"thats_why","typeLabel":"That's why 인과","statement":"수메르인들은 숫자와 셈의 대상을 분리할 수 있다는 사실을 깨달았다. That's why they had to use a different numeral each time they counted a new type of object.","answer":"X","explanation":"지문에 따르면 수메르인들은 숫자와 셈의 대상을 분리함으로써 같은 숫자 기호를 유지하고 대상 기호만 바꿀 수 있게 되었습니다. 즉, 새로운 종류의 물체를 셀 때마다 다른 숫자 기호를 사용해야 했던 것이 아니라, 오히려 동일한 숫자 기호를 재사용할 수 있다는 것이 핵심입니다. statement의 결과 부분('다른 숫자 기호를 매번 사용해야 했다')은 지문의 내용과 정반대입니다.","passageId":4,"passageTitle":"Sumerian Number Abstraction","sourceSentence":null},{"questionNumber":27,"type":"this_leads","typeLabel":"This leads 인과","statement":"수메르인들은 기원전 3000년경부터 점토판에 물품 목록을 기록했다. This leads to the conclusion that writing systems in ancient civilizations were developed primarily for commercial and administrative purposes.","answer":"X","explanation":"지문은 수메르인들이 점토판에 물품 목록을 기록했다는 사실을 언급하지만, 이로부터 '고대 문명의 문자 체계가 주로 상업·행정적 목적으로 발전했다'는 결론은 도출되지 않는다. 지문의 핵심 주제는 숫자를 객체로부터 분리한 '해방된 수(emancipated number)' 개념의 지적 발전이며, 문자 체계의 발전 동기에 대한 포괄적 주장은 지문 어디에도 제시되지 않는다. 따라서 이 인과적 결론은 지문 내용을 과도하게 확장한 것으로 올바르지 않다.","passageId":4,"passageTitle":"Sumerian Number Abstraction","sourceSentence":null},{"questionNumber":28,"type":"ko_cause","typeLabel":"한국어 인과","statement":"현대인들이 추상적 수 개념을 당연하게 받아들이는 이유는, 그 개념이 현대 사고에 너무나 깊이 자리 잡고 있어 의식적으로 인식하기 어렵기 때문이다.","answer":"O","explanation":"지문에서 '추상적 수 개념(emancipated number)을 당연하게 받아들이기 쉬운 이유는 그것이 현대 사고에 너무나 깊이 자리 잡고 있기 때문(it is easy to take the emancipated number for granted as it is so deeply set into modern thought)'이라고 명시하고 있습니다. 이 문장은 원인(현대 사고에 깊이 내재됨)과 결과(당연하게 여김, 즉 의식적으로 인식하기 어려움)의 방향이 statement와 정확히 일치합니다.","passageId":4,"passageTitle":"Sumerian Number Abstraction","sourceSentence":null},{"questionNumber":29,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"\"less is more\"라는 표현은 로버트 브라우닝의 시에서 처음 언급되었으며, 단순한 것이 복잡한 것보다 더 낫고 아름답다는 의미를 담고 있다.","answer":"O","explanation":"지문에 따르면 'less is more'라는 표현은 로버트 브라우닝의 시 'Andrea del Sarto'에서 처음 언급되었다고 명시되어 있습니다. 또한 이 표현의 의미로 '단순한 모든 것이 복잡하고 얽힌 것보다 더 낫고 아름답다'고 설명하고 있어, statement의 내용과 지문이 완전히 일치합니다.","passageId":5,"passageTitle":"Simplicity Over Complexity","sourceSentence":null},{"questionNumber":30,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The passage argues that the idea behind 'less is more' has gradually shaped how people design everyday objects, as seen in the transformation of large radios into compact modern phones.","answer":"O","explanation":"'less is more'라는 사고방식이 일상생활의 특정 습관을 점진적으로 변화시켰다는 점, 그리고 그 예시로 버튼이 많은 대형 라디오 수신기가 점차 단순화되어 현재의 스마트폰으로 발전했다는 내용이 지문에 명확히 서술되어 있습니다. 또한 지문은 이 변화가 '디자인'이라는 의도적 행위의 결과임을 암시하며, statement의 핵심 주장과 완전히 일치합니다.","passageId":5,"passageTitle":"Simplicity Over Complexity","sourceSentence":null},{"questionNumber":31,"type":"en_twist","typeLabel":"내용 변형 (영어)","statement":"Over time, all of the buttons on old radio receivers were considered unnecessary and eliminated, making the devices more functional than before.","answer":"X","explanation":"지문에서는 '많은 버튼들(many of their buttons)'이 '여분의 것으로 여겨져(viewed as extra)' 제거되었다고 했을 뿐, '모든 버튼(all of the buttons)'이 제거되었다고 말하지 않습니다. 또한 지문은 기능들이 3점 메뉴와 다층 폴더 속으로 숨어들었다고 서술할 뿐, 기기가 '이전보다 더 기능적(more functional than before)'이 되었다고 언급하지 않습니다. 따라서 'all'과 'more functional'이라는 두 표현 모두 지문과 일치하지 않아 X입니다.","passageId":5,"passageTitle":"Simplicity Over Complexity","sourceSentence":null},{"questionNumber":32,"type":"en_twist","typeLabel":"내용 변형 (영어)","statement":"The phrase 'less is more' was originally introduced in a novel by Robert Browning, and it initially carried a straightforward message about preferring simplicity.","answer":"X","explanation":"지문에 따르면 'less is more'는 소설(novel)이 아니라 로버트 브라우닝의 시(poem) 'Andrea del Sarto'에서 처음 언급되었습니다. 장르를 'novel'로 잘못 서술했으므로 X입니다. 구절의 초기 의미가 단순함을 선호한다는 내용은 지문과 일치하지만, 한 가지라도 틀리면 X로 판정합니다.","passageId":5,"passageTitle":"Simplicity Over Complexity","sourceSentence":null},{"questionNumber":33,"type":"thats_why","typeLabel":"인과 (That's why)","statement":"The concept of 'less is more' encourages removing what is seen as excessive. That's why certain familiar habits and practices in our daily lives tend to quietly disappear over time.","answer":"O","explanation":"'less is more' 개념이 과잉된 것을 제거하도록 유도한다는 내용은 지문에서 버튼들이 '여분'으로 여겨져 제거되었다는 사례와 일치합니다. 또한 이 사고방식이 일상의 특정 습관들을 서서히 소멸시킨다(slowly extinguishes certain habits from our daily life)는 인과 관계도 지문과 정확히 부합합니다. 원인(less is more 개념 → 과잉 제거)과 결과(일상 습관의 점진적 소멸) 방향 모두 지문과 일치하므로 O입니다.","passageId":5,"passageTitle":"Simplicity Over Complexity","sourceSentence":null},{"questionNumber":34,"type":"ko_cause","typeLabel":"한국어 인과","statement":"라디오 수신기가 점점 작아지고 버튼이 줄어든 것은, 기술 발전으로 인해 더 많은 기능을 추가할 필요가 생겼기 때문이다.","answer":"X","explanation":"지문에서 라디오 수신기의 버튼이 줄어든 이유는 '더 많은 기능을 추가할 필요' 때문이 아니라, 많은 버튼들이 '불필요한 것'으로 여겨져 제거되었기 때문입니다. 즉, 'less is more'라는 단순함을 추구하는 사고방식이 버튼 축소의 원인으로 제시되어 있으며, statement의 인과 관계는 지문의 내용과 정반대입니다.","passageId":5,"passageTitle":"Simplicity Over Complexity","sourceSentence":null},{"questionNumber":35,"type":"insertion","typeLabel":"문장 삽입 위치","anchorSentence":"Over time, many of their buttons became viewed as 'extra' and were removed, and with each reduction these devices eventually developed into the phones in our pockets.","targetSentence":"As a result, the physical size of these devices shrank considerably while their core features were hidden within layered menus rather than displayed as visible buttons.","claimedPosition":"after","statement":"Over time, many of their buttons became viewed as 'extra' and were removed → As a result, the physical size of these devices shrank considerably while their core features were hidden within layered menus rather than displayed as visible buttons.","answer":"O","explanation":"지문에서 '기기의 규모(scale)가 작아졌다'고 했으므로 물리적 크기가 줄었다는 내용은 일치합니다. 또한 '버튼의 기능들이 세 점 메뉴와 다층 폴더 속으로 사라졌다'고 했으므로 핵심 기능들이 눈에 보이는 버튼 대신 계층적 메뉴 안에 숨겨졌다는 서술도 지문과 정확히 부합합니다. 인과 관계(버튼 제거 → 크기 축소 및 기능의 메뉴화) 방향도 지문의 흐름과 일치합니다.","passageId":5,"passageTitle":"Simplicity Over Complexity","sourceSentence":null},{"questionNumber":36,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"플라스틱이 등장하기 이전, 사람들은 오늘날과 비교했을 때 상대적으로 지속 가능한 방식으로 생활했으며 폐기물 문제도 훨씬 적었다.","answer":"O","explanation":"지문에서 'Before plastic, people lived more sustainably, with far fewer waste problems than we face today'라고 명시되어 있습니다. 이는 플라스틱 등장 이전 사람들이 더 지속 가능한 방식으로 살았으며 오늘날보다 폐기물 문제도 훨씬 적었다는 내용과 정확히 일치합니다. statement는 지문의 해당 문장을 올바르게 반영하고 있습니다.","passageId":6,"passageTitle":"Plastics Industry History","sourceSentence":null},{"questionNumber":37,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The plastics industry grew to represent the convenience and prosperity associated with a certain national ideal, but this growth eventually brought environmental consequences that people began to recognize over time.","answer":"O","explanation":"지문에서 플라스틱 산업은 '미국의 꿈(American dream)'이 상징하는 편리함과 번영을 나타내게 되었다고 서술하며, 이는 statement의 '특정 국가적 이상과 연관된 편리함과 번영'과 정확히 일치합니다. 또한 지문은 시간이 지나면서 사람들이 환경적 영향을 인식하기 시작했다고 밝히고 있으며, 이는 statement의 '사람들이 시간이 지남에 따라 인식하기 시작한 환경적 결과'와 완전히 부합합니다. 내용의 왜곡이나 오류 없이 지문의 핵심 내용을 정확히 반영하고 있으므로 O입니다.","passageId":6,"passageTitle":"Plastics Industry History","sourceSentence":null},{"questionNumber":38,"type":"en_twist","typeLabel":"교묘한 paraphrasing (영어)","statement":"When environmental concerns began to surface, the plastics industry responded by admitting corporate responsibility and encouraging consumers to reduce their plastic use.","answer":"X","explanation":"지문에 따르면 환경 문제가 대두되었을 때 플라스틱 산업은 기업의 책임을 인정하지 않았으며, 오히려 재활용 캠페인을 통해 오염의 책임을 소비자에게 전가했다. Statement는 기업이 '기업 책임을 인정하고 소비자에게 플라스틱 사용 줄이기를 권장했다'고 서술하고 있는데, 이는 지문의 내용과 정반대이다.","passageId":6,"passageTitle":"Plastics Industry History","sourceSentence":null},{"questionNumber":39,"type":"thats_why","typeLabel":"That's why 인과","statement":"Plastic was rapidly adopted during World War II and then spread into consumer goods. That's why the plastics industry came to symbolize the American dream of convenience and prosperity.","answer":"O","explanation":"지문에 따르면 플라스틱은 2차 세계대전 중 급속히 보급되었고, 이후 소비재로 폭발적으로 확산되었다. 그 결과 성장하는 플라스틱 산업은 편리함과 번영이라는 아메리칸 드림의 상징이 되었다고 서술되어 있다. Statement의 인과 관계(전쟁 중 급속 채택 및 소비재 확산 → 아메리칸 드림의 상징)는 지문의 내용 및 흐름과 정확히 일치한다.","passageId":6,"passageTitle":"Plastics Industry History","sourceSentence":null},{"questionNumber":40,"type":"this_leads","typeLabel":"This leads 인과","statement":"The plastics industry launched campaigns framing recycling as the ultimate solution to pollution. This leads to the conclusion that corporations accepted primary responsibility for the waste they produced.","answer":"X","explanation":"지문에서 플라스틱 산업은 재활용을 해결책으로 제시하는 캠페인을 벌이면서, 오염의 책임을 기업이 아닌 소비자에게 돌렸다고 명시되어 있다. 따라서 기업이 자신들이 생산한 폐기물에 대한 주된 책임을 수용했다는 결론은 지문의 내용과 정반대이다. statement의 인과 관계 결론 부분이 지문과 완전히 상반된다.","passageId":6,"passageTitle":"Plastics Industry History","sourceSentence":null},{"questionNumber":41,"type":"ko_cause","typeLabel":"한국어 인과","statement":"플라스틱 산업이 재활용 캠페인을 적극적으로 전개한 이유는, 소비자들이 스스로 환경 문제의 원인 제공자임을 자각하고 자발적으로 플라스틱 사용을 줄이도록 유도하기 위해서였다.","answer":"X","explanation":"지문에 따르면 플라스틱 산업이 재활용 캠페인을 전개한 목적은 오염의 책임을 기업이 아닌 소비자에게 돌리기 위한 것이었다. 즉, 소비자가 스스로 플라스틱 사용을 줄이도록 유도한 것이 아니라, 오히려 소비자에게 책임을 전가함으로써 기업의 면죄부를 얻으려 한 것이다. statement는 캠페인의 의도를 '소비자의 자발적 사용 감소 유도'로 왜곡하고 있으므로 X이다.","passageId":6,"passageTitle":"Plastics Industry History","sourceSentence":null},{"questionNumber":42,"type":"order","typeLabel":"문장 순서 OX","statement":"The early seeds of the environmental movement were planted as people noticed the negative impact of plastics. → The plastics industry responded by shifting blame onto consumers rather than acknowledging its own role.","answer":"O","explanation":"지문에 따르면 사람들이 환경적 영향을 인식하면서 환경 운동의 초기 씨앗이 심어졌고, 이후 플라스틱 산업이 재활용 캠페인을 벌이며 오염의 책임을 소비자에게 돌렸다고 서술되어 있습니다. Statement의 순서(환경 운동 태동 → 플라스틱 산업의 소비자 책임 전가)는 지문의 서술 순서와 정확히 일치합니다. 내용상 왜곡이나 순서 오류 없이 지문과 완전히 부합하므로 O입니다.","passageId":6,"passageTitle":"Plastics Industry History","sourceSentence":null},{"questionNumber":43,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"육아 전문가들은 아이들이 독립심과 회복탄력성을 키워야 한다고 주장하지만, 현재 도시와 교외 지역의 물리적 환경은 아이들이 혼자 이동하기에 안전하지 않다.","answer":"O","explanation":"지문은 육아 전문가들이 아이들의 독립심과 회복탄력성 학습의 필요성을 강조한다고 명시하고 있다. 동시에 도시와 교외 지역이 학교까지 안전한 도보·자전거 경로를 제공하지 못한다고 언급하며, 아이 혼자 이동하기 어려운 물리적 환경의 문제를 지적한다. 따라서 해당 statement는 지문의 내용과 완전히 일치한다.","passageId":7,"passageTitle":"Children's Urban Independence","sourceSentence":null},{"questionNumber":44,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"The central argument of the passage is that raising independent children requires not only economic policy changes but also transformations in physical environments and social attitudes.","answer":"O","explanation":"지문은 아동의 독립심을 키우기 위해 경제 정책(육아휴직, 정부 지원 보육 등)만으로는 부족하며, 실제 물리적 구조(안전한 보행·자전거 경로, 아이들이 자유롭게 이동할 수 있는 공간)와 문화적 변화(공공장소에서 아이들에 대한 관용)가 함께 필요하다고 주장한다. Saxbe의 말을 인용하며 '구조적 변화'와 '문화적 변화' 모두를 강조한다는 점에서, statement가 언급한 '경제 정책 변화뿐 아니라 물리적 환경과 사회적 태도의 변화도 필요하다'는 내용은 지문의 핵심 주장과 정확히 일치한다.","passageId":7,"passageTitle":"Children's Urban Independence","sourceSentence":null},{"questionNumber":45,"type":"en_twist","typeLabel":"교묘한 paraphrasing (영어)","statement":"According to the passage, Darby Saxbe argues that reducing parental oversight of children can be achieved primarily through economic measures such as parental leave and subsidized childcare.","answer":"X","explanation":"지문에서 Darby Saxbe는 '언더파렌팅(under-parenting)은 구조적 변화를 필요로 한다'고 주장하며, 이것이 단순한 경제 정책(가족 휴가, 정부 지원 보육 등)만을 의미하는 것이 아님을 명시하고 있다. 그녀는 오히려 실제 물리적 구조의 변화와 공공장소에서 아이들을 수용하는 문화적 변화를 강조한다. 따라서 statement처럼 '주로 경제적 조치를 통해 달성될 수 있다'고 서술하는 것은 지문의 내용과 정반대로 왜곡된 주장이다.","passageId":7,"passageTitle":"Children's Urban Independence","sourceSentence":null},{"questionNumber":46,"type":"thats_why","typeLabel":"That's why 인과","statement":"현대 도시와 교외의 환경이 아이들의 자유로운 이동을 지원하지 못한다. That's why 부모들은 자녀의 활동을 직접 조율하는 데 더 많은 시간과 비용을 쏟게 된다.","answer":"O","explanation":"지문은 도시와 교외 지역이 안전한 도보·자전거 통학로를 제공하지 못하고, 청소년들이 쇼핑몰에서 쫓겨나며, 자유 시간이 각종 활동 일정으로 사라진다고 설명한다. 이러한 환경적 결함으로 인해 아이 혼자서는 해결할 수 없기 때문에, 부모가 더 많은 시간과 비용을 들여 직접 조율해야 한다고 서술하고 있다. 따라서 원인(환경의 미지원)과 결과(부모의 시간·비용 증가)의 인과 방향이 Statement와 정확히 일치한다.","passageId":7,"passageTitle":"Children's Urban Independence","sourceSentence":null},{"questionNumber":47,"type":"this_leads","typeLabel":"This leads 인과","statement":"도시와 교외에 아이들이 가볍게 감독받으며 자유롭게 이동할 수 있는 안전한 환경이 마련된다. This leads to 부모가 자녀 활동에 직접 개입하는 빈도가 더욱 증가하게 된다.","answer":"X","explanation":"지문은 안전한 환경을 만들어 아이들이 가볍게 감독받으며 자유롭게 이동할 수 있도록 하자고 주장하는데, 이는 부모의 직접 개입을 줄이기 위한 목적이다. 즉, 그러한 환경이 마련되면 부모의 개입 빈도가 '증가'하는 것이 아니라 오히려 '감소'하게 된다. statement의 결과 방향이 지문의 논지와 정반대이므로 X이다.","passageId":7,"passageTitle":"Children's Urban Independence","sourceSentence":null},{"questionNumber":48,"type":"ko_cause","typeLabel":"한국어 인과","statement":"쇼핑몰이 주말에 청소년들을 내쫓고 자유 시간이 과도한 활동 일정으로 사라지기 때문에, 아이들 스스로 이러한 상황을 해결할 수 없어 부모의 시간과 돈이 더 많이 필요하게 된다.","answer":"X","explanation":"지문에서 부모의 시간과 돈이 더 많이 필요한 이유로 제시된 것은 '안전한 도보/자전거 통학로 부재', '쇼핑몰의 청소년 퇴장 조치', '과도한 활동 일정으로 인한 자유 시간 소멸' 세 가지 모두이다. 그러나 본 statement는 첫 번째 원인인 '안전한 통학로 부재'를 누락하고 나머지 두 가지만 원인으로 제시하였다. 지문의 내용을 부분적으로만 반영하여 원인을 불완전하게 서술하였으므로 X로 판정한다.","passageId":7,"passageTitle":"Children's Urban Independence","sourceSentence":null},{"questionNumber":49,"type":"insertion","typeLabel":"문장 삽입 위치 판단","anchorSentence":"She's talking about actual physical structures, and the cultural change required to populate them.","targetSentence":"In other words, reforming the built environment alone is not enough without a shift in how society views children sharing public spaces.","claimedPosition":"after","statement":"'She's talking about actual physical structures, and the cultural change required to populate them.' → 'In other words, reforming the built environment alone is not enough without a shift in how society views children sharing public spaces.'","answer":"O","explanation":"지문에서 Saxbe는 '실제 물리적 구조(actual physical structures)'와 '그것을 채우는 데 필요한 문화적 변화(cultural change required to populate them)'를 함께 언급하며, 두 가지 모두 필요함을 강조한다. Statement는 이를 '물리적 환경 개혁만으로는 부족하고 사회가 아이들의 공공장소 공유를 바라보는 시각의 변화도 필요하다'고 바꿔 표현한 것으로, 지문의 의미를 정확히 반영한다. 'populate them'이 공공장소에 아이들이 실제로 존재하는 것을 사회가 받아들이는 문화적 수용을 의미하므로 해석상 왜곡이 없다.","passageId":7,"passageTitle":"Children's Urban Independence","sourceSentence":null},{"questionNumber":50,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Banksy의 포트 탤벗 작품은 콘크리트 블록 차고 벽면에 그려졌으며, 아이가 눈송이를 손으로 받는 장면을 담고 있다.","answer":"X","explanation":"지문에 따르면 아이는 눈송이를 '손으로' 받는 것이 아니라 '입으로(with his mouth)' 받는 장면이 그려져 있다. 작품이 콘크리트 블록 차고에 그려졌다는 내용은 정확하지만, 핵심 세부 사항인 신체 부위가 잘못 기술되었으므로 X로 판정한다.","passageId":8,"passageTitle":"Banksy's Environmental Art","sourceSentence":null},{"questionNumber":51,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Banksy created an artwork in Port Talbot that uses visual contrast to draw attention to the area's serious air quality problem caused by a nearby industrial facility.","answer":"O","explanation":"뱅크시는 포트 탈보트에 눈송이를 받아먹는 아이와 쓰레기통 화재에서 나오는 재를 대비시키는 시각적 대조를 사용한 작품을 제작했으며, 이는 지문의 내용과 일치합니다. 또한 이 작품은 인근 철강 공장(industrial facility)에서 발생하는 먼지로 인한 대기 오염 문제를 부각시키기 위해 지역 주민 게리 오웬의 요청으로 만들어졌다고 명시되어 있습니다. statement의 모든 핵심 요소(시각적 대조, 대기 오염 문제, 인근 산업 시설)가 지문 내용과 정확히 부합합니다.","passageId":8,"passageTitle":"Banksy's Environmental Art","sourceSentence":null},{"questionNumber":52,"type":"en_twist","typeLabel":"교묘한 paraphrasing (영어)","statement":"Gary Owen, a local resident, approached Banksy and asked him to create a piece highlighting the dust-related health dangers that children in Port Talbot were exposed to.","answer":"O","explanation":"지문에서 'Banksy was asked by Gary Owen, a Port Talbot resident, to create art that would highlight Port Talbot's dust problem'이라고 명시되어 있으며, 'Owen believed that the area's children were facing serious health risks by playing in the dust'라고 아이들의 건강 위험도 언급되어 있습니다. Statement는 이 내용을 정확히 반영하고 있으며, 사실 관계나 표현상의 왜곡이 없습니다.","passageId":8,"passageTitle":"Banksy's Environmental Art","sourceSentence":null},{"questionNumber":53,"type":"en_twist","typeLabel":"교묘한 paraphrasing (영어)","statement":"Children are more vulnerable to air pollution than adults partly because they take in a greater amount of pollutants due to their slower respiratory rate.","answer":"X","explanation":"지문에서는 아이들이 어른보다 '더 빠른 호흡률(faster breathing rates)'을 가지기 때문에 더 많은 오염물질을 흡입한다고 설명합니다. 그러나 statement는 '더 느린 호흡률(slower respiratory rate)' 때문이라고 반대로 기술하고 있으므로 틀렸습니다.","passageId":8,"passageTitle":"Banksy's Environmental Art","sourceSentence":null},{"questionNumber":54,"type":"thats_why","typeLabel":"That's why 인과","statement":"어린이들은 성인보다 호흡 속도가 더 빠르다. That's why 어린이들은 더 많은 오염 물질을 흡입하게 된다.","answer":"O","explanation":"지문에서 'Since they have faster breathing rates than adults, they breathe in more pollutants'라고 명시되어 있다. 즉, 어린이들이 성인보다 빠른 호흡 속도를 가지기 때문에 더 많은 오염 물질을 흡입한다는 인과 관계가 지문과 정확히 일치한다. 원인(빠른 호흡 속도)과 결과(더 많은 오염 물질 흡입)의 방향도 올바르다.","passageId":8,"passageTitle":"Banksy's Environmental Art","sourceSentence":null},{"questionNumber":55,"type":"ko_cause","typeLabel":"한국어 인과","statement":"2016년 WHO 추산에 따르면 약 60만 명의 어린이가 사망했는데, 그 원인은 오염된 공기에 노출되었기 때문이 아니라 오염된 식수를 마셨기 때문이다.","answer":"X","explanation":"지문에서는 2016년 WHO 추산에 따르면 약 60만 명의 어린이가 오염된 공기(polluted air)에 노출되어 사망했다고 명시되어 있다. 그러나 statement는 그 원인을 '오염된 식수'로 왜곡하고 있으므로 틀린 내용이다. 인과 유형 문제에서 원인이 완전히 다르게 제시되었기 때문에 X로 판정한다.","passageId":8,"passageTitle":"Banksy's Environmental Art","sourceSentence":null},{"questionNumber":56,"type":"insertion","typeLabel":"문장 삽입 위치 판단","anchorSentence":"Banksy's art has included environmental messages before.","targetSentence":"For instance, he once painted a child holding a can of red paint beside words that recalled a time when the land was covered with trees.","claimedPosition":"after","statement":"'Banksy's art has included environmental messages before.' → 'For instance, he once painted a child holding a can of red paint beside words that recalled a time when the land was covered with trees.'","answer":"O","explanation":"지문에서 Banksy의 2010년 작품은 디트로이트의 한 공장 잔해에서 제작되었으며, 빨간 페인트 캔을 든 아이와 '나는 이곳이 온통 나무였을 때를 기억한다'는 문구를 담고 있다고 설명합니다. statement는 이를 '나무로 덮여 있던 시절을 떠올리는 문구 옆에 빨간 페인트 캔을 든 아이를 그렸다'고 표현하여 지문 내용과 의미상 일치합니다. 또한 해당 내용은 환경 메시지를 포함한 이전 작품의 예시로 제시된 것이므로 insertion 맥락도 올바릅니다.","passageId":8,"passageTitle":"Banksy's Environmental Art","sourceSentence":null},{"questionNumber":57,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Benjamin Von Wong의 사진 작품은 환경 문제에 대한 대중의 참여를 이끌어내는 것을 목표로 한다.","answer":"O","explanation":"지문에서 Benjamin Von Wong의 작품에 대해 'His artworks rally people around environmental actions'라고 명시되어 있으며, 이는 환경 문제에 대한 대중의 참여를 이끌어낸다는 statement의 내용과 정확히 일치한다. 'rally people around environmental actions'는 환경 행동을 위해 사람들을 결집시킨다는 의미로, statement의 '대중의 참여를 이끌어낸다'는 표현과 완전히 부합한다.","passageId":9,"passageTitle":"Art and Environment","sourceSentence":null},{"questionNumber":58,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Throughout history, art has been used as a tool to raise awareness about social and environmental concerns, and the artworks mentioned in the passage are modern examples of this tradition.","answer":"O","explanation":"지문은 '예술이 역사 전반에 걸쳐 사회적·전 지구적 문제를 다루는 데 중요한 역할을 해왔다(art has played an essential role in addressing social and global issues throughout history)'고 명시하고 있으며, 이어서 환경 문제를 다루는 현대 예술 작품들을 소개하고 있다. Benjamin Von Wong의 사진과 Jenny Kendler의 작품은 모두 환경 인식을 높이기 위한 현대 예술의 사례로 제시되어 있다. 따라서 statement는 지문의 내용과 완전히 일치한다.","passageId":9,"passageTitle":"Art and Environment","sourceSentence":null},{"questionNumber":59,"type":"en_twist","typeLabel":"교묘한 paraphrasing (영어)","statement":"According to Von Wong, individual consumers can completely solve the plastic problem simply by choosing not to buy plastic-containing products.","answer":"X","explanation":"Von Wong은 플라스틱을 포함한 제품을 구매하지 않는 선택을 할 수 있다고 언급하지만, 'that only goes so far(그것만으로는 한계가 있다)'라고 명시하며 개인의 선택만으로는 문제를 완전히 해결할 수 없다고 말합니다. 그는 주변 사람들에게 문제를 알리고, 정부와 기업에 압력을 가하는 것도 함께 필요하다고 강조합니다. 따라서 개인 소비자의 선택만으로 플라스틱 문제를 완전히 해결할 수 있다는 statement는 지문 내용과 반대되므로 X입니다.","passageId":9,"passageTitle":"Art and Environment","sourceSentence":null},{"questionNumber":60,"type":"thats_why","typeLabel":"That's why 인과","statement":"예술은 우리에게 메시지를 전달하고 세상을 바라보는 방식을 바꿀 수 있다. That's why 예술은 사회적·환경적 문제를 다루는 데 중요한 역할을 해왔다.","answer":"O","explanation":"지문은 '예술이 우리에게 아름다움을 일깨우고 메시지를 전달하며 세상을 바라보는 방식을 바꿀 수 있다'고 언급한 뒤, 바로 'That is why art has played an essential role in addressing social and global issues throughout history'라고 서술합니다. Statement의 인과 관계(예술이 메시지 전달·시각 변화 → 사회·환경 문제 해결에 중요한 역할)는 지문의 흐름과 정확히 일치합니다. '환경적 문제'는 지문의 'social and global issues' 및 이후 환경 관련 예시들과 부합하므로 내용상 왜곡이 없습니다.","passageId":9,"passageTitle":"Art and Environment","sourceSentence":null},{"questionNumber":61,"type":"this_leads","typeLabel":"This leads 인과","statement":"플라스틱 의존성이 공급망 전체에 내재되어 있다. This leads to 소비자들이 플라스틱 없이 살기를 자발적으로 선택하는 것이 더욱 쉬워진다.","answer":"X","explanation":"지문에서 Von Wong은 '플라스틱 의존성이 공급망 전체에 내재되어 있기 때문에, 개인 소비자가 플라스틱을 거부하는 것이 점점 더 어려워진다(finds it harder and harder to opt out)'고 말한다. Statement는 이 결과를 정반대로 서술하여 '더욱 쉬워진다'고 했으므로 인과 관계의 방향이 완전히 왜곡되었다.","passageId":9,"passageTitle":"Art and Environment","sourceSentence":null},{"questionNumber":62,"type":"ko_cause","typeLabel":"한국어 인과","statement":"Von Wong이 소비자들에게 주변 사람들에게 플라스틱 문제를 알리라고 촉구하는 이유는, 소비자들의 관심을 기업과 정부가 무시할 수 없기 때문이다.","answer":"O","explanation":"Von Wong은 지문에서 '결국 기업과 정부는 소비자의 관심을 무시할 수 없다(companies and governments can't ignore the interest of the consumers)'고 말하며, 그렇기 때문에 친구와 가족에게 플라스틱 문제를 알리는 것이 중요하다고 촉구하고 있다. Statement는 이 인과 관계—소비자의 관심을 기업·정부가 무시할 수 없으므로 주변에 알려야 한다—를 정확히 반영하고 있다.","passageId":9,"passageTitle":"Art and Environment","sourceSentence":null},{"questionNumber":63,"type":"insertion","typeLabel":"문장 삽입 위치 판단","anchorSentence":"She covered an old boom box with various shells, which took her a year to collect.","targetSentence":"The next piece, titled Forget Me Not, is Jenny Kendler's personal love letter to the sea.","claimedPosition":"after","statement":"She covered an old boom box with various shells, which took her a year to collect. → The next piece, titled Forget Me Not, is Jenny Kendler's personal love letter to the sea.","answer":"X","explanation":"지문에서 두 문장의 순서는 'Forget Me Not'에 대한 소개가 먼저 나오고, 그 다음에 shells를 모으는 데 1년이 걸렸다는 내용이 이어진다. 그러나 statement는 shells 문장이 앞에, 'Forget Me Not' 소개 문장이 뒤에 오는 순서로 제시하고 있어 실제 지문의 순서와 반대이다. insertion/order 유형에서는 지문 내 실제 순서와의 일치 여부를 확인해야 하므로 X로 판정한다.","passageId":9,"passageTitle":"Art and Environment","sourceSentence":null},{"questionNumber":64,"type":"ko_detail","typeLabel":"부분 내용 (한글)","statement":"Kendler는 붐 박스에서 흘러나오는 소리를 통해, 바닷속 생명체들이 화석 연료의 무분별한 사용으로 인해 미래에 겪을 수 있는 고통을 상상하게 만들려 했다.","answer":"X","explanation":"지문에서 Kendler의 작품 'Forget Me Not'은 바다에 대한 개인적인 러브레터로 묘사되며, 그녀가 1년에 걸쳐 수집한 다양한 조개껍데기로 낡은 붐 박스를 덮었다고만 서술되어 있다. '붐 박스에서 흘러나오는 소리'나 '화석 연료의 무분별한 사용', '바닷속 생명체들의 고통'에 관한 내용은 지문 어디에도 언급되지 않는다. 따라서 해당 statement는 지문에 없는 내용을 삽입한 것으로 X이다.","passageId":10,"passageTitle":"Art and Environment","sourceSentence":null},{"questionNumber":65,"type":"en_main","typeLabel":"전반 내용 (영어)","statement":"Both Kendler and Ching use their art to encourage people to reflect on environmental issues and take responsibility for protecting nature.","answer":"X","explanation":"지문에는 Benjamin Von Wong과 Jenny Kendler의 작품만 소개되어 있으며, 'Ching'이라는 인물은 전혀 등장하지 않습니다. 따라서 Ching이 환경 문제에 대한 작품을 만들었다는 진술은 지문에서 확인할 수 없어 X입니다.","passageId":10,"passageTitle":"Art and Environment","sourceSentence":null},{"questionNumber":66,"type":"en_twist","typeLabel":"원문 교묘한 paraphrasing (영어)","statement":"According to Ching, humans have distanced themselves from nature and tend to consume it rather than allowing it to flourish.","answer":"X","explanation":"지문에는 'Ching'이라는 인물이 등장하지 않으며, 해당 발언의 출처 자체가 지문과 일치하지 않습니다. 지문에 등장하는 발언은 Benjamin Von Wong의 것으로, 플라스틱 의존성과 소비자·기업·정부의 역할에 관한 내용이며, '인간이 자연으로부터 멀어졌다'는 표현도 지문에 없습니다.","passageId":10,"passageTitle":"Art and Environment","sourceSentence":null},{"questionNumber":67,"type":"en_twist","typeLabel":"원문 교묘한 paraphrasing (영어)","statement":"Ching believes that art should focus on exposing what is wrong with the world, so that people can confront problems directly without distraction.","answer":"X","explanation":"지문에서 'Ching'이라는 인물은 등장하지 않으며, 예술에 대한 그런 주장을 한 사람도 없습니다. 지문에 등장하는 인물은 Benjamin Von Wong과 Jenny Kendler로, Von Wong은 플라스틱 문제를 알리고 소비자와 정부·기업에 압력을 가하는 것이 중요하다고 말할 뿐, '세상의 잘못된 점을 폭로하는 것에 집중해야 한다'는 식의 주장은 하지 않았습니다. 따라서 이 statement는 지문에 없는 인물과 내용을 담고 있어 명백히 X입니다.","passageId":10,"passageTitle":"Art and Environment","sourceSentence":null},{"questionNumber":68,"type":"thats_why","typeLabel":"That's why 인과","statement":"As oceans absorb increasing amounts of carbon dioxide, they grow more acidic. That's why the hard shells of some marine animals are expected to melt away under such conditions.","answer":"X","explanation":"이 statement는 해양 산성화로 인해 해양 생물의 껍데기가 녹을 수 있다는 내용을 담고 있으나, 주어진 지문에는 이산화탄소, 해양 산성화, 또는 해양 생물 껍데기에 관한 언급이 전혀 없습니다. 지문은 플라스틱 오염 문제와 예술 작품을 통한 환경 메시지 전달에 초점을 맞추고 있습니다. 따라서 이 statement는 지문과 무관한 내용으로 X입니다.","passageId":10,"passageTitle":"Art and Environment","sourceSentence":null},{"questionNumber":69,"type":"ko_cause","typeLabel":"한국어 인과","statement":"Andy Warhol의 말이 환경 예술의 맥락에서 특히 의미 있게 인용된 이유는, 예술 작품이 저절로 시간이 지나면서 세상을 바꾼다는 믿음을 표현했기 때문이다.","answer":"X","explanation":"지문에는 Andy Warhol에 대한 언급이 전혀 없다. 지문에서 인용된 인물은 Benjamin Von Wong으로, 그는 플라스틱 의존 문제를 해결하기 위해 소비자들이 주변에 알리고 기업·정부에 압력을 가해야 한다고 주장했다. 따라서 Andy Warhol의 발언이나 '예술이 저절로 세상을 바꾼다'는 내용은 지문에 존재하지 않는다.","passageId":10,"passageTitle":"Art and Environment","sourceSentence":null},{"questionNumber":70,"type":"this_leads","typeLabel":"This leads 인과","statement":"Kendler hoped that her installation would inspire individual awareness. This leads to her also wanting to promote collective action and shared responsibility among people.","answer":"X","explanation":"지문에서 Kendler의 'Forget Me Not'은 바다에 대한 개인적인 러브레터로 묘사되며, 조개껍데기를 모아 붐박스를 꾸민 작품으로만 소개되어 있다. 개인적 인식 고취나 집단적 행동 촉구에 대한 언급은 전혀 없으므로, 해당 statement의 두 주장 모두 지문에 근거가 없다. 집단적 행동과 공동 책임 촉진을 언급한 것은 Kendler가 아니라 Von Wong이다.","passageId":10,"passageTitle":"Art and Environment","sourceSentence":null}]};

  }
  var sourceHTML="";
  // 학생용 HTML — 원본 지문 미표시
  var fbHTML="";
  if(answered){
    var cls=answered.picked==="dunno"?"dunno":(answered.isCorrect?"ok":"ng");
    var msg=answered.picked==="dunno"?"🤔 몰라요 — 해설을 학습하세요":(answered.isCorrect?"✅ 정답!":"❌ 오답");
    fbHTML="<div class='fb "+cls+"'>"+msg+"</div>"
      +"<div class='explain-box'><div class='ex-title'>📖 정답 & 해설</div>"
      +"<div class='ex-body'><span class='ex-answer "+q.answer+"'>"+q.answer+"</span>"+(q.explanation?esc(q.explanation):"해설이 없습니다.")+"</div></div>";
  }
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade'>"
    +"<div class='q-counter'>"+(pos+1)+" / "+qs.length+"</div>"
    +"<div class='prog-bar'><div class='prog-fill' style='width:"+pct+"%'></div></div>"
    +"<div class='title-box'><div class='ptitle'>"+esc(q.passageTitle)+"</div>"
    +"<span class='tlabel'>"+esc(q.typeLabel||"")+"</span></div>"
    +"<div class='statement'>"+esc(q.statement)+"</div>"
    +sourceHTML
    +"<div class='ox-grid'>"
    +"<button class='"+btnClass("o")+"' onclick='pick("+pos+",&quot;o&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>⭕</span>O (맞음)</button>"
    +"<button class='"+btnClass("x")+"' onclick='pick("+pos+",&quot;x&quot;)' "+(answered?"disabled":"")+"><span class='ox-icon'>❌</span>X (틀림)</button>"
    +"<button class='"+btnClass("dunno")+"' onclick='pick("+pos+",&quot;dunno&quot;)' "+(answered?"disabled":"")+">🤔 몰라요 (정답·해설 보기)</button>"
    +"</div>"
    +fbHTML
    +"<div class='nav-bar'>"
    +"<button class='nav-btn prev' onclick='showQ("+(pos-1)+")' "+(pos<=0?"disabled":"")+">← 이전</button>"
    +"<button class='nav-btn home' onclick='showIndex()'>목록</button>"
    +"<button class='nav-btn next' onclick='"+(pos<qs.length-1?"showQ("+(pos+1)+")":"showSetResult()")+"'>"+(pos<qs.length-1?"다음 →":"결과")+"</button>"
    +"</div></div>";
}
function pick(pos,which){
  var gidx=gi(currentSet,pos);
  if(answers[gidx])return;
  var q=SETS[currentSet][pos];
  var isCorrect=false;
  if(which==="dunno"){isCorrect=false;}
  else{isCorrect=(which==="o"&&q.answer==="O")||(which==="x"&&q.answer==="X");}
  answers[gidx]={picked:which,isCorrect:isCorrect};
  showQ(pos);
}
function showSetResult(){
  var si=currentSet;var qs=SETS[si];var base=si*SET_SIZE;
  var total=qs.length;var correct=0,dunno=0;
  for(var i=0;i<total;i++){var a=answers[base+i];if(a&&a.isCorrect)correct++;if(a&&a.picked==="dunno")dunno++;}
  var pct=Math.round(correct/total*100);var passed=pct>=CONFIG.passThreshold;
  setH("세트 "+(si+1)+" 결과",passed?"통과":"미달");
  var app=document.getElementById("app");if(!app)return;
  app.innerHTML="<div class='fade' style='text-align:center;padding:16px 0'>"
    +"<div class='score-circle "+(passed?"pass":"fail")+"'>"+pct+"%</div>"
    +"<p style='font-size:1.1rem;font-weight:700;color:"+(passed?"#10b981":"#ef4444")+"'>"+(passed?"통과!":"미달")+"</p>"
    +"<p style='color:#6b7280;font-size:.88rem;margin-top:8px'>"+correct+"/"+total+"문제 정답 · 몰라요 "+dunno+"개 · 기준 "+CONFIG.passThreshold+"%</p>"
    +"</div>"
    +"<div style='margin-top:16px'><button class='nav-btn next' style='width:100%;padding:14px' onclick='showIndex()'>목록으로</button></div>";
}
try{history.pushState(null,"",location.href);
window.addEventListener("popstate",function(){history.pushState(null,"",location.href);showIndex();});}catch(e){}
showIndex();
</script>
