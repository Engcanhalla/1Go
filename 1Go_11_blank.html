.locked{opacity:.4;cursor:not-allowed;}.done::after{content:"✓";margin-left:5px;}.retry-badge{display:inline-block;background:#fff3e0;color:#e65100;font-size:11px;padding:2px 7px;border-radius:9px;margin-left:5px;}

<script>
var DATA={"words":[{"i":0,"t":"Students","c":"Students","ld":"","tr":""},{"i":1,"t":"often","c":"often","ld":"","tr":""},{"i":2,"t":"mistake","c":"mistake","ld":"","tr":""},{"i":3,"t":"familiarity","c":"familiarity","ld":"","tr":"","b":{"easy":{"choices":["unfamiliarity","familiarity","familiarity's"],"correct":1},"medium":{"choices":["familiarize","familiarized","familiarity","familiarizing"],"correct":2,"answer":"familiarity"},"hard":{"answer":"familiarity"}}},{"i":4,"t":"with","c":"with","ld":"","tr":""},{"i":5,"t":"true","c":"true","ld":"","tr":""},{"i":6,"t":"mastery,","c":"mastery","ld":"","tr":",","b":{"easy":{"choices":["incompetence","mastery's","mastery"],"correct":2},"medium":{"choices":["mastered","mastering","mastery","masterly"],"correct":2,"answer":"mastery"},"hard":{"answer":"mastery"}}},{"i":7,"t":"creating","c":"creating","ld":"","tr":""},{"i":8,"t":"a","c":"a","ld":"","tr":""},{"i":9,"t":"dangerous","c":"dangerous","ld":"","tr":""},{"i":10,"t":"“illusion","c":"illusion","ld":"“","tr":"","b":{"easy":{"choices":["reality","allusion","illusion"],"correct":2},"medium":{"choices":["illuded","illusion","illuding","illusive"],"correct":1,"answer":"illusion"},"hard":{"answer":"illusion"}}},{"i":11,"t":"of","c":"of","ld":"","tr":""},{"i":12,"t":"competence”","c":"competence","ld":"","tr":"”"},{"i":13,"t":"where","c":"where","ld":"","tr":"","b":{"easy":{"choices":["nowhere","were","where"],"correct":2},"medium":{"choices":["when","which","whereas","where"],"correct":3,"answer":"where"},"hard":{"answer":"where"}}},{"i":14,"t":"recognizing","c":"recognizing","ld":"","tr":"","b":{"medium":{"choices":["recognized","to recognize","recognizing","being recognized"],"correct":2,"answer":"recognizing"},"hard":{"answer":"recognizing"}}},{"i":15,"t":"information","c":"information","ld":"","tr":""},{"i":16,"t":"feels","c":"feels","ld":"","tr":""},{"i":17,"t":"like","c":"like","ld":"","tr":""},{"i":18,"t":"genuine","c":"genuine","ld":"","tr":""},{"i":19,"t":"knowledge,","c":"knowledge","ld":"","tr":","},{"i":20,"t":"but","c":"but","ld":"","tr":""},{"i":21,"t":"they","c":"they","ld":"","tr":""},{"i":22,"t":"struggle","c":"struggle","ld":"","tr":""},{"i":23,"t":"when","c":"when","ld":"","tr":""},{"i":24,"t":"asked","c":"asked","ld":"","tr":"","b":{"easy":{"choices":["answered","asked","masked"],"correct":1},"medium":{"choices":["asking","to ask","being ask","asked"],"correct":3,"answer":"asked"},"hard":{"answer":"asked"}}},{"i":25,"t":"to","c":"to","ld":"","tr":""},{"i":26,"t":"recall","c":"recall","ld":"","tr":""},{"i":27,"t":"or","c":"or","ld":"","tr":""},{"i":28,"t":"apply","c":"apply","ld":"","tr":""},{"i":29,"t":"it","c":"it","ld":"","tr":""},{"i":30,"t":"independently.","c":"independently","ld":"","tr":"."},{"i":31,"t":"This","c":"This","ld":"","tr":""},{"i":32,"t":"cognitive","c":"cognitive","ld":"","tr":""},{"i":33,"t":"bias,","c":"bias","ld":"","tr":","},{"i":34,"t":"strengthened","c":"strengthened","ld":"","tr":"","b":{"easy":{"choices":["weakened","strengthened","lengthened"],"correct":1},"medium":{"choices":["strengthening","strengthen","strengthened","being strengthen"],"correct":2,"answer":"strengthened"},"hard":{"answer":"strengthened"}}},{"i":35,"t":"by","c":"by","ld":"","tr":""},{"i":36,"t":"passive","c":"passive","ld":"","tr":"","b":{"easy":{"choices":["active","massive","passive"],"correct":2},"medium":{"choices":["passive","passively","passiveness","passed"],"correct":0,"answer":"passive"},"hard":{"answer":"passive"}}},{"i":37,"t":"study","c":"study","ld":"","tr":""},{"i":38,"t":"methods,","c":"methods","ld":"","tr":","},{"i":39,"t":"leads","c":"leads","ld":"","tr":""},{"i":40,"t":"learners","c":"learners","ld":"","tr":""},{"i":41,"t":"to","c":"to","ld":"","tr":""},{"i":42,"t":"overestimate","c":"overestimate","ld":"","tr":"","b":{"easy":{"choices":["overestimate","underestimate","overstate"],"correct":0},"medium":{"choices":["overestimated","overestimating","overestimate","overestimation"],"correct":2,"answer":"overestimate"},"hard":{"answer":"overestimate"}}},{"i":43,"t":"their","c":"their","ld":"","tr":""},{"i":44,"t":"understanding.","c":"understanding","ld":"","tr":"."},{"i":45,"t":"Teaching","c":"Teaching","ld":"","tr":""},{"i":46,"t":"materials","c":"materials","ld":"","tr":""},{"i":47,"t":"(even","c":"even","ld":"(","tr":""},{"i":48,"t":"informally","c":"informally","ld":"","tr":""},{"i":49,"t":"or","c":"or","ld":"","tr":""},{"i":50,"t":"imaginatively)","c":"imaginatively","ld":"","tr":")"},{"i":51,"t":"actively","c":"actively","ld":"","tr":""},{"i":52,"t":"counters","c":"counters","ld":"","tr":"","b":{"medium":{"choices":["countered","counters","countering","to counter"],"correct":1,"answer":"counters"},"hard":{"answer":"counters"}}},{"i":53,"t":"this","c":"this","ld":"","tr":""},{"i":54,"t":"illusion","c":"illusion","ld":"","tr":"","b":{"easy":{"choices":["reality","illusion","allusion"],"correct":1},"medium":{"choices":["illuded","illuding","illusive","illusion"],"correct":3,"answer":"illusion"},"hard":{"answer":"illusion"}}},{"i":55,"t":"by","c":"by","ld":"","tr":""},{"i":56,"t":"requiring","c":"requiring","ld":"","tr":""},{"i":57,"t":"deep","c":"deep","ld":"","tr":""},{"i":58,"t":"processing,","c":"processing","ld":"","tr":","},{"i":59,"t":"active","c":"active","ld":"","tr":""},{"i":60,"t":"recall,","c":"recall","ld":"","tr":","},{"i":61,"t":"structured","c":"structured","ld":"","tr":""},{"i":62,"t":"organization,","c":"organization","ld":"","tr":","},{"i":63,"t":"and","c":"and","ld":"","tr":""},{"i":64,"t":"revealing","c":"revealing","ld":"","tr":""},{"i":65,"t":"gaps","c":"gaps","ld":"","tr":""},{"i":66,"t":"in","c":"in","ld":"","tr":""},{"i":67,"t":"knowledge.","c":"knowledge","ld":"","tr":"."},{"i":68,"t":"It","c":"It","ld":"","tr":""},{"i":69,"t":"introduces","c":"introduces","ld":"","tr":""},{"i":70,"t":"powerful","c":"powerful","ld":"","tr":""},{"i":71,"t":"methods","c":"methods","ld":"","tr":""},{"i":72,"t":"like","c":"like","ld":"","tr":""},{"i":73,"t":"teaching","c":"teaching","ld":"","tr":""},{"i":74,"t":"imaginary","c":"imaginary","ld":"","tr":""},{"i":75,"t":"students,","c":"students","ld":"","tr":","},{"i":76,"t":"peer-teaching","c":"peer-teaching","ld":"","tr":""},{"i":77,"t":"in","c":"in","ld":"","tr":""},{"i":78,"t":"study","c":"study","ld":"","tr":""},{"i":79,"t":"groups,","c":"groups","ld":"","tr":","},{"i":80,"t":"employing","c":"employing","ld":"","tr":""},{"i":81,"t":"the","c":"the","ld":"","tr":""},{"i":82,"t":"Feynman","c":"Feynman","ld":"","tr":""},{"i":83,"t":"Technique,","c":"Technique","ld":"","tr":","},{"i":84,"t":"and","c":"and","ld":"","tr":""},{"i":85,"t":"writing","c":"writing","ld":"","tr":""},{"i":86,"t":"explanations","c":"explanations","ld":"","tr":""},{"i":87,"t":"for","c":"for","ld":"","tr":""},{"i":88,"t":"others.","c":"others","ld":"","tr":"."},{"i":89,"t":"Ultimately,","c":"Ultimately","ld":"","tr":","},{"i":90,"t":"adopting","c":"adopting","ld":"","tr":""},{"i":91,"t":"the","c":"the","ld":"","tr":""},{"i":92,"t":"teacher","c":"teacher","ld":"","tr":"","b":{"easy":{"choices":["student mindset","teacher mindset","teacher mindset's"],"correct":1,"_gLen":2,"_gTrail":""},"medium":{"choices":["teaching mindset","teacherly mindset","teacher mindset","teached mindset"],"correct":2,"answer":"teacher mindset","_gLen":2,"_gTrail":""},"hard":{"answer":"teacher mindset","_gLen":2,"_gTrail":""}}},{"i":93,"t":"mindset","c":"mindset","ld":"","tr":"","_gSkip":{"easy":true,"medium":true,"hard":true},"b":{}},{"i":94,"t":"transforms","c":"transforms","ld":"","tr":""},{"i":95,"t":"surface","c":"surface","ld":"","tr":"","b":{"medium":{"choices":["surfaced","surfacing","surpassing","surface"],"correct":3,"answer":"surface"},"hard":{"answer":"surface"}}},{"i":96,"t":"familiarity","c":"familiarity","ld":"","tr":"","b":{"easy":{"choices":["unfamiliarity","familiarity","familiarity's"],"correct":1},"medium":{"choices":["familiarize","familiarized","familiarizing","familiarity"],"correct":3,"answer":"familiarity"},"hard":{"answer":"familiarity"}}},{"i":97,"t":"into","c":"into","ld":"","tr":""},{"i":98,"t":"real","c":"real","ld":"","tr":""},{"i":99,"t":"mastery,","c":"mastery","ld":"","tr":",","b":{"easy":{"choices":["incompetence","mastery's","mastery"],"correct":2},"medium":{"choices":["mastered","mastering","mastery","masterly"],"correct":2,"answer":"mastery"},"hard":{"answer":"mastery"}}},{"i":100,"t":"exposing","c":"exposing","ld":"","tr":""},{"i":101,"t":"and","c":"and","ld":"","tr":""},{"i":102,"t":"filling","c":"filling","ld":"","tr":""},{"i":103,"t":"gaps","c":"gaps","ld":"","tr":""},{"i":104,"t":"in","c":"in","ld":"","tr":""},{"i":105,"t":"knowledge","c":"knowledge","ld":"","tr":""},{"i":106,"t":"and","c":"and","ld":"","tr":""},{"i":107,"t":"ensuring","c":"ensuring","ld":"","tr":""},{"i":108,"t":"solid,","c":"solid","ld":"","tr":","},{"i":109,"t":"reliable","c":"reliable","ld":"","tr":"","b":{"medium":{"choices":["relied","relying","reliable","reliably"],"correct":2,"answer":"reliable"},"hard":{"answer":"reliable"}}},{"i":110,"t":"understanding.","c":"understanding","ld":"","tr":"."}],"thresholds":{"easy":90,"medium":90,"hard":90},"sentenceBreak":false};

var levels=['easy','medium','hard'];
var levelNames={easy:'쉬움',medium:'중간',hard:'심화'};
var currentLevel=null,blankStates={};
var unlockedLevels={easy:true,medium:true,hard:true};
var completedLevels={easy:false,medium:false,hard:false};
var levelScores={};

function init(){showLevelSelector();}

function showLevelSelector(){
  currentLevel=null;
  document.getElementById('levelInfo').textContent='단계를 선택하세요';
  document.getElementById('progressFill').style.width='0%';
  var c=document.getElementById('content');
  var h='<div class="level-selector"><h2 style="margin-bottom:18px;font-size:17px;">학습 단계 선택</h2>';
  for(var x=0;x<levels.length;x++){
    var lv=levels[x];var done=completedLevels[lv];
    var cls=lv==='medium'?'med':lv;
    h+='<button class="level-btn '+cls+'-btn'+(done?' done':'')+'" onclick="startLevel(\''+lv+'\')">';
    h+=levelNames[lv]+'</button><br>';
  }
  h+='</div>';c.innerHTML=h;
  document.getElementById('actionBar').innerHTML='';
}

function startLevel(level){
  currentLevel=level;blankStates={};
  document.getElementById('levelInfo').textContent=levelNames[level]+' 단계';
  renderPassage();
}

function getBlanksForLevel(level){
  return DATA.words.filter(function(w){return w.b&&w.b[level]&&!(w._gSkip&&w._gSkip[level]);});
}

function renderPassage(){
  var c=document.getElementById('content');
  var blanks=getBlanksForLevel(currentLevel);
  var total=blanks.length;
  var answered=0;
  for(var k in blankStates){if(blankStates[k].answered)answered++;}
  document.getElementById('progressFill').style.width=(answered/total*100)+'%';
  var sentEndRe=/[.!?][”“"'’‘)\]]*$/;
  var h='<div class="passage">';
  DATA.words.forEach(function(w,wi){
    // Skip group members for current level
    if(w._gSkip&&w._gSkip[currentLevel])return;
    var bd=w.b&&w.b[currentLevel];
    if(bd){
      var st=blankStates[w.i]||{answered:false,correct:false,attempts:0};
      h+=(w.ld||'');
      if(currentLevel==='hard') h+=renderTypingBlank(w,bd,st);
      else h+=renderSelectBlank(w,bd,st);
      // Use group trailing if available
      var trail=bd._gTrail!==undefined?bd._gTrail:(w.tr||'');
      h+=trail;
    }else{
      h+=(w.ld||'')+w.c+(w.tr||'');
    }
    h+=' ';
    var trForBreak=(bd&&bd._gTrail!==undefined)?bd._gTrail:(w.tr||'');
    if(DATA.sentenceBreak && trForBreak && sentEndRe.test(trForBreak) && wi<DATA.words.length-1) h+='<br>';
  });
  h+='</div>';c.innerHTML=h;
  if(answered===total) showResults();
  else document.getElementById('actionBar').innerHTML='<button class="btn" style="background:#eee;color:#333;font-size:13px;" onclick="confirmBackToSelector()">📋 단계 선택</button>';
}

function renderSelectBlank(w,bd,st){
  if(st.answered&&st.correct)
    return '<span class="blank-select correct"><select disabled><option>'+bd.choices[bd.correct]+'</option></select></span>';
  if(st.answered&&!st.correct&&st.attempts>=1)
    return '<span class="blank-select wrong"><select disabled><option>'+bd.choices[bd.correct]+' \u2713</option></select></span>';
  var opts='<option value="">___</option>';
  bd.choices.forEach(function(ch,ci){
    if(ch) opts+='<option value="'+ci+'">'+ch+'</option>';
  });
  var rb=st.attempts===1?'<span class="retry-badge">재도전</span>':'';
  return '<span class="blank-select" id="bs'+w.i+'"><select onchange="checkSelect('+w.i+',this.value)">'+opts+'</select>'+rb+'</span>';
}

function renderTypingBlank(w,bd,st){
  if(st.answered&&st.correct){
    var csz=Math.max(Math.ceil((bd.answer.length+1)/2*1.3),4);
    return '<span class="blank-input correct"><input disabled size="'+csz+'" value="'+bd.answer+'"></span>';}
  if(st.answered&&!st.correct&&st.attempts>=2){
    var csz=Math.max(Math.ceil((bd.answer.length+3)/2*1.3),4);
    return '<span class="blank-input wrong"><input disabled size="'+csz+'" value="'+bd.answer+' \u2713"></span>';}
  var rb=st.attempts===1?'<span class="retry-badge">재도전</span>':'';
  var parts=bd.answer.split(' ');
  var prefix,rest,ph;
  if(parts.length>1){
    prefix=parts[0]+' ';
    rest=parts.slice(1).join(' ');
    ph='';
  }else{
    prefix=bd.answer.charAt(0);
    rest=bd.answer.slice(1);
    ph='';
  }
  var sz=Math.max(Math.ceil((rest.length+3)/2),4);
  return '<span class="blank-input" id="bs'+w.i+'" data-prefix="'+encodeURIComponent(prefix)+'">'
    +'<span class="hint-prefix">'+prefix+'</span>'
    +'<input size="'+sz+'" placeholder="'+ph+'" onkeydown="if(event.key===\'Enter\')checkType('+w.i+',this.value)">'
    +'<button onclick="checkType('+w.i+',this.parentNode.querySelector(\'input\').value)" style="font-size:16px;padding:2px 5px;margin-left:2px;border:none;background:transparent;cursor:pointer;" title="확인">&#x23CE;</button>'
    +rb+'</span>';
}

function checkSelect(wordIdx,val){
  if(val==='')return;
  var w=DATA.words.find(function(ww){return ww.i===wordIdx;});
  var bd=w.b[currentLevel];
  var st=blankStates[wordIdx]||{answered:false,correct:false,attempts:0};
  st.attempts++;
  if(parseInt(val)===bd.correct){
    st.answered=true;st.correct=true;
    blankStates[wordIdx]=st;renderPassage();
  }else{
    st.answered=true;st.correct=false;
    blankStates[wordIdx]=st;renderPassage();
  }
}

function normApo(s){return s.replace(/[\u2018\u2019\u2032\u0060\u00B4\uFF07]/g,"\'").trim().toLowerCase();}
function checkType(wordIdx,val){
  if(!val.trim())return;
  var w=DATA.words.find(function(ww){return ww.i===wordIdx;});
  var bd=w.b[currentLevel];
  var st=blankStates[wordIdx]||{answered:false,correct:false,attempts:0};
  st.attempts++;
  var el=document.getElementById('bs'+wordIdx);
  var prefix=el?decodeURIComponent(el.getAttribute('data-prefix')||''):'';
  var fullAnswer=(prefix+val).trim();
  if(normApo(fullAnswer)===normApo(bd.answer)){
    st.answered=true;st.correct=true;
    blankStates[wordIdx]=st;renderPassage();
  }else{
    if(st.attempts>=2){
      st.answered=true;st.correct=false;
      blankStates[wordIdx]=st;renderPassage();
    }else{
      blankStates[wordIdx]=st;
      if(el){el.classList.add('wrong');setTimeout(function(){el.classList.remove('wrong');renderPassage();},600);}
    }
  }
}

function showResults(){
  var blanks=getBlanksForLevel(currentLevel);
  var total=blanks.length;var correct=0;
  blanks.forEach(function(w){var st=blankStates[w.i];if(st&&st.correct)correct++;});
  var pct=Math.round(correct/total*100);
  var threshold=DATA.thresholds[currentLevel];
  var pass=pct>=threshold;
  levelScores[currentLevel]={correct:correct,total:total,pct:pct};
  var h='<div class="result-card"><h2>'+levelNames[currentLevel]+' 단계 결과</h2>';
  h+='<div class="score '+(pass?'pass':'fail')+'">'+pct+'%</div>';
  h+='<p>'+total+'개 빈칸 중 '+correct+'개 정답 (기준: '+threshold+'%)</p>';
  if(pass){completedLevels[currentLevel]=true;}
  h+='</div>';
  document.getElementById('content').innerHTML+=h;
  var ah='';
  if(!pass){
    ah='<button class="btn btn-retry" onclick="startLevel(\''+currentLevel+'\')">재도전</button>';
  }else{
    var ni=levels.indexOf(currentLevel)+1;
    if(ni<levels.length){
      ah='<button class="btn btn-next" onclick="startLevel(\''+levels[ni]+'\')">다음 단계 →</button>';
    }else{showCongrats();return;}
    ah+=' <button class="btn" style="background:#eee;color:#333;" onclick="showLevelSelector()">단계 선택</button>';
  }
  document.getElementById('actionBar').innerHTML=ah;
}

function showCongrats(){
  var tc=0,tb=0;
  for(var x=0;x<levels.length;x++){
    var s=levelScores[levels[x]];
    if(s){tc+=s.correct;tb+=s.total;}
  }
  var tp=Math.round(tc/tb*100);
  var h='<div class="congrats"><div style="font-size:40px;margin-bottom:10px;">🎉</div>';
  h+='<h2>축하합니다!</h2><p>모든 단계를 통과했습니다!</p>';
  h+='<p style="font-size:19px;font-weight:700;margin-top:10px;">전체 성취도: '+tp+'%</p></div>';
  document.getElementById('content').innerHTML=h;
  document.getElementById('actionBar').innerHTML='<button class="btn" style="background:#eee;color:#333;" onclick="showLevelSelector()">다시 도전</button>';
}

function confirmBackToSelector(){
  if(confirm('테스트를 중단하고 단계 선택으로 돌아갈까요?\n(현재 진행 상황은 초기화됩니다)')){
    showLevelSelector();
  }
}

init();
</script></body></html>
